<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        .calculator {
            width: 380px;
            height: 730px;
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* AREA LAYAR UTAMA */
        .screen-container {
            flex: 1;
            border: 5px solid #000000;
            padding: 15px;
            background: #ffffff;
            box-sizing: border-box;
            margin-bottom: 15px;
            min-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* AREA TOMBOL */
        .buttons-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 42px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 48px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
        }

        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* GAYA MENU DROPDOWN BARU DENGAN TINGKATAN (ANAK & CUCU) */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 130%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            box-shadow: 0px -5px 12px rgba(0,0,0,0.3);
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
            max-height: 250px;
            overflow-y: auto;
        }
        .dropdown-item {
            padding: 8px;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            text-align: left;
            color: #000;
        }
        
        /* Gaya Khusus Area Anak & Cucu Bersistem Radio */
        .menu-anak {
            padding-left: 10px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        .menu-cucu-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px 6px 25px;
            font-weight: normal;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px dotted #eee;
        }
        .menu-cucu-row input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Screen Area -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Buttons Area -->
    <div class="buttons-container">
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <div class="rom-grid-second">
            <button onclick="tekan('*')">*</button>
            <button onclick="tekan(':')">:</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="hitungHasil()">=</button>
        </div>

        <div class="row-bottom" style="position: relative;">
            <div style="flex: 1.2; position: relative; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
                
                <!-- DROPDOWN MENU UTAMA -->
                <div id="dropdown-menu" class="dropdown-menu">
                    <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 6px; text-align: left;">Fungsi:</div>
                    <div class="dropdown-item" onclick="pilihItem('.')">. (Titik)</div>
                    <div class="dropdown-item" onclick="pilihItem('%')">% (Persen)</div>
                    <div class="dropdown-item" onclick="pilihItem('^')">^ (Pangkat)</div>
                    
                    <!-- INDUK: SIGMA -->
                    <div class="dropdown-item" style="background: #f5f5f5; font-weight: bold;">Σ (Sigma Utama)</div>
                    
                    <!-- ANAK 1: Sigma Standar -->
                    <div class="menu-anak">└─ Σ Berurutan (1+2+3...)</div>
                    <!-- CUCU-CUCU DENGAN SISTEM RADIO -->
                    <label class="menu-cucu-row" onclick="pilihCucu('Σ')">
                        <span>Ketik Manual (Σ)</span>
                        <input type="radio" name="sigma-opt" id="rad-sig-manual">
                    </label>
                    <label class="menu-cucu-row" onclick="pilihCucu('Σ3')">
                        <span>Hingga 3 (Σ3)</span>
                        <input type="radio" name="sigma-opt" id="rad-sig-3">
                    </label>
                    <label class="menu-cucu-row" onclick="pilihCucu('Σ5')">
                        <span>Hingga 5 (Σ5)</span>
                        <input type="radio" name="sigma-opt" id="rad-sig-5">
                    </label>

                    <!-- ANAK 2: Sigma Kuadrat (Variasi Masa Depan) -->
                    <div class="menu-anak">└─ Σ Kuadrat (1²+2²+3²...)</div>
                    <label class="menu-cucu-row" onclick="pilihCucu('Σ^2')">
                        <span>Ketik Kuadrat (Σ^)</span>
                        <input type="radio" name="sigma-opt" id="rad-sig-sq">
                    </label>
                </div>
            </div>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function pilihItem(karakter) {
    tekan(karakter);
    document.getElementById('dropdown-menu').style.display = "none";
}

// FUNGSI KHUSUS UNTUK MEMILIH OPSI CUCU RADIO BUTTON
function pilihCucu(teksRumus) {
    tekan(teksRumus);
    
    // Beri jeda 150ms agar animasi klik radio terlihat sebelum menu menutup otomatis
    setTimeout(function() {
        document.getElementById('dropdown-menu').style.display = "none";
        // Reset pilihan radio agar bisa diklik kembali di transaksi berikutnya
        document.querySelectorAll('input[name="sigma-opt"]').forEach(r => r.checked = false);
    }, 150);
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (isManualEdit || rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        
        ekspresi = ekspresi.replace(/:/g, "/"); 
        ekspresi = ekspresi.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        ekspresi = ekspresi.replace(/(\d+)%/g, "($1/100)");
        
        // JALUR PENYELAMAT MULTI-UNICODE SIGMA
        // Membaca karakter \u03A3 (Σ) dan \u2211 (∑) secara bersamaan agar kebal error browser
        ekspresi = ekspresi.replace(/[Σ∑\u03A3\u2211](\d+)/g, function(match, angka) {
            let total = 0; 
            let batas = parseInt(angka) || 0;
            for (let i = 1; i <= batas; i++) { 
                total += i; 
            } 
            return String(total);
        });

        ekspresi = ekspresi.replace(/\+\+/g, "+");
        ekspresi = ekspresi.replace(/\-\-/g, "+");

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:22px;">Format Error</div>`;
        renderLayar();
    }
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isManualEdit ? "OK" : "EDIT";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}

function klikTombolPilih() {
    const menu = document.getElementById('dropdown-menu');
    menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
}
</script>
</body>
</html>
