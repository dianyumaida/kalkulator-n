
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        /* 🌟 GAYA DESAIN INTERNAL - MEMAKSA HP MEMBUANG CACHE LAMA 🌟 */
        .calculator {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            border-radius: 4px;
            padding: 20px 18px 25px 22px; 
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen-container {
            flex: 1;
            border: none !important;
            background: transparent !important;
            padding: 10px;
            margin-bottom: 5px !important; /* Dipersempit agar tidak mendorong tombol ke bawah */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            pointer-events: none !important;
        }

        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
            pointer-events: auto !important;
        }

        /* BARIS TOMBOL ANGKA (0-9) - TARIKAN NAIK EKSTRIM LANGSUNG AKTIF */
        .rom-grid-first {
            display: grid !important;
            grid-template-columns: repeat(10, 1fr) !important;
            column-gap: 2px !important;
            border: none !important;
            padding: 0 !important;
            /* 🌟 Memaksa baris angka melompat naik ke atas menutup kotak gambar 🌟 */
            margin: -80px 0 12px 0 !important; 
            background: transparent !important;
            width: 100% !important;
            pointer-events: auto !important;
            position: relative;
            z-index: 20;
        }
        .rom-grid-first button {
            height: 46px !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
            display: block !important;
            padding: 0 !important;
            pointer-events: auto !important;
        }

        /* Penyetelan Mikro Kiri-Kanan Angka Sesuai Catatan Anda */
        .btn-num-0 { margin-left: -3px !important; }
        .btn-num-7, .btn-num-8, .btn-num-9 { margin-left: 3px !important; }

        /* BARIS TOMBOL OPERATOR (* : + - =) */
        .rom-grid-second {
            display: grid !important;
            grid-template-columns: repeat(5, 1fr) !important;
            column-gap: 4px !important;
            border: none !important;
            padding: 0 !important;
            margin: -8px 0 25px 0 !important; /* Menaikkan operator ke atas sedikit */
            background: transparent !important;
            width: 100% !important;
            position: relative;
            z-index: 20;
        }
        .rom-grid-second button {
            height: 56px !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
            display: block !important;
            padding: 0 !important;
        }

        /* BARIS TOMBOL FUNGSI TERBAWAH */
        .row-bottom {
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            border: none !important;
            padding: 0 !important;
            margin: 5px 0 0 0 !important; /* Menurunkan baris ketiga ke bawah sedikit */
            background: transparent !important;
            width: 100% !important;
            position: relative;
            z-index: 20;
        }
        .row-bottom div {
            flex: 1.2 !important;
            display: flex !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .btn-pilih {
            width: 100% !important;
            height: 50px !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
        }
        .btn-edit {
            flex: 1 !important;
            height: 50px !important;
            margin: 0 8px !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
        }
        .btn-clear {
            flex: 1 !important;
            height: 50px !important;
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
        }

        /* PANEL MODAL MENU PILIH BESAR FULL SCREEN */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            border: 6px solid #000000;
            z-index: 9999;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .menu-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eeeeee;
            border-bottom: 2px solid #ccc;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            cursor: pointer;
            user-select: none;
        }
        .folder-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-dropdown-content {
            display: none;
            background: #ffffff;
        }

        .cucu-radio-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 25px 12px 45px;
            font-size: 16px;
            color: #444444;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            background: #ffffff;
        }
        .cucu-radio-row:hover {
            background: #fafafa;
        }

        .cucu-radio-row input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: #555;
        }

        .btn-hapus-riwayat {
            background: #ff2a2a;
            color: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            margin: 15px auto;
            cursor: pointer;
            font-size: 16px;
            display: block;
            width: 85%;
            text-align: center;
            box-shadow: 4px 4px 0px #000000;
        }

        .btn-close-menu {
            background: #ff2a2a;
            color: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 15px 0;
            cursor: pointer;
            font-size: 16px;
            width: 85%;
            display: block;
            margin: 10px auto;
            box-shadow: 4px 4px 0px #000000;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Screen Display -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Buttons Container -->
    <div class="buttons-container">
        <!-- Baris 1: Tombol Angka -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')" class="btn-num-0" type="button"></button>
            <button onclick="tekan('1')" class="btn-num-1" type="button"></button>
            <button onclick="tekan('2')" class="btn-num-2" type="button"></button>
            <button onclick="tekan('3')" class="btn-num-3" type="button"></button>
            <button onclick="tekan('4')" class="btn-num-4" type="button"></button>
            <button onclick="tekan('5')" class="btn-num-5" type="button"></button>
            <button onclick="tekan('6')" class="btn-num-6" type="button"></button>
            <button onclick="tekan('7')" class="btn-num-7" type="button"></button>
            <button onclick="tekan('8')" class="btn-num-8" type="button"></button>
            <button onclick="tekan('9')" class="btn-num-9" type="button"></button>
        </div>

        <!-- Baris 2: Tombol Operator -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')" type="button"></button>
            <button onclick="tekan(':')" type="button"></button>
            <button onclick="tekan('+')" type="button"></button>
            <button onclick="tekan('-')" type="button"></button>
            <button onclick="hitungHasil()" type="button"></button>
        </div>

        <!-- Baris 3: Tombol Fungsi Navigasi Terbawah -->
        <div class="row-bottom">
            <div style="flex: 1.2; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button"></button>
            </div>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button"></button>
            <button onclick="handleClearClick()" class="btn-clear" type="button"></button>
    </div>
    </div>

    <!-- MODAL MENU PILIH BESAR / FULL SCREEN -->
    <div id="dropdown-menu" class="dropdown-menu">
        <div class="menu-title-bar">
            <span>-- Pilih Menu --</span>
            <span>▼</span>
        </div>
        
        <!-- 1. FOLDER ANAK: SIMBOL -->
        <div class="folder-header" onclick="toggleFolder('simbol-panel', 'arrow-simbol')">
            <span>📁 -- simbol --</span>
            <span id="arrow-simbol">▼</span>
        </div>
        <div id="simbol-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('.', 'simbol-opt')">
                <span>. (Titik Desimal)</span>
                <input type="radio" name="simbol-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('%', 'simbol-opt')">
                <span>% (Persen)</span>
                <input type="radio" name="simbol-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('^', 'simbol-opt')">
                <span>^ (Pangkat)</span>
                <input type="radio" name="simbol-opt">
            </div>
        </div>

        <!-- 2. FOLDER ANAK: SIGMA -->
        <div class="folder-header" onclick="toggleFolder('sigma-panel', 'arrow-sigma')">
            <span>📁 -- sigma --</span>
            <span id="arrow-sigma">▼</span>
        </div>
        <div id="sigma-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('Σ', 'sigma-opt')">
                <span>Ketik Manual (Σ)</span>
                <input type="radio" name="sigma-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ3', 'sigma-opt')">
                <span>Hingga 3 (Σ3)</span>
                <input type="radio" name="sigma-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ5', 'sigma-opt')">
                <span>Hingga 5 (Σ5)</span>
                <input type="radio" name="sigma-opt">
            </div>
        </div>

                <!-- 3. FOLDER ANAK: RIWAYAT -->
        <div class="folder-header" onclick="toggleFolder('riwayat-panel', 'arrow-riwayat')">
            <span>📁 -- riwayat --</span>
            <span id="arrow-riwayat">▼</span>
        </div>
        <div id="riwayat-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihOpsiRekord(true, 'rad-on')">
                <span>Riwayat Hitungan (ON)</span>
                <input type="radio" name="riwayat-opt" id="rad-on" checked>
            </div>
            <div class="cucu-radio-row" onclick="pilihOpsiRekord(false, 'rad-off')">
                <span>Riwayat Hitungan (OFF)</span>
                <input type="radio" name="riwayat-opt" id="rad-off">
            </div>

            <!-- 🌟 KOTAK BARU: Tempat Menampilkan Teks Log Hitungan Terekam 🌟 -->
            <div id="history-box-content" style="max-height: 120px; overflow-y: auto; padding: 12px; margin: 10px 45px; background: #ffffff; font-size: 16px; font-weight: bold; text-align: right; border: 3px solid #000000; min-height: 40px; box-sizing: border-box;">
                Belum ada riwayat
            </div>
            
            <button type="button" class="btn-hapus-riwayat" onclick="hapusRiwayatPermanen(event)">Hapus</button>
        </div>


        <!-- Tombol Batal Keluar Menu -->
        <div style="padding-top: 10px; text-align: center;">
            <button type="button" class="btn-close-menu" onclick="tutupSemuaMenu()">KEMBALI KE KALKULATOR X</button>
        </div>
    </div>
</div>

<!-- Memanggil file logika JavaScript eksternal -->
<script src="script.js"></script>
</body>
</html>
