<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        .calculator {
            width: 380px;
            height: 730px;
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative; /* Menjadi patokan agar menu melayang pas di atas tombol */
        }

        .screen-container {
            flex: 1;
            border: 5px solid #000000;
            padding: 15px;
            background: #ffffff;
            box-sizing: border-box;
            margin-bottom: 15px;
            min-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        .buttons-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 42px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 48px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
        }

        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* 🌟 POSISI MENU DROPDOWN DIPERBAIKI (DILUAR FLEXBOX) 🌟 */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 75px; /* Mengambang tepat di atas baris tombol fungsi */
            left: 15px;
            width: calc(100% - 30px);
            background: #f9f9f9; /* Warna abu-abu terang kontras agar terlihat jelas */
            border: 4px solid #000000;
            box-shadow: 0px -5px 12px rgba(0,0,0,0.3);
            z-index: 9999; /* Dipaksa tampil di lapisan paling atas */
            padding: 10px;
            box-sizing: border-box;
        }
        .dropdown-item {
            padding: 12px 10px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px dashed #000000;
            cursor: pointer;
            text-align: left;
            color: #000;
        }
        .dropdown-item:last-child {
            border-bottom: none;
        }
        .dropdown-item:hover {
            background: #e5e5e5;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Screen Area -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Buttons Area -->
    <div class="buttons-container">
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <div class="rom-grid-second">
            <button onclick="tekan('*')">*</button>
            <button onclick="tekan(':')">:</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="hitungHasil()">=</button>
        </div>

        <div class="row-bottom">
            <div style="flex: 1.2; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
            </div>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>

    <!-- 🌟 SEKARANG DROPDOWN DILETAK KAN DI SINI (LAYER ATAS MANDIRI) 🌟 -->
    <div id="dropdown-menu" class="dropdown-menu">
        <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 6px; text-align: left;">Fungsi Pilihan:</div>
        <div class="dropdown-item" onclick="pilihItem('.')">. (Titik Desimal)</div>
        <div class="dropdown-item" onclick="pilihItem('%')">% (Persen)</div>
        <div class="dropdown-item" onclick="pilihItem('Σ')">Σ (Sigma)</div>
        <div class="dropdown-item" onclick="pilihItem('^')">^ (Pangkat)</div>
    </div>

</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function pilihItem(karakter) {
    tekan(karakter);
    // Menutup menu dropdown setelah item dipilih
    document.getElementById('dropdown-menu').style.display = "none";
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (isManualEdit || rumusBarisIni === "") return;
    
    // CEGAH ERROR SIGMA KOSONG
    // Jika user menekan tombol "=" saat di layar hanya ada simbol Sigma tanpa angka (misal: "Σ")
    if (rumusBarisIni === "Σ" || rumusBarisIni === "∑") {
        rumusBarisIni = "";
        renderLayar();
        return;
    }

    try {
        let ekspresi = rumusBarisIni;
        
        ekspresi = ekspresi.replace(/:/g, "/"); 
        ekspresi = ekspresi.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        ekspresi = ekspresi.replace(/(\d+)%/g, "($1/100)");
        
        // PARSING SIGMA KOMPUTASI AMAN
        ekspresi = ekspresi.replace(/[Σ∑\u03A3\u2211](\d+)/g, function(match, angka) {
            let total = 0; 
            let batas = parseInt(angka) || 0;
            for (let i = 1; i <= batas; i++) { total += i; } 
            return String(total);
        });

        ekspresi = ekspresi.replace(/\+\+/g, "+");
        ekspresi = ekspresi.replace(/\-\-/g, "+");

        let hasil = eval(ekspresi);
        
        // Jika hasil perhitungan menghasilkan NaN atau Error bawaan JavaScript
        if (isNaN(hasil)) {
            throw new Error("Invalid");
        }

        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:22px;">Format Error</div>`;
        renderLayar();
    }
}


function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isManualEdit ? "OK" : "EDIT";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}

// JAVASCRIPT UNTUK MEMBUKA PANEL MENU MELAYANG
function klikTombolPilih() {
    const menu = document.getElementById('dropdown-menu');
    menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
}
</script>
</body>
</html>
