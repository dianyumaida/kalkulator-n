<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom Rumus Logika</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: Arial, sans-serif;
            background-color: #2c3e50; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Wadah Utama Kalkulator - Mengunci Ukuran Gambar */
        .calculator-frame { 
            position: relative;
            width: 100%;
            max-width: 420px; 
            aspect-ratio: 4 / 7; 
            background-image: url('Folder/gambar/bodykal.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* LAYAR DIGITAL TRANSPARAN (Tanpa angka nol bawaan) */
        .screen-overlay { 
            position: absolute;
            top: 5.5%;  
            left: 9%;   
            width: 82%;      
            height: 14%;     
            background: transparent; 
            padding: 15px;
            display: flex;
            align-items: center;
            border: none; 
        }
        
        .display-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 32px; 
            font-weight: bold;
            text-align: right;
            color: #333; 
            outline: none;
        }

        /* LOGIKA RADIO RECORD (Ditempatkan di ruang kosong tengah gambar) */
        .record-panel {
            position: absolute;
            top: 42%;
            left: 5%;
            width: 90%;
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.8);
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
        .record-panel label { cursor: pointer; display: flex; align-items: center; gap: 4px; }

        /* AREA GRID 3 BARIS TOMBOL FISIK (Hanya berisi Simbol Anak sesuai chat pertama Anda) */
        .buttons-grid-overlay {
            position: absolute;
            top: 52%; 
            left: 4%;        
            width: 92%;      
            height: 30%;     
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Diatur 4 kolom agar pas kotak gambar */
            gap: 6px;        
            border: 2px dashed #28a745; 
        }

        /* AREA 3 TOMBOL MENU UTAMA DI PALING BAWAH */
        .bottom-menu-overlay {
            position: absolute;
            top: 84%; 
            left: 4%;
            width: 92%;
            height: 9%;
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr; 
            gap: 6px;
        }

        /* Gaya Tombol Warna Merah Pembantu Koreksi */
        .invisible-btn {
            background: rgba(220, 53, 69, 0.6); 
            border: 1px solid #dc3545;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 1px 1px #000;
        }
        .invisible-btn:active { background: rgba(220, 53, 69, 0.9); }

        /* Gaya Khusus Dropdown Menu Kuning Pembantu Koreksi */
        .dropdown-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .dropdown-wrapper select {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.85; 
            background: #ffc107;
            border: 1px solid #d39e00;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="calculator-frame">
    
    <!-- Layar Digital Transparan -->
    <div class="screen-overlay">
        <input type="text" id="mainDisplay" class="display-input" placeholder="" readonly>
    </div>

    <!-- Panel Radio Rekam Aktif / Tidak -->
    <div class="record-panel">
        <label><input type="radio" name="rekamLogika" id="rekamOn" checked> 🔴 Rekam Aktif</label>
        <label><input type="radio" name="rekamLogika" id="rekamOff"> ⚪ Tidak Aktif</label>
    </div>

    <!-- Jajaran Tombol Fisik Gambar (Hanya berisi Simbol Anak Anda) -->
    <div class="buttons-grid-overlay">
        <!-- Baris Fisik 1 -->
        <button class="invisible-btn" onclick="tekanKunci(',')">,</button>
        <button class="invisible-btn" onclick="tekanKunci('[')">[</button>
        <button class="invisible-btn" onclick="tekanKunci(']')">]</button>
        <button class="invisible-btn" onclick="tekanKunci('.')">.</button>

        <!-- Baris Fisik 2 -->
        <button class="invisible-btn" onclick="tekanKunci('^')">^</button>
        <button class="invisible-btn" onclick="tekanKunci('%')">%</button>
        <button class="invisible-btn" onclick="tekanKunci('Σ')">Σ</button>
        <button class="invisible-btn" onclick="tekanKunci('=')">=</button>

        <!-- Baris Fisik 3 (Kosong/Bisa diisi operator tambahan jika dibutuhkan nanti) -->
        <button class="invisible-btn" onclick="tekanKunci('+')">+</button>
        <button class="invisible-btn" onclick="tekanKunci('-')">-</button>
        <button class="invisible-btn" onclick="tekanKunci('*')">*</button>
        <button class="invisible-btn" onclick="tekanKunci('/')">/</button>
    </div>

    <!-- Area Menu Bawah (PILIH, EDIT, CLEAR) -->
    <div class="bottom-menu-overlay">
        
        <!-- Dropdown PILIH (Berisi Daftar Variabel Anak Aktif) -->
        <div class="dropdown-wrapper">
            <select id="pilihAnak" onchange="inputDropdown(this.value, 'anak')">
                <option value="">PILIH ▾</option>
                <option value="Variabel A">Anak A</option>
                <option value="Variabel B">Anak B</option>
                <option value="Variabel C">Anak C</option>
                <option value="Variabel D">Anak D</option>
                <option value="Variabel G">Anak G</option>
            </select>
        </div>

        <!-- Dropdown EDIT (Berisi Riwayat Aktivitas & Simbol) -->
        <div class="dropdown-wrapper">
            <select id="pilihSimbol" onchange="inputDropdown(this.value, 'simbol')">
                <option value="">EDIT ▾</option>
                <!-- Bagian Riwayat internal di dalam dropdown -->
                <optgroup label="--- RIWAYAT RUMUS ---" id="riwayatGroup">
                    <option value="">(Belum ada riwayat)</option>
                </optgroup>
                <optgroup label="--- SIMBOL LAIN ---">
                    <option value="[">[</option>
                    <option value="]">]</option>
                    <option value="=">=</option>
                </optgroup>
            </select>
        </div>

        <!-- Tombol Clear (Hanya membersihkan layar lokal, tidak menghapus riwayat) -->
        <button class="invisible-btn" style="background: rgba(220,53,69,0.6); font-size: 13px;" onclick="hapusLayar()">CLEAR</button>

    </div>
</div>

<script>
    const display = document.getElementById('mainDisplay');
    const rekamOn = document.getElementById('rekamOn');
    const riwayatGroup = document.getElementById('riwayatGroup');
    
    let riwayatMemori = [];

    function tekanKunci(karakter) {
        display.value += karakter;
        checkDanSimpanRiwayat();
    }

    function inputDropdown(val, tipe) {
        if (!val) return;

        // Jika yang dipilih adalah data dari panggulan riwayat rumus
        if (tipe === 'simbol' && riwayatMemori.includes(val)) {
            display.value = val;
        } else {
            // Memasukkan teks variabel anak atau simbol ke layar
            display.value += val;
            checkDanSimpanRiwayat();
        }

        // Reset tampilan dropdown ke teks utama
        document.getElementById(tipe === 'anak' ? 'pilihAnak' : 'pilihSimbol').selectedIndex = 0;
    }

    function checkDanSimpanRiwayat() {
        // Jika Radio "Rekam Aktif" dicentang, masukkan ke dalam memori riwayat dropdown
        if (rekamOn.checked && display.value.trim() !== "") {
            if (!riwayatMemori.includes(display.value)) {
                riwayatMemori.push(display.value);
                
                // Perbarui isi list di dalam dropdown EDIT secara langsung
                perbaruiTampilanRiwayat();
            }
        }
    }

    function perbaruiTampilanRiwayat() {
        // Bersihkan daftar lama di dalam optgroup riwayat
        riwayatGroup.innerHTML = "";
        
        // Masukkan semua daftar memori rumus terbaru
        riwayatMemori.forEach(rumus => {
            let opt = document.createElement('option');
            opt.value = rumus;
            opt.text = rumus;
            riwayatGroup.appendChild(opt);
        });
    }

    function hapusLayar() {
        display.value = "";
    }
</script>
</body>
</html>
