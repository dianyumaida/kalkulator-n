<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tampilan Kalkulator Matematika</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .kalkulator-container { max-width: 500px; background: white; padding: 25px; margin: 30px auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; }
        .screen { background: #eef2f3; padding: 20px; border-radius: 6px; min-height: 100px; margin-bottom: 20px; border: 1px solid #ddd; font-size: 18px; text-align: center; }
        h3 { text-align: center; color: #333; margin-top: 0; }
        .baris-rumus { margin: 15px 0; font-weight: bold; color: #222; }
    </style>
</head>
<body>

<div class="kalkulator-container">
    <h3>Layar Kalkulator Matematika</h3>
    
    <div class="screen">
        <!-- Menggunakan format teks ketikan biasa yang dijamin pasti muncul di HP apa pun -->
        <div class="baris-rumus">
            ((a/b) + (a/2)) / ((d : e) - (b/c) + 5^0.5) x (a/c) x c
        </div>
        
        <hr style="border: 0; border-top: 1px dashed #bbb; margin: 15px 0;">
        
        <div class="baris-rumus">
            = (a/b) x (a/c) x c
        </div>
    </div>
</div>

</body>
</html>
