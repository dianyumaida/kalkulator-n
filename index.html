<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Angka Nol Sejajar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        
        .calculator { 
            width: 100%; max-width: 460px; aspect-ratio: 460 / 520; 
            background: url('Folder/gambar/bodykal.jpg') no-repeat center; background-size: 100% 100%;
            padding: 3% 4.8% 5.5% 4.8% !important; margin-bottom: 20px; position: relative; display: flex; flex-direction: column;
        }
        
        /* POSISI ANGKA DI LAYAR UTAMA */
        #screen { 
            width: 100%; height: 160px !important; background: transparent; color: #000; text-align: right; 
            padding: 15px 25px 0 25px !important; font-size: 4.5rem; border: none; display: block !important; 
            line-height: 90px !important; overflow: hidden;
        }
        #screen.editing-active { background: rgba(255, 254, 187, 0.4); }
        
        /* PENGATURAN BARIS TOMBOL */
        .row { display: flex !important; justify-content: space-between !important; margin-bottom: 9% !important; gap: 2.8% !important; padding: 0 1% !important; }
        
        /* BARIS PERTAMA (Berisi 10 tombol agar angka 0 sejajar bersama 1-9) */
        .row-top { gap: 1.8% !important; padding: 0 1.5% 0 1.2% !important; }
                /* Jarak Khusus Baris Ketiga: Diturunkan lagi agar sejajar pas dengan kotak gambar */
        .row-bottom { 
            margin-bottom: 0 !important; 
            margin-top: 7.5% !important; /* Diubah dari 5.5% menjadi 7.5% agar tombol turun pas ke tengah kotak gambar */
            gap: 5.5% !important; 
            padding: 0 1.5% !important; 
        }

                        /* PENGATURAN TEKS TOMBOL AGAR PAS DI TENGAH KOTAK */
        button { 
            flex: 1 !important; 
            height: 9.8vw !important; 
            max-height: 50px !important; 
            font-size: 1.3rem !important; /* Ukuran font sedikit diperbesar agar lebih jelas */
            font-weight: bold !important; 
            border: none !important; 
            border-radius: 4px !important; 
            cursor: pointer !important; 
            background: rgba(0, 0, 0, 0.04) !important; 
            color: #222 !important;
            
            /* MEMAKSA SIMBOL YANG NAIK UNTUK TURUN KE TENGAH KOTAK */
            display: block !important; /* Diubah dari inline-flex ke block agar line-height bekerja sempurna */
            text-align: center !important;
            padding: 0 !important; 
            margin: 0 !important;
            line-height: 9.8vw !important; /* Menyamakan tinggi baris teks dengan tinggi tombol agar teks pas di tengah */
            
            /* MEMATIKAN KOTAK BIRU DI HP */
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            -moz-tap-highlight-color: transparent !important;
        }
        button:active { background: rgba(0, 0, 0, 0.15) !important; }

        /* Khusus baris atas (0-9) tinggi barisnya disesuaikan juga */
        .row-top button { 
            font-size: 1.05rem !important; 
            line-height: 9.8vw !important;
        }

        /* AREA KLIK TOMBOL BAWAH TRANSPARAN TOTAL & ANTI KOTAK BIRU */
        .btn-pilih, .btn-edit, .btn-clear { 
            background: rgba(0, 0, 0, 0) !important; /* Menggunakan transparansi murni */
            color: transparent !important; 
            height: 12.5vw !important; 
            max-height: 58px !important; 
            cursor: pointer !important; 
            border: none !important;
            outline: none !important;
            
            /* MEMATIKAN TOTAL HIGHLIGHT BIRU PADA TOMBOL BAWAH */
            -webkit-tap-highlight-color: transparent !important;
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }
        
        /* Menghapus efek fokus outline saat tombol disentuh */
        button:focus, .btn-pilih:focus, .btn-edit:focus, .btn-clear:focus {
            outline: none !important;
            box-shadow: none !important;
        }

            
            /* Memaksa HP tidak memunculkan kotak biru saat tombol transparan ini ditekan */
            -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
            outline: none !important;
        }


        /* MENU DROPDOWN */
        .menu-container { width: 100%; max-width: 460px; border: 1px solid #ccc; border-radius: 8px; background: #f0f0f0; overflow: hidden; }
        .menu-header { background: #e0e0e0; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .menu-group { border-bottom: 1px solid #eee; }
        .group-header { background: #fff; padding: 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: 500; }
                /* Mengubah container riwayat agar bisa menampung daftar berderet ke bawah */
        #sec-riwayat {
            max-height: 200px; /* Batas tinggi kotak riwayat */
            overflow-y: auto; /* Memunculkan scroll bar jika riwayat sudah banyak */
            background: #fff;
        }

        /* Mengatur agar setiap baris teks riwayat turun ke bawah satu per satu */
        .item-row-history { 
            display: flex !important; 
            flex-direction: column !important; /* Membuat daftar berderet turun ke bawah */
            align-items: flex-start !important; 
            padding: 12px 20px; 
            color: #555; 
            border-top: 1px solid #f5f5f5; 
        }

        /* Mengatur style teks hitungan di dalam riwayat */
        .history-list-item {
            display: block;
            width: 100%;
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
            font-size: 0.95rem;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div id="screen">0</div>
        
        <!-- BARIS 1: Angka 0 diletakkan di sini agar sejajar lengkap (0, 1 sampai 9) -->
        <div class="row row-top">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>
        
        <!-- BARIS 2: Pas 6 kotak (Murni diisi Simbol Operator dan Titik) -->
        <div class="row">
            <button onclick="tekan('.')">.</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="tekan('*')">x</button>
            <button onclick="tekan('/')">:</button>
            <button onclick="hasil()">=</button>
        </div>
        
        <!-- BARIS 3: Kotak Ketiga Bawah Melapisi Desain Asli Gambar Anda -->
        <div class="row row-bottom">
            <!-- Menjalankan penarikan data folder saat tombol PILIH ditekan -->
            <button onclick="tarikDataFili()" class="btn-pilih">PILIH</button>
            <button id="btn-edit" onclick="modeEdit()" class="btn-edit">EDIT</button>
            <!-- Klik sekali untuk hapus 1 angka (DEL), klik cepat 2 kali untuk hapus total (CLEAR) -->
            <button onclick="del()" ondblclick="clearAll()" class="btn-clear">CLEAR</button>
        </div>
    </div>

    <!-- MENU DROPDOWN -->
    <div class="menu-container">
        <div class="menu-header" onclick="toggle('main-menu-content')"><span>-- Pilih Menu --</span><span>▼</span></div>
        <div id="main-menu-content">
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-simbol')"><span>📁 -- simbol --</span><span>▼</span></div>
                <div id="sec-simbol">
                    <label class="item-row" onclick="tekan('%')"><span>% (Persen)</span><input type="radio" name="m" id="rad-percent"></label>
                    <label class="item-row" onclick="tekan('Σ')"><span>Σ (Sigma)</span><input type="radio" name="m" id="rad-sigma"></label>
                    <label class="item-row" onclick="tekan('^')"><span>^ (Pangkat)</span><input type="radio" name="m" id="rad-pow"></label>
                </div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-algo')"><span>📁 -- algoritma --</span><span>▶</span></div>
                <div id="sec-algo" style="display:none;"><div class="item-row"><span>Segera Datang</span></div></div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-riwayat')"><span>📁 -- riwayat --</span><span>▼</span></div>
                <div id="sec-riwayat">
                    <div class="item-row-history">
                        <span id="h-txt">Belum ada riwayat</span>
                        <button onclick="delH()" style="background:#ff4d4d; color:white; padding:4px 10px; font-size:13px; border:none; border-radius:4px; cursor:pointer;">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scr = document.getElementById("screen");
        let isEdit = false;

        function tekan(v) {
            if(isEdit) return;
            scr.innerText = (scr.innerText === "0" && !"+-*/^%Σ".includes(v)) ? v : scr.innerText + v;
        }

        function hasil() {
            if(isEdit || scr.innerText === "0") return;
            try {
                let txt = scr.innerText;
                let riwayatAwal = txt;
                txt = txt.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
                txt = txt.replace(/(\d+)%/g, "($1/100)");
                txt = txt.replace(/(\d+)Σ/g, function(match, angka) {
                    let total = 0;
                    for (let i = 1; i <= parseInt(angka); i++) { total += i; }
                    return total;
                });
                let res = eval(txt);
                document.getElementById('h-txt').innerText = riwayatAwal + " = " + res;
                scr.innerText = res;
            } catch(e) { scr.innerText = "Error"; }
        }

        function del() { if(!isEdit) scr.innerText = scr.innerText.slice(0, -1) || "0"; }
        
        function clearAll() {
            scr.innerText = "0"; isEdit = false; scr.contentEditable = "false";
            document.getElementById("btn-edit").innerText = "EDIT";
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        }

        function modeEdit() {
            isEdit = !isEdit;
            scr.contentEditable = isEdit ? "true" : "false";
            document.getElementById("btn-edit").innerText = isEdit ? "OK" : "EDIT";
            if(isEdit) scr.focus();
        }

        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "none") ? "block" : "none";
        }
        
        function delH() { document.getElementById('h-txt').innerText = "Belum ada riwayat"; }

        /* FUNGSI TOMBOL PILIH: Untuk menarik data fili dari folder nanti */
        function tarikDataFili() {
            console.log("Fungsi tarik data fili aktif.");
            // Anda tinggal memasukkan kode penghubung folder Anda di sini
        }
    </script>
</body>
</html>
