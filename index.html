<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        .calculator {
            width: 380px;
            height: 730px;
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* AREA MONITOR LAYAR UTAMA */
        .screen-container {
            flex: 1;
            border: 5px solid #000000;
            padding: 15px;
            background: #ffffff;
            box-sizing: border-box;
            margin-bottom: 15px;
            min-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* PANEL KOTAK TOMBOL BAWAH */
        .buttons-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 42px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 48px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
        }

        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* PANEL PILIHAN UKURAN PENUH (FULL SCREEN MODAL) */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border: 6px solid #000000;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .menu-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #000000;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        /* HEADERS UNTUK DROPDOWN INTERNAL */
        .menu-header-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f0f0;
            font-weight: bold;
            border: 3px solid #000000;
            margin-top: 10px;
            padding: 12px;
            font-size: 17px;
            cursor: pointer;
        }
        
        .sub-dropdown-content {
            display: none;
            background: #fafafa;
            border-left: 3px solid #000;
            border-right: 3px solid #000;
            border-bottom: 3px solid #000;
            padding: 5px 0;
        }
        
        .menu-anak {
            padding: 8px 10px;
            font-weight: bold;
            color: #444;
            font-size: 15px;
            background: #eef2f3;
            text-align: left;
        }
        
        .menu-cucu-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 10px 30px;
            font-weight: normal;
            font-size: 15px;
            cursor: pointer;
            border-bottom: 1px dotted #eee;
        }
        
        .menu-cucu-row input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 18px;
            height: 18px;
        }

        .btn-close-menu {
            background: #ff2a2a;
            color: #ffffff;
            border: 2px solid #000000;
            font-weight: bold;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .history-list-box {
            max-height: 110px;
            overflow-y: auto;
            padding: 10px 15px;
            background: #ffffff;
            font-size: 15px;
            font-weight: bold;
            text-align: right;
            border-bottom: 1px solid #ccc;
        }
        
        .btn-hapus-riwayat {
            background: #ff2a2a;
            color: #ffffff;
            border: 2px solid #000;
            font-weight: bold;
            padding: 6px 12px;
            margin: 10px;
            cursor: pointer;
            font-size: 13px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Screen Display -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Buttons Container -->
    <div class="buttons-container">
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <div class="rom-grid-second">
            <button onclick="tekan('*')">*</button>
            <button onclick="tekan(':')">:</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="hitungHasil()">=</button>
        </div>

        <div class="row-bottom">
            <div style="flex: 1.2; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
            </div>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>

    <!-- MODAL MENU PILIH BESAR / FULL SCREEN -->
    <div id="dropdown-menu" class="dropdown-menu">
        <div class="menu-title-bar">
            <span style="font-weight: bold; font-size: 20px;">Daftar Fungsi Pilihan</span>
            <button class="btn-close-menu" onclick="tutupSemuaMenu()">BATAL ✕</button>
        </div>
        
        <!-- 1. DROPDOWN TITIK DESIMAL -->
        <div class="menu-header-btn" onclick="toggleInternalMenu('dot-sub-panel', 'dot-arrow')">
            <span>. (Titik Desimal Menu)</span>
            <span id="dot-arrow">▼</span>
        </div>
        <div id="dot-sub-panel" class="sub-dropdown-content">
            <div class="menu-anak">└─ Opsi Titik</div>
            <div class="menu-cucu-row" onclick="pilihCucu('.', 'dot-opt')">
                <span>Input Titik Desimal (.)</span>
                <input type="radio" name="dot-opt">
            </div>
        </div>

        <!-- 2. DROPDOWN PERSEN -->
        <div class="menu-header-btn" onclick="toggleInternalMenu('percent-sub-panel', 'percent-arrow')">
            <span>% (Persen Menu)</span>
            <span id="percent-arrow">▼</span>
        </div>
        <div id="percent-sub-panel" class="sub-dropdown-content">
            <div class="menu-anak">└─ Opsi Persen</div>
            <div class="menu-cucu-row" onclick="pilihCucu('%', 'percent-opt')">
                <span>Input Persen (%)</span>
                <input type="radio" name="percent-opt">
            </div>
        </div>
        
        <!-- 3. DROPDOWN SIGMA -->
        <div class="menu-header-btn" onclick="toggleInternalMenu('sigma-sub-panel', 'sigma-arrow')">
            <span>Σ (Sigma Menu)</span>
            <span id="sigma-arrow">▼</span>

 <div class="dropdown-item" onclick="pilihItem('^')">^ (Pangkat)</div>
    </div>

</div>
<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function pilihItem(karakter) {
    tekan(karakter);
    tutupSemuaMenu();
}

// FUNGSI UTAMA MEMBUKA DROPDOWN UTAMA
function klikTombolPilih() {
    document.getElementById('dropdown-menu').style.display = "block";
}

// BUKA TUTUP SUB-DROPDOWN SIGMA
function toggleSubDropdown(event) {
    if (event) event.stopPropagation();
    const subPanel = document.getElementById('sigma-sub-panel');
    const arrow = document.getElementById('sigma-arrow');
    
    if (subPanel.style.display === "block") {
        subPanel.style.display = "none";
        arrow.innerText = "▼";
    } else {
        subPanel.style.display = "block";
        arrow.innerText = "▲";
    }
}

// LOGIKA PILIHAN CUCU RADIO BUTTON
function pilihCucu(teksRumus) {
    const eventTarget = window.event ? window.event.currentTarget : null;
    if (eventTarget) {
        const radio = eventTarget.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
    }

    tekan(teksRumus);
    
    setTimeout(function() {
        tutupSemuaMenu();
        document.querySelectorAll('input[name="sigma-opt"]').forEach(r => r.checked = false);
    }, 180);
}

function tutupSemuaMenu() {
    document.getElementById('dropdown-menu').style.display = "none";
    document.getElementById('sigma-sub-panel').style.display = "none";
    document.getElementById('sigma-arrow').innerText = "▼";
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

// 🌟 LOGIKA PERHITUNGAN SUPER AMAN ANTI-ERROR 🌟
function hitungHasil() {
    if (isManualEdit || rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        
        // 1. Bersihkan jika ada simbol Sigma menggantung di ujung rumus tanpa angka (Contoh: "5+Σ")
        if (/[Σ∑\u03A3\u2211]$/.test(ekspresi)) {
            ekspresi = ekspresi.slice(0, -1);
        }
        
        // Jika setelah dibersihkan teks menjadi kosong atau hanya berisi operator biasa, batalkan perhitungan
        if (ekspresi === "" || ekspresi === "+" || ekspresi === "-" || ekspresi === "*" || ekspresi === ":") {
            rumusBarisIni = "";
            renderLayar();
            return;
        }

        // 2. Normalisasi pembagian dan perpangkatan dasar
        ekspresi = ekspresi.replace(/:/g, "/"); 
        ekspresi = ekspresi.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        ekspresi = ekspresi.replace(/(\d+)%/g, "($1/100)");
        
        // 3. LOGIKA DETEKSI SIGMA MANDIRI (Contoh: Mengubah "Σ5" menjadi "15")
        // Skrip ini mencari huruf Sigma yang diikuti oleh deretan angka (\d+)
        ekspresi = ekspresi.replace(/[Σ∑\u03A3\u2211](\d+)/g, function(match, angka) {
            let total = 0; 
            let batas = parseInt(angka) || 0;
            for (let i = 1; i <= batas; i++) { 
                total += i; 
            } 
            return String(total); // Hasil kalkulasi Sigma langsung dikirim berupa teks angka murni
        });

        // Jika masih ada sisa simbol Sigma terisolasi yang lolos dari filter angka di atas, hapus paksa
        ekspresi = ekspresi.replace(/[Σ∑\u03A3\u2211]/g, "0");

        // 4. Bersihkan tumpukan ganda tanda tambah/kurang agar tidak merusak komputasi JavaScript
        ekspresi = ekspresi.replace(/\+\+/g, "+");
        ekspresi = ekspresi.replace(/\-\-/g, "+");

        // 5. Eksekusi kalkulasi string rumus akhir
        let hasil = eval(ekspresi);
        
        // Simpan catatan ke riwayat papan layar
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        // Jika komputasi tetap mendeteksi kesalahan rumus matematika buatan user
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:22px;">Format Error</div>`;
        renderLayar();
    }
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isManualEdit ? "OK" : "EDIT";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>

</body>
</html>
