<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Fix</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .calculator-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* Menyesuaikan lebar layar HP */
        }

        .bg-image {
            width: 100%;
            display: block;
            height: auto;
        }

        /* LAYAR: Silakan ubah persen top/left jika letaknya kurang pas */
        #display {
            position: absolute;
            top: 4%;         
            left: 5%;        
            width: 90%;      
            height: 12%;     
            background-color: rgba(51, 51, 51, 0.9); 
            border: 2px solid #222;
            color: #ffffff;
            text-align: right;
            font-size: 32px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 12px;
        }

        /* BARIS 10 TOMBOL ANGKA (DI ATAS OPERATOR) */
        .number-row {
            position: absolute;
            bottom: 12%;     /* Jarak dari bawah gambar */
            left: 2%;        /* Jarak dari kiri gambar */
            width: 96%;      /* Lebar total baris angka */
            height: 7%;      /* Tinggi tombol angka */
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* 10 Kolom Menyamping */
            gap: 4px;
        }

        /* BARIS 5 TOMBOL OPERATOR (PALING BAWAH) */
        .operator-row {
            position: absolute;
            bottom: 2%;      /* Jarak dari paling bawah */
            left: 2%;        
            width: 96%;      /* Lebar total baris operator */
            height: 9%;      /* Tinggi tombol operator */
            display: grid;
            grid-template-columns: repeat(5, 1fr);  /* 5 Kolom Menyamping */
            gap: 6px;
        }

        /* TOMBOL UJI COBA (BERWARNA MERAH AGAR TERLIHAT POSISINYA) */
        .test-btn {
            background: rgba(255, 0, 0, 0.3); /* Warna merah transparan */
            border: 1px solid red;
            cursor: pointer;
            border-radius: 4px;
            outline: none;
        }
        
        .test-btn:active {
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <!-- Gambar kostum asli Anda -->
    <img src="Folder/gambar/bodykal.jpg" alt="Kalkulator" class="bg-image">

    <!-- Layar Utama -->
    <input type="text" id="display" readonly placeholder="0">
    
    <!-- Area 10 Tombol Angka -->
    <div class="number-row">
        <button class="test-btn" onclick="appendValue('1')"></button>
        <button class="test-btn" onclick="appendValue('2')"></button>
        <button class="test-btn" onclick="appendValue('3')"></button>
        <button class="test-btn" onclick="appendValue('4')"></button>
        <button class="test-btn" onclick="appendValue('5')"></button>
        <button class="test-btn" onclick="appendValue('6')"></button>
        <button class="test-btn" onclick="appendValue('7')"></button>
        <button class="test-btn" onclick="appendValue('8')"></button>
        <button class="test-btn" onclick="appendValue('9')"></button>
        <button class="test-btn" onclick="appendValue('0')"></button>
    </div>
    
    <!-- Area 5 Tombol Operator -->
    <div class="operator-row">
        <button class="test-btn" onclick="appendValue('*')"></button>
        <button class="test-btn" onclick="appendValue('/')"></button> <!-- Tombol Titik Dua (:) -->
        <button class="test-btn" onclick="appendValue('+')"></button>
        <button class="test-btn" onclick="appendValue('-')"></button>
        <button class="test-btn" onclick="calculate()"></button>      <!-- Tombol Sama Dengan (=) -->
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch (error) { display.value = 'Error'; }
    }
</script>

</body>
</html>
