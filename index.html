<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Akuntansi Akurat</title>
    <style>
        /* MENYESUAIKAN TOTAL DENGAN TAMPILAN LAYAR HP ANDA */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 🌟 GARIS PINGGIR DIHAPUS TOTAL & UKURAN ADAPTIF MENGIKUTI LAYAR HP 🌟 */
        .calculator {
            width: 100%;
            max-width: 450px; /* Batas maksimal layar HP standar */
            height: 100vh;    /* Tinggi penuh layar HP Anda */
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 100% 100%; /* Memaksa gambar mengikuti bentuk layar HP */
            background-position: center top;
            background-repeat: no-repeat;
            border: none !important; /* Jaminan tidak ada lagi garis bingkai hitam bawaan kode */
            box-shadow: none !important;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
        }

        /* AREA MONITOR LAYAR PUTIHAN ATAS (MENGIKUTI PROPORSI LAYAR HP) */
        .screen-container {
            position: absolute;
            top: 4%;
            left: 5%;
            width: 90%;
            height: 42%;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: transparent;
            z-index: 5;
        }

        .calc-row {
            font-size: 34px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 42px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* AREA STRUKTUR UTAMA LAPISAN TOMBOL */
        .buttons-container {
            position: absolute;
            top: 50%; /* Menempatkan seluruh blok tombol di area bawah gambar */
            left: 0;
            width: 100%;
            height: 50%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 0 12px 15px 12px; /* Jarak dinding agar tombol otomatis pas di tengah kotak */
        }

        /* 🌟 SISTEM LAYOUT FLEXBOX ADAPTIF (MENGIKUTI KERAPATAN KOTAK GAMBAR) 🌟 */
        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 25%; /* Membagi tinggi baris angka rata */
            margin-bottom: 10px;
        }

        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 30%; /* Membagi tinggi baris operator rata */
            margin-bottom: 10px;
        }

        .row-bottom {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 28%; /* Membagi tinggi baris fungsi bawah rata */
        }

        /* 🌟 SENSOR TOMBOL TRANSPARAN TOTAL AGAR TIDAK BERANTAKAN LA GIE 🌟 */
        button {
            flex: 1;
            background: transparent !important; /* 100% Transparan murni tanpa warna kotak mengganggu */
            border: none !important;            /* Hapus garis penguji yang merusak pemandangan */
            outline: none !important;
            cursor: pointer;
            height: 100%;
            margin: 0 2px; /* Memberi celah jarang horizontal otomatis antar tombol */
        }

        /* Jarak khusus tombol besar bawah agar pas menutupi warna kuning & merah gambar */
        .btn-pilih { flex: 1.2; }
        .btn-edit { flex: 1; margin: 0 6px; }
        .btn-clear { flex: 1; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Monitor Layar Transparan -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Lapisan Sensor Klik Adaptor Otomatis -->
    <div class="buttons-container">
        <!-- Baris 1: Angka (10 Kolom Rapat Otomatis Mengikuti Gambar) -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')" type="button"></button>
            <button onclick="tekan('1')" type="button"></button>
            <button onclick="tekan('2')" type="button"></button>
            <button onclick="tekan('3')" type="button"></button>
            <button onclick="tekan('4')" type="button"></button>
            <button onclick="tekan('5')" type="button"></button>
            <button onclick="tekan('6')" type="button"></button>
            <button onclick="tekan('7')" type="button"></button>
            <button onclick="tekan('8')" type="button"></button>
            <button onclick="tekan('9')" type="button"></button>
        </div>

        <!-- Baris 2: Operator (5 Kolom Rapat Otomatis Mengikuti Gambar) -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')" type="button"></button>
            <button onclick="tekan(':')" type="button"></button>
            <button onclick="tekan('+')" type="button"></button>
            <button onclick="tekan('-')" type="button"></button>
            <button onclick="hitungHasil()" type="button"></button>
        </div>

        <!-- Baris 3: Navigasi Fungsi Biasa -->
        <div class="row-bottom">
            <button onclick="void(0)" class="btn-pilih" type="button"></button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button"></button>
            <button onclick="handleClearClick()" class="btn-clear" type="button"></button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        ekspresi = ekspresi.replace(/:/g, "/"); 

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:24px;">Error</div>`;
        renderLayar();
    }
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
