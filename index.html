<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom</title>
    <style>
        /* Gaya Utama Kalkulator */
        .calculator {
            width: 320px;
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 5px 5px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 20px auto;
        }

        /* Layar Utama */
        .screen-container {
            border: 3px solid #000000;
            padding: 10px;
            margin-bottom: 15px;
            position: relative;
        }
        #screen {
            font-size: 55px;
            text-align: right;
            font-weight: normal;
            min-height: 65px;
            line-height: 65px;
            word-wrap: break-word;
        }

        /* Baris Tombol Angka (0-9) Horizontal */
        .numbers-row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            border-top: 1px solid #000;
            padding-top: 5px;
        }
        .numbers-row button {
            flex: 1;
            margin: 0 2px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            font-weight: bold;
            padding: 5px 0;
            cursor: pointer;
            font-size: 14px;
        }

        /* Baris Kotak-Kotak Tengah */
        .rom-grid {
            display: flex;
            margin-bottom: 15px;
            border: 3px solid #000000;
            padding: 6px;
            position: relative;
            background: #fff;
        }
        
        /* Indikator Operator di Sisi Kiri Kotak */
        .op-indicator {
            position: absolute;
            left: 2px;
            font-size: 11px;
            font-weight: bold;
            line-height: 12px;
            display: flex;
            flex-direction: column;
            z-index: 5;
        }

        /* Slot Kotak Vertikal */
        .grid-item {
            flex: 1;
            height: 45px;
            border: 2px solid #000000;
            margin: 0 2px;
            background: transparent;
        }

        /* Baris Fungsi Terbawah */
        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid #000000;
            padding: 8px;
            background: #eeeeee;
        }

        /* Gaya Tombol Fungsi Sesuai Sketsa */
        .btn-pilih {
            flex: 1.2;
            background: #ffffff;
            border: 2px solid #000000;
            font-weight: bold;
            padding: 8px 0;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
            color: #4a148c; /* Warna keunguan */
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00; /* Kuning */
            border: 2px solid #000000;
            font-weight: bold;
            padding: 8px 0;
            font-size: 14px;
            cursor: pointer;
            margin-right: 8px;
        }
        .btn-clear {
            flex: 1;
            background: #ff3333; /* Merah */
            border: 2px solid #000000;
            color: #ffffff;
            font-weight: bold;
            padding: 8px 0;
            font-size: 14px;
            cursor: pointer;
        }

        /* Dropdown Menu Melayang */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 115%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 3px solid #000000;
            box-shadow: 0px -4px 10px rgba(0,0,0,0.2);
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Bagian Atas: Layar & Tombol Angka -->
    <div class="screen-container">
        <div id="screen">0</div>
        <div class="numbers-row">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>
    </div>

    <!-- KOTAK BARIS 1: 9 Slot dengan Tanda Operator di Kiri -->
    <div class="rom-grid">
        <div class="op-indicator">
            <span>*</span>
            <span>:</span>
            <span>+</span>
        </div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>

    <!-- KOTAK BARIS 2: 7 Slot Kosong -->
    <div class="rom-grid">
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>

    <!-- BARIS 3: Tombol Fungsi Utama -->
    <div class="row-bottom" style="position: relative;">
        
        <div style="flex: 1.2; display: flex; position: relative;">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
            
            <!-- Isi Dropdown Menu -->
            <div id="dropdown-menu" class="dropdown-menu">
                <div style="font-weight: bold; border-bottom: 1px solid #000; padding-bottom: 5px;">Menu Pilihan</div>
                <div style="padding: 5px 0; font-size: 13px; cursor:pointer;" onclick="tekan('%')">% Persen</div>
                <div style="padding: 5px 0; font-size: 13px; cursor:pointer;" onclick="tekan('Σ')">Σ Sigma</div>
                <div style="padding: 5px 0; font-size: 13px; cursor:pointer;" onclick="tekan('^')">^ Pangkat</div>
            </div>
        </div>

        <button id="btn-edit" onclick="nodeEdit()" class="btn-edit" type="button">EDIT</button>
        <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
    </div>

</div>

<script>
const scr = document.getElementById("screen");
let isEdit = false;
let clickTimer = null;

function tekan(karakter) {
    if (isEdit) return;
    let v = String(karakter);
    if (scr.innerText === "0" && !"+-*/%x:^Σ".includes(v)) {
        scr.innerText = v;
    } else {
        scr.innerText += v;
    }
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            // Klik sekali: Hapus satu karakter (DEL)
            if (!isEdit) {
                scr.innerText = scr.innerText.length > 1 ? scr.innerText.slice(0, -1) : "0";
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        // Klik dua kali: Bersihkan semua (CLEAR)
        scr.innerText = "0";
    }
}

function nodeEdit() {
    isEdit = !isEdit;
    scr.contentEditable = isEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isEdit ? "OK" : "EDIT";
    if (isEdit) scr.focus();
}

function klikTombolPilih() {
    const menu = document.getElementById('dropdown-menu');
    menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
}
</script>

</body>
</html>
