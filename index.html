<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Dasar Akuntansi</title>
    <style>
        /* Desain Kalkulator Dasar Standar Tanpa Gambar */
        .calculator {
            width: 350px;
            height: 580px;
            background: #ffffff;
            border: 5px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 6px 6px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 20px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Area Layar Monitor */
        .screen-container {
            flex: 1;
            border: 4px solid #000000;
            padding: 10px;
            background: #ffffff;
            box-sizing: border-box;
            margin-bottom: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calc-row {
            font-size: 26px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 32px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* Struktur Grid Tombol */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rom-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            height: 48px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        button:active {
            background: #e0e0e0;
        }
        .btn-operator { background: #e5e5e5; }
        .btn-equal { background: #ffcc00; }
        .btn-clear { background: #ff2a2a; color: #ffffff; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Layar Utama -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Tombol Fisik -->
    <div class="buttons-container">
        <div class="rom-grid">
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
            <button onclick="tekan('*')" class="btn-operator">*</button>
            
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan(':')" class="btn-operator">:</button>
            
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('+')" class="btn-operator">+</button>
            
            <button onclick="tekan('0')">0</button>
            <button onclick="handleClearClick()" class="btn-clear">C</button>
            <button onclick="hitungHasil()" class="btn-equal">=</button>
            <button onclick="tekan('-')" class="btn-operator">-</button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    rumusBarisIni += String(karakter);
    renderLayar();
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        ekspresi = ekspresi.replace(/:/g, "/"); 

        let hasil = eval(ekspresi);
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:20px;">Error</div>`;
        renderLayar();
    }
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
