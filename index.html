<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Layar Besar Retro</title>
    <style>
        /* Kontainer Utama Kalkulator */
        .calculator {
            width: 380px;
            height: 750px; /* Tinggi total ditambah agar layar bisa maksimal */
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* Menyusun vertikal */
        }

        /* AREA LAYAR UTAMA (DIBESARKAN MAKSIMAL) */
        .screen-container {
            flex: 1; /* Mengambil seluruh sisa ruang atas (Sangat Besar) */
            border: 5px solid #000000;
            padding: 20px;
            background: #ffffff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-bottom: 15px;
            min-height: 350px;
        }
        
        #screen {
            font-size: 95px; /* Ukuran angka layar diperbesar ekstrim */
            text-align: right;
            font-weight: bold;
            word-wrap: break-word;
            line-height: 1;
            margin-top: auto; /* Mendorong angka ke posisi bawah layar */
            padding-bottom: 15px;
            overflow: hidden;
        }

        .screen-divider {
            border-top: 5px solid #000000;
            margin-top: 5px;
        }

        /* AREA KOTAK TOMBOL (DIRAPATKAN KE BAWAH) */
        .buttons-container {
            margin-top: auto; /* Memaksa seluruh tombol merapat ke bawah */
            display: flex;
            flex-direction: column;
            gap: 12px; /* Jarak rapat antar baris kotak */
        }

        /* BARIS KOTAK 1: ANGKA 0-9 */
        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 42px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* BARIS KOTAK 2: OPERATOR (* : + - =) */
        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 48px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
        }

        /* BARIS KOTAK 3: FUNGSI TERBAWAH (PILIH, EDIT, CLEAR) */
        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00; /* Kuning */
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a; /* Merah */
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* Dropdown Menu melayang ke atas */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 130%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            box-shadow: 0px -5px 12px rgba(0,0,0,0.3);
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
        }
        .dropdown-item {
            padding: 10px;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            text-align: left;
            color: #000;
        }
        .dropdown-item:hover {
            background: #f5f5f5;
        }

        .calc-log {
            font-size: 16px;
            color: #444;
            text-align: left;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- 1. AREA LAYAR MONITOR (BESAR & DOMINAN) -->
    <div class="screen-container">
        <div id="calc-flow" class="calc-log">Mulai perhitungan...</div>
        <div id="screen">0</div>
        <div class="screen-divider"></div>
    </div>

    <!-- 2. AREA KOTAK TOMBOL (MERAPAT DI BAWAH) -->
    <div class="buttons-container">
        
        <!-- BARIS KOTAK PERTAMA: Angka 0-9 -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <!-- BARIS KOTAK KEDUA: Operator Utama (* : + - =) -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')">*</button>
            <button onclick="tekan(':')">:</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="hitungHasil()">=</button>
        </div>

        <!-- BARIS KOTAK KETIGA: PILIH, EDIT, CLEAR -->
        <div class="row-bottom" style="position: relative;">
            
            <!-- Dropdown PILIH -->
            <div style="flex: 1.2; position: relative; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
                
                <div id="dropdown-menu" class="dropdown-menu">
                    <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 6px; text-align: left;">Fungsi & Simbol:</div>
                    <div class="dropdown-item" onclick="tekan('.')">. (Titik Desimal)</div>
                    <div class="dropdown-item" onclick="tekan('%')">% (Persen)</div>
                    <div class="dropdown-item" onclick="tekan('Σ')">Σ (Sigma)</div>
                    <div class="dropdown-item" onclick="tekan('^')">^ (Pangkat)</div>
                </div>
            </div>

            <!-- Tombol EDIT (Kuning) -->
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            
            <!-- Tombol CLEAR / DEL (Merah) -->
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>

    </div>
</div>

<script>
const scr = document.getElementById("screen");
const flow = document.getElementById("calc-flow");
let clickTimer = null;
let isManualEdit = false;

// Memasukkan input ke layar
function tekan(karakter) {
    if (isManualEdit) return;
    let v = String(karakter);
    
    // Jika layar masih default '0', ganti langsung dengan angka baru
    if (scr.innerText === "0" && !"+-*/%x:^Σ.".includes(v)) {
        scr.innerText = v;
    } else {
        // Mencegah pengetikan titik desimal ganda dalam satu bilangan
        if (v === "." && scr.innerText.endsWith(".")) return;
        scr.innerText += v;
    }
}

// Menghitung hasil rumus matematika di layar
function hitungHasil() {
    if (isManualEdit || scr.innerText === "0" || scr.innerText === "") return;
    try {
        let rumusAwal = scr.innerText;
        let ekspresi = rumusAwal;

        // Normalisasi teks visual ke operator JavaScript asli
        ekspresi = ekspresi.replace(/x/g, "*").replace(/:/g, "/");
        ekspresi = ekspresi.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        ekspresi = ekspresi.replace(/(\d+)%/g, "($1/100)");

        // Formula khusus Sigma Σ
        ekspresi = ekspresi.replace(/Σ(\d+)/g, function(match, angka) {
            let total = 0;
            for (let i = 1; i <= parseInt(angka); i++) { total += i; }
            return total;
        });

        // Eksekusi perhitungan aman
        let hasil = eval(ekspresi);
        
        // Perbarui log alur di bagian atas layar
        flow.innerText = `${rumusAwal} =`;
        scr.innerText = hasil;
    } catch(e) {
        scr.innerText = "Error";
    }
}

// Mengaktifkan pengetikan manual lewat keyboard di dalam layar kalkulator
function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    scr.contentEditable = isManualEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isManualEdit ? "OK" : "EDIT";
    if (isManualEdit) {
        scr.focus();
    } else {
        hitungHasil(); // Jalankan hitungan otomatis saat mode EDIT selesai (OK)
    }
}

// Kontrol Satu Tombol: Klik 1x hapus satu digit (DEL), Klik 2x hapus semua (CLEAR)
