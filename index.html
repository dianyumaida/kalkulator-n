<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        /* FRAME UTAMA KALKULATOR */
        #retro-calc-box-v3 {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            border-radius: 4px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            position: relative; 
            overflow: hidden;
        }

        /* AREA MONITOR LAYAR UTAMA */
        #retro-screen-view-v3 {
            position: absolute;
            top: 4.5%;    
            right: 5%;    
            width: 90%;   
            height: 42%;  
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            pointer-events: auto !important;
            z-index: 5;
        }

        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* AREA LAPISAN SENSOR TOMBOL */
        #retro-buttons-layer-v3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 10;
        }

        #retro-buttons-layer-v3 button {
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
            pointer-events: auto !important; 
            position: absolute; 
        }

        /* 🌟 POSISI PERSENTASE AWAL BARIS TOMBOL (DAPAT DISETEL LEWAT INPUT BAWAH) 🌟 */
        .rom-grid-first button  { height: 7%; }
        .rom-grid-second button { height: 9%; }
        .row-bottom button      { height: 8%; }
        
        /* Lebar dan Posisi Kolom Angka (Rata Tengah) */
        .btn-num-0 { left: 4%;   width: 8.5%; }
        .btn-num-1 { left: 13.5%; width: 8.5%; }
        .btn-num-2 { left: 23%;   width: 8.5%; }
        .btn-num-3 { left: 32.5%; width: 8.5%; }
        .btn-num-4 { left: 42%;   width: 8.5%; }
        .btn-num-5 { left: 51.5%; width: 8.5%; }
        .btn-num-6 { left: 61%;   width: 8.5%; }
        .btn-num-7 { left: 70.5%; width: 8.5%; }
        .btn-num-8 { left: 80%;   width: 8.5%; }
        .btn-num-9 { left: 89.5%; width: 8.5%; }

        /* Lebar dan Posisi Kolom Operator */
        .btn-op-mul { left: 4%;  width: 17%; }
        .btn-op-div { left: 23%; width: 17%; }
        .btn-op-add { left: 42%; width: 17%; }
        .btn-op-sub { left: 61%; width: 17%; }
        .btn-op-equal { left: 80%; width: 17%; }

        /* Lebar dan Posisi Kolom Fungsi Terbawah */
        .btn-pilih { left: 4%;  width: 28%; }
        .btn-edit  { left: 36%; width: 28%; }
        .btn-clear { left: 68%; width: 28%; }

        /* PANEL MODAL MENU PILIH BESAR FULL SCREEN */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            border: 6px solid #000000;
            z-index: 9999;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .menu-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eeeeee;
            border-bottom: 2px solid #ccc;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            cursor: pointer;
            user-select: none;
        }
        .folder-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-dropdown-content {
            display: none;
            background: #ffffff;
        }

        .cucu-radio-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 25px 12px 45px;
            font-size: 16px;
            color: #444444;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            background: #ffffff;
        }
        .cucu-radio-row:hover {
            background: #fafafa;
        }

        .cucu-radio-row input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: #555;
        }

        .btn-hapus-riwayat {
            background: #ff2a2a;
            color: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            margin: 15px auto;
            cursor: pointer;
            font-size: 16px;
            display: block;
            width: 85%;
            text-align: center;
            box-shadow: 4px 4px 0px #000000;
        }

        .btn-close-menu {
            background: #ff2a2a;
            color: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 15px 0;
            cursor: pointer;
            font-size: 16px;
            width: 85%;
            display: block;
            margin: 10px auto;
            box-shadow: 4px 4px 0px #000000;
            text-align: center;
        }

        /* PANEL SLIDER BYPASS UNTUK MENYETEL JARAK DI HP */
        #cache-bypass-tuner {
            width: 380px;
            margin: 10px auto;
            padding: 10px;
            background: #eaeaea;
            border: 2px solid #000;
            font-family: monospace;
            font-size: 12px;
            box-sizing: border-box;
        }
        .tuner-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .tuner-row input { width: 60%; }
    </style>
</head>
<body>

<div id="retro-calc-box">
    <!-- Screen Display -->
    <div id="retro-screen-view"></div>

    <!-- Area Lapisan Sensor Tombol Absolut -->
    <div id="retro-buttons-layer-v3">
        <!-- Kelompok Baris 1: Angka -->
        <div class="rom-grid-first" id="row-1-group">
            <button onclick="tekan('0')" class="btn-num-0" type="button"></button>
            <button onclick="tekan('1')" class="btn-num-1" type="button"></button>
            <button onclick="tekan('2')" class="btn-num-2" type="button"></button>
            <button onclick="tekan('3')" class="btn-num-3" type="button"></button>
            <button onclick="tekan('4')" class="btn-num-4" type="button"></button>
            <button onclick="tekan('5')" class="btn-num-5" type="button"></button>
            <button onclick="tekan('6')" class="btn-num-6" type="button"></button>
            <button onclick="tekan('7')" class="btn-num-7" type="button"></button>
            <button onclick="tekan('8')" class="btn-num-8" type="button"></button>
            <button onclick="tekan('9')" class="btn-num-9" type="button"></button>
        </div>

        <!-- Kelompok Baris 2: Operator -->
        <div class="rom-grid-second" id="row-2-group">
            <button onclick="tekan('*')" class="btn-op-mul" type="button"></button>
            <button onclick="tekan(':')" class="btn-op-div" type="button"></button>
            <button onclick="tekan('+')" class="btn-op-add" type="button"></button>
            <button onclick="tekan('-')" class="btn-op-sub" type="button"></button>
            <button onclick="hitungHasil()" class="btn-op-equal" type="button"></button>
        </div>

        <!-- Kelompok Baris 3: Fungsi Terbawah -->
        <div class="row-bottom" id="row-3-group">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button"></button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button"></button>
            <button onclick="handleClearClick()" class="btn-clear" type="button"></button>
        </div>
    </div>

    <!-- MODAL MENU PILIH BESAR / FULL SCREEN -->
    <div id="dropdown-menu" class="dropdown-menu">
        <div class="menu-title-bar">
            <span>-- Pilih Menu --</span>
            <span>▼</span>
        </div>
        
        <!-- FOLDER 1 -->
        <div class="folder-header" onclick="toggleFolder('simbol-panel', 'arrow-simbol')">
            <span>📁 -- simbol --</span>
            <span id="arrow-simbol">▼</span>
        </div>
        <div id="simbol-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('.', 'simbol-opt')">
                <span>. (Titik Desimal)</span>
                <input type="radio" name="simbol-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('%', 'simbol-opt')">
                <span>% (Persen)</span>
                <input type="radio" name="simbol-opt">
            </div>

            <div class="cucu-radio-row" onclick="pilihCucu('^', 'simbol-opt')">
                <span>^ (Pangkat)</span>
                <input type="radio" name="simbol-opt">
            </div>
        </div>

        <!-- FOLDER 2 -->
        <div class="folder-header" onclick="toggleFolder('sigma-panel', 'arrow-sigma')">
            <span>📁 -- sigma --</span>
            <span id="arrow-sigma">▼</span>
        </div>
        <div id="sigma-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('Σ', 'sigma-opt')">
                <span>Ketik Manual (Σ)</span>
                <input type="radio" name="sigma-opt">

            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ3', 'sigma-opt')">
                <span>Hingga 3 (Σ3)</span>
                <input type="radio" name="sigma-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ5', 'sigma-opt')">
                <span>Hingga 5 (Σ5)</span>
                <input type="radio" name="sigma-opt">
            </div>
        </div>

                <!-- 3. FOLDER ANAK: RIWAYAT -->
        <div class="folder-header" onclick="toggleFolder('riwayat-panel', 'arrow-riwayat')">
            <span>📁 -- riwayat --</span>
            <span id="arrow-riwayat">▼</span>
        </div>
        <div id="riwayat-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihOpsiRekord(true, 'rad-on')">
                <span>Riwayat Hitungan (ON)</span>
                <input type="radio" name="riwayat-opt" id="rad-on" checked>
            </div>
            <div class="cucu-radio-row" onclick="pilihOpsiRekord(false, 'rad-off')">
                <span>Riwayat Hitungan (OFF)</span>
                <input type="radio" name="riwayat-opt" id="rad-off">
            </div>

            <!-- 🌟 KOTAK BARU: Tempat Menampilkan Teks Log Hitungan Terekam 🌟 -->
            <div id="history-box-content" style="max-height: 120px; overflow-y: auto; padding: 12px; margin: 10px 45px; background: #ffffff; font-size: 16px; font-weight: bold; text-align: right; border: 3px solid #000000; min-height: 40px; box-sizing: border-box;">
                Belum ada riwayat
            </div>
            
            <button type="button" class="btn-hapus-riwayat" onclick="hapusRiwayatPermanen(event)">Hapus</button>
        </div>


        <!-- Tombol Batal Keluar Menu -->
        <div style="padding-top: 10px; text-align: center;">
            <button type="button" class="btn-close-menu" onclick="tutupSemuaMenu()">KEMBALI KE KALKULATOR X</button>
        </div>
    </div>
</div>

<!-- Memanggil file logika JavaScript eksternal -->
<script src="script.js"></script>
</body>
</html>
