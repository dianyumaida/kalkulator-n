<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Fisik Kustom</title>
    <!-- Library Math.js untuk pemrosesan turunan rumus matematika -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: Arial, sans-serif;
            background-color: #2c3e50; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Wadah Utama Kalkulator berbasis Ukuran Gambar */
        .calculator-frame { 
            position: relative;
            width: 100%;
            max-width: 400px; /* Sesuaikan dengan rasio gambar Anda */
            aspect-ratio: 4 / 7; /* Estimasi rasio HP kalkulator fisik */
            background-image: url('Folder/gambar/bodykal.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 1. LAYAR DIGITAL (Ditempatkan di area layar gambar Anda) */
        .screen-overlay { 
            position: absolute;
            top: 8%;     /* Geser % ini untuk paskan dengan posisi layar gambar */
            left: 8%;    /* Geser % ini untuk paskan dengan posisi layar gambar */
            width: 84%;  /* Lebar kotak layar transparan */
            height: 12%; /* Tinggi kotak layar transparan */
            background: rgba(220, 230, 215, 0.85); /* Efek kaca LCD transparan */
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid #333;
        }
        .display-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            text-align: right;
            color: #111;
        }
        .display-result {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            text-align: right;
            color: #222;
            border-top: 1px dashed #777;
            padding-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 2. PANEL TOMBOL TRANSPARAN OVERLAY */
        .buttons-overlay {
            position: absolute;
            top: 25%;    /* Batas atas mulainya tombol di gambar Anda */
            left: 6%;
            width: 88%;
            height: 70%; /* Total area jangkauan tombol ke bawah */
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Default 4 kolom tombol */
            gap: 8px;    /* Jarak antar tombol transparan */
        }

        /* Tombol tidak terlihat tetapi bisa diklik aktif */
        .invisible-btn {
            background: rgba(255, 255, 255, 0.01); /* Transparan total */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0.2); /* Efek sentuh di HP */
        }
        /* Efek visual kilas saat tombol ditekan di HP/Web */
        .invisible-btn:active {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Pengaturan Tombol Khusus Lebar */
        .span-2 { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator-frame">
    
    <!-- Lapisan Layar Digital di Atas Gambar -->
    <div class="screen-overlay">
        <input type="text" id="mainDisplay" class="display-input" placeholder="0" readonly>
        <div id="resultDisplay" class="display-result">Hasil d/dx...</div>
    </div>

    <!-- Lapisan Grid Tombol di Atas Gambar -->
    <div class="buttons-overlay">
        
        <!-- Baris 1: Kontrol Rekam & Fungsi -->
        <button class="invisible-btn" onclick="toggleRekam('ON')"></button> <!-- Area Rekam Aktif -->
        <button class="invisible-btn" onclick="toggleRekam('OFF')"></button> <!-- Area Tidak Aktif -->
        <button class="invisible-btn" onclick="muatRiwayat Cepat()"></button> <!-- Area Dropdown Riwayat -->
        <button class="invisible-btn" onclick="hapusLayar()"></button> <!-- Tombol Kosongkan/Hapus -->

        <!-- Baris 2: Simbol Karakter Anak -->
        <button class="invisible-btn" onclick="tekanKunci('x')"></button>
        <button class="invisible-btn" onclick="tekanKunci('a')"></button>
        <button class="invisible-btn" onclick="tekanKunci('b')"></button>
        <button class="invisible-btn" onclick="tekanKunci('c')"></button>

        <!-- Baris 3: Karakter Anak Lanjutan & Simbol Kurung -->
        <button class="invisible-btn" onclick="tekanKunci('d')"></button>
        <button class="invisible-btn" onclick="tekanKunci('g')"></button>
        <button class="invisible-btn" onclick="tekanKunci('(')"></button> <!-- Mengganti [ -->
        <button class="invisible-btn" onclick="tekanKunci(')')"></button> <!-- Mengganti ] -->

        <!-- Baris 4: Operator Matematika Kalkulus -->
        <button class="invisible-btn" onclick="tekanKunci('^')"></button>
        <button class="invisible-btn" onclick="tekanKunci('.')"></button>
        <button class="invisible-btn" onclick="tekanKunci('%')"></button>
        <button class="invisible-btn" onclick="tekanKunci('+')"></button>

        <!-- Baris 5: Tombol Eksekusi Utama -->
        <button class="invisible-btn" onclick="tekanKunci('-')"></button>
        <button class="invisible-btn span-3" style="grid-column: span 3;" onclick="hitungSamaDengan()"></button> <!-- Tombol Besar '=' -->
        
    </div>
</div>

<script>
    const display = document.getElementById('mainDisplay');
    const resultDisplay = document.getElementById('resultDisplay');
    
    let rekamStatus = true; // Default Rekam Aktif
    let riwayatMemori = [];
    let riwayatIndeks = 0;

    function tekanKunci(karakter) {
        display.value += karakter;
        if (rekamStatus) {
            if (!riwayatMemori.includes(display.value)) {
                riwayatMemori.push(display.value);
            }
        }
    }

    function toggleRekam(status) {
        rekamStatus = (status === 'ON');
        alert("Status Rekam: " + (rekamStatus ? "Aktif" : "Tidak Aktif"));
    }

    function muatRiwayatCepat() {
        if (riwayatMemori.length === 0) {
            alert("Riwayat masih kosong!");
            return;
        }
        // Menggilir riwayat lama setiap kali area riwayat di gambar ditekan
        display.value = riwayatMemori[riwayatIndeks];
        riwayatIndeks = (riwayatIndeks + 1) % riwayatMemori.length;
    }

    function hapusLayar() {
        display.value = "";
        resultDisplay.innerText = "Hasil d/dx...";
    }

    function hitungSamaDengan() {
        const rumus = display.value;
        if (!rumus) {
            resultDisplay.innerText = "Kosong";
            return;
        }
        try {
            // Melakukan kompilasi penyelesaian turunan d/dx terhadap variabel x
            const hasilTurunan = math.derivative(rumus, 'x');
            resultDisplay.innerText = hasilTurunan.toString();
        } catch (err) {
            resultDisplay.innerText = "Rumus tidak valid";
        }
    }
</script>
</body>
</html>
