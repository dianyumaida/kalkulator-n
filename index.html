<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; background: #fff; color: #333; }
        h3 { margin-top: 0; font-size: 16px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .grid-simbol { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 16px; }
        .radio-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .radio-item input { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>
    <h3>Pilih Anak Simbol:</h3>
    <form id="formSimbol">
        <div class="grid-simbol">
            <!-- Kurung dipisah satu-satu sesuai permintaan Anda -->
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="{"> Kurung Buka {</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="}"> Kurung Tutup }</label></div>
            
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="["> Kurung Siku [</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="]"> Kurung Siku ]</label></div>
            
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="("> Kurung Biasa (</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value=")"> Kurung Biasa )</label></div>
            
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="%"> Persen %</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="~"> Tilde ~</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="√"> Akar √</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="^"> Pangkat ^</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="°"> Derajat °</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="/"> Pecahan /</label></div>
        </div>
    </form>
</body>
</html>
