<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Fisik Kustom Bersih</title>
    <!-- Library Math.js untuk pemrosesan turunan rumus matematika -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: Arial, sans-serif;
            background-color: #2c3e50; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Wadah Utama Kalkulator berbasis Ukuran Gambar */
        .calculator-frame { 
            position: relative;
            width: 100%;
            max-width: 400px; 
            aspect-ratio: 4 / 7; 
            background-image: url('Folder/gambar/bodykal.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* LAYAR DIGITAL BERSIH (Tanpa teks panduan & tanpa garis putus-putus) */
        .screen-overlay { 
            position: absolute;
            top: 8%;     
            left: 8%;    
            width: 84%;  
            height: 12%; 
            background: rgba(220, 230, 215, 0.85); /* Efek kaca LCD transparan */
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: center; /* Membuat teks otomatis berada di tengah vertikal */
            border: 2px solid #333;
        }
        
        .display-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 24px; /* Ukuran angka disesuaikan agar lebih jelas */
            font-weight: bold;
            text-align: right;
            color: #111;
            outline: none;
        }

        /* PANEL TOMBOL TRANSPARAN OVERLAY */
        .buttons-overlay {
            position: absolute;
            top: 25%;    
            left: 6%;
            width: 88%;
            height: 70%; 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px;    
        }

        .invisible-btn {
            background: rgba(255, 255, 255, 0.01); 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0.2); 
        }
        
        .invisible-btn:active {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>

<div class="calculator-frame">
    
    <!-- Lapisan Layar Digital Bersih di Atas Gambar -->
    <div class="screen-overlay">
        <input type="text" id="mainDisplay" class="display-input" placeholder="0" readonly>
    </div>

    <!-- Lapisan Grid Tombol di Atas Gambar -->
    <div class="buttons-overlay">
        
        <!-- Baris 1: Kontrol Rekam & Fungsi -->
        <button class="invisible-btn" onclick="toggleRekam('ON')"></button> 
        <button class="invisible-btn" onclick="toggleRekam('OFF')"></button> 
        <button class="invisible-btn" onclick="muatRiwayatCepat()"></button> 
        <button class="invisible-btn" onclick="hapusLayar()"></button> 

        <!-- Baris 2: Simbol Karakter Anak -->
        <button class="invisible-btn" onclick="tekanKunci('x')"></button>
        <button class="invisible-btn" onclick="tekanKunci('a')"></button>
        <button class="invisible-btn" onclick="tekanKunci('b')"></button>
        <button class="invisible-btn" onclick="tekanKunci('c')"></button>

        <!-- Baris 3: Karakter Anak Lanjutan & Simbol Kurung -->
        <button class="invisible-btn" onclick="tekanKunci('d')"></button>
        <button class="invisible-btn" onclick="tekanKunci('g')"></button>
        <button class="invisible-btn" onclick="tekanKunci('(')"></button> 
        <button class="invisible-btn" onclick="tekanKunci(')')"></button> 

        <!-- Baris 4: Operator Matematika Kalkulus -->
        <button class="invisible-btn" onclick="tekanKunci('^')"></button>
        <button class="invisible-btn" onclick="tekanKunci('.')"></button>
        <button class="invisible-btn" onclick="tekanKunci('%')"></button>
        <button class="invisible-btn" onclick="tekanKunci('+')"></button>

        <!-- Baris 5: Tombol Eksekusi Utama -->
        <button class="invisible-btn" onclick="tekanKunci('-')"></button>
        <button class="invisible-btn" style="grid-column: span 3;" onclick="hitungSamaDengan()"></button> 
        
    </div>
</div>

<script>
    const display = document.getElementById('mainDisplay');
    
    let rekamStatus = true; 
    let riwayatMemori = [];
    let riwayatIndeks = 0;

    function tekanKunci(karakter) {
        // Jika layar sedang menampilkan hasil perhitungan, bersihkan dulu sebelum input baru
        if (display.getAttribute('data-hasil') === 'true') {
            display.value = '';
            display.removeAttribute('data-hasil');
        }
        
        display.value += karakter;
        
        if (rekamStatus) {
            if (!riwayatMemori.includes(display.value)) {
                riwayatMemori.push(display.value);
            }
        }
    }

    function toggleRekam(status) {
        rekamStatus = (status === 'ON');
        alert("Status Rekam: " + (rekamStatus ? "Aktif" : "Tidak Aktif"));
    }

    function muatRiwayatCepat() {
        if (riwayatMemori.length === 0) {
            alert("Riwayat masih kosong!");
            return;
        }
        display.value = riwayatMemori[riwayatIndeks];
        display.removeAttribute('data-hasil');
        riwayatIndeks = (riwayatIndeks + 1) % riwayatMemori.length;
    }

    function hapusLayar() {
        display.value = "0";
        display.removeAttribute('data-hasil');
    }

    function hitungSamaDengan() {
        const rumus = display.value;
        if (!rumus || rumus === "0") {
            display.value = "0";
            return;
        }
        try {
            // Memproses turunan d/dx dan langsung menimpa teks layar dengan hasil akhirnya
            const hasilTurunan = math.derivative(rumus, 'x');
            display.value = hasilTurunan.toString();
            
            // Tandai bahwa layar sedang menampilkan hasil perhitungan
            display.setAttribute('data-hasil', 'true');
        } catch (err) {
            display.value = "Error";
            display.setAttribute('data-hasil', 'true');
        }
    }
</script>
</body>
</html>
