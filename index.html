<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Setengah Layar</title>
    <style>
        /* Kontainer Utama dengan Tinggi Tetap untuk Membagi 50/50 */
        .calculator {
            width: 380px;
            height: 720px; /* Tinggi total diatur agar pembagian setengah terlihat jelas */
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* AREA LAYAR (SETENGAH ATAS - 50%) */
        .screen-container {
            height: 48%; /* Mengambil hampir setengah tinggi kalkulator */
            border: 5px solid #000000;
            padding: 15px;
            background: #ffffff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        #screen {
            font-size: 85px;
            text-align: right;
            font-weight: bold;
            word-wrap: break-word;
            line-height: 1;
            margin-top: auto; /* Memastikan angka menempel di bawah sebelum garis pembatas */
            padding-bottom: 10px;
        }

        .screen-divider {
            border-top: 4px solid #000000;
            margin-top: 5px;
        }

        /* AREA TOMBOL (SETENGAH BAWAH - 50%) */
        .buttons-container {
            height: 48%; /* Mengambil setengah bagian bawah */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* BARIS KOTAK 1: ANGKA 0-9 */
        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 40px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        /* BARIS KOTAK 2: OPERATOR (* : + - =) */
        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 45px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
        }

        /* BARIS KOTAK 3: FUNGSI TERBAWAH */
        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 10px 0;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 10px 0;
            font-size: 15px;
            cursor: pointer;
            margin: 0 10px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a;
            color: #ffffff;
            font-weight: bold;
            padding: 10px 0;
            font-size: 15px;
            cursor: pointer;
        }

        /* Dropdown Menu melayang ke atas */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 125%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            box-shadow: 0px -5px 12px rgba(0,0,0,0.3);
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
        }
        .dropdown-item {
            padding: 10px;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            text-align: left;
        }
        .dropdown-item:hover {
            background: #f5f5f5;
        }

        .calc-log {
            font-size: 15px;
            color: #555;
            text-align: left;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- 50% BAGIAN ATAS: LAYAR MONITOR -->
    <div class="screen-container">
        <div id="calc-flow" class="calc-log">Mulai perhitungan...</div>
        <div id="screen">0</div>
        <div class="screen-divider"></div>
    </div>

    <!-- 50% BAGIAN BAWAH: AREA TOMBOL -->
    <div class="buttons-container">
        
        <!-- BARIS KOTAK PERTAMA: Angka 0-9 -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <!-- BARIS KOTAK KEDUA: Operator Utama & Sama Dengan (* : + - =) -->
        <div class="rom-grid-second">
            <button onclick="pilihOperator('*')">*</button>
            <button onclick="pilihOperator(':')">:</button>
            <button onclick="pilihOperator('+')">+</button>
            <button onclick="pilihOperator('-')">-</button>
            <button onclick="prosesHasilAkhir()">=</button>
        </div>

        <!-- BARIS KOTAK KETIGA: PILIH, EDIT, CLEAR -->
        <div class="row-bottom" style="position: relative;">
            
            <!-- Dropdown PILIH -->
            <div style="flex: 1.2; position: relative; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
                
                <div id="dropdown-menu" class="dropdown-menu">
                    <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 6px; text-align: left;">Fungsi & Simbol:</div>
                    <!-- Titik Desimal dimasukkan ke sini sesuai permintaan -->
                    <div class="dropdown-item" onclick="tekan('.')">. (Titik Desimal)</div>
                    <div class="dropdown-item" onclick="pilihOperator('%')">% (Persen)</div>
                    <div class="dropdown-item" onclick="pilihOperator('Σ')">Σ (Sigma)</div>
                    <div class="dropdown-item" onclick="pilihOperator('^')">^ (Pangkat)</div>
                </div>
            </div>

            <!-- Tombol EDIT (Kuning) -->
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            
            <!-- Tombol CLEAR / DEL (Merah) -->
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>

    </div>
</div>

<script>
const scr = document.getElementById("screen");
const flow = document.getElementById("calc-flow");
let clickTimer = null;
let isManualEdit = false;

let totalAkumulasi = 0; 
let operatorAktif = "+"; 
let inputBaru = true;

function tekan(karakter) {
    if (isManualEdit) return;
    let v = String(karakter);
    
    if (inputBaru || scr.innerText === "0") {
        scr.innerText = v === "." ? "0." : v;
        inputBaru = false;
    } else {
        if (v === "." && scr.innerText.includes(".")) return; // Cegah titik ganda
        scr.innerText += v;
    }
}

// Logika hitung beruntun turun ke bawah saat operator ditekan
function pilihOperator(op) {
    if (isManualEdit) return;
    eksekusiKalkulasiLokal();
    operatorAktif = op === ":" ? "/" : op;
    inputBaru = true;
    flow.innerText = `Subtotal: ${totalAkumulasi} (${op})`;
}

function eksekusiKalkulasiLokal() {
    let nilaiSaatIni = parseFloat(scr.innerText) || 0;
    
    if (operatorAktif === "+") totalAkumulasi += nilaiSaatIni;
    else if (operatorAktif === "-") totalAkumulasi -= nilaiSaatIni;
    else if (operatorAktif === "*") totalAkumulasi *= nilaiSaatIni;
    else if (operatorAktif === "/") {
        if (nilaiSaatIni !== 0) totalAkumulasi /= nilaiSaatIni;
    }
    scr.innerText = totalAkumulasi;
}

// Fungsi tombol Sama Dengan (=) untuk menutup urutan hitungan
function prosesHasilAkhir() {
    if (isManualEdit) return;
    eksekusiKalkulasiLokal();
    flow.innerText = "Hasil Akhir Perhitungan:";
    inputBaru = true;
    operatorAktif = "+"; 
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    scr.contentEditable = isManualEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isManualEdit ? "OK" : "EDIT";
    if (isManualEdit) scr.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (scr.innerText.length > 1) {
                scr.innerText = scr.innerText.slice(0, -1);
            } else {
                scr.innerText = "0";
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
