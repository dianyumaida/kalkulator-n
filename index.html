<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom Pas Gambar</title>
    <!-- Library Math.js untuk pemrosesan turunan rumus matematika -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: Arial, sans-serif;
            background-color: #2c3e50; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Wadah Utama Kalkulator - Mengunci Ukuran Gambar agar Stabil */
        .calculator-frame { 
            position: relative;
            width: 100%;
            max-width: 420px; 
            aspect-ratio: 4 / 7; 
            background-image: url('Folder/gambar/bodykal.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* LAYAR DIGITAL TRANSPARAN (Tanpa latar warna, tanpa angka nol bawaan) */
        .screen-overlay { 
            position: absolute;
            top: 5.5%;  /* Geser naik turun posisi teks di dalam layar gambar */
            left: 9%;   
            width: 82%;      
            height: 14%;     
            background: transparent; 
            padding: 15px;
            display: flex;
            align-items: center;
            border: none; 
        }
        
        .display-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 32px; 
            font-weight: bold;
            text-align: right;
            color: #333; 
            outline: none;
        }

        /* PERBAIKAN GRID: Diberi margin-top besar agar terdorong pas ke area tombol hitam gambar */
        .buttons-grid-overlay {
            position: absolute;
            top: 66%; /* Menurunkan drastis posisi tombol merah agar masuk ke tombol hitam gambar */
            left: 4%;        
            width: 92%;      
            height: 17%; /* Menyesuaikan tinggi area 3 baris tombol hitam gambar */     
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 4px;        
            border: 2px dashed #28a745; /* Garis pandu hijau luar */
        }

        /* AREA 3 TOMBOL MENU UTAMA DI PALING BAWAH (Pilih, Edit, Clear) */
        .bottom-menu-overlay {
            position: absolute;
            top: 84%; /* Disesuaikan agar pas menimpa tombol kuning PILIH, EDIT, CLEAR */
            left: 4%;
            width: 92%;
            height: 9%;
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr; 
            gap: 6px;
        }

        /* Gaya Tombol Warna Merah Pembantu Koreksi */
        .invisible-btn {
            background: rgba(220, 53, 69, 0.55); 
            border: 1px solid #dc3545;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 1px 1px #000;
        }
        .invisible-btn:active { background: rgba(220, 53, 69, 0.85); }

        /* Gaya Khusus Dropdown Menu Kuning Pembantu Koreksi */
        .dropdown-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .dropdown-wrapper select {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.75; 
            background: #ffc107;
            border: 1px solid #d39e00;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="calculator-frame">
    
    <!-- Layar Digital Transparan -->
    <div class="screen-overlay">
        <!-- Placeholder dikosongkan agar tidak memunculkan angka nol di awal -->
        <input type="text" id="mainDisplay" class="display-input" placeholder="" readonly>
    </div>

    <!-- Kisi Tombol 3 Baris Atas Gambar -->
    <div class="buttons-grid-overlay">
        <!-- Baris Fisik 1 (Menimpa kotak kosong paling atas di gambar) -->
        <button class="invisible-btn" onclick="tekanKunci('7')">7</button>
        <button class="invisible-btn" onclick="tekanKunci('8')">8</button>
        <button class="invisible-btn" onclick="tekanKunci('9')">9</button>
        <button class="invisible-btn" onclick="tekanKunci('(')">(</button>
        <button class="invisible-btn" onclick="tekanKunci(')')">)</button>

        <!-- Baris Fisik 2 (Menimpa kotak bertanda *, :, +, - di gambar) -->
        <button class="invisible-btn" onclick="tekanKunci('*')">*</button>
        <button class="invisible-btn" onclick="tekanKunci('/')">:</button>
        <button class="invisible-btn" onclick="tekanKunci('+')">+</button>
        <button class="invisible-btn" onclick="tekanKunci('-')">-</button>
        <button class="invisible-btn" onclick="tekanKunci('.')">.</button>

        <!-- Baris Fisik 3 (Menimpa kotak angka 1, 2, 3, 0, = di gambar) -->
        <button class="invisible-btn" onclick="tekanKunci('1')">1</button>
        <button class="invisible-btn" onclick="tekanKunci('2')">2</button>
        <button class="invisible-btn" onclick="tekanKunci('3')">3</button>
        <button class="invisible-btn" onclick="tekanKunci('0')">0</button>
        <button class="invisible-btn" onclick="hitungSamaDengan()">=</button>
    </div>

    <!-- Area Menu Bawah (PILIH, EDIT, CLEAR) -->
    <div class="bottom-menu-overlay">
        
        <!-- Dropdown Pilih Anak -->
        <div class="dropdown-wrapper">
            <select id="pilihAnak" onchange="inputDropdown(this.value, 'anak')">
                <option value="">PILIH ▾</option>
                <option value="x">x</option>
                <option value="a">a</option>
                <option value="b">b</option>
                <option value="c">c</option>
                <option value="d">d</option>
                <option value="g">g</option>
            </select>
        </div>

        <!-- Dropdown Edit (Simbol Khusus & Rekam) -->
        <div class="dropdown-wrapper">
            <select id="pilihSimbol" onchange="inputDropdown(this.value, 'simbol')">
                <option value="">EDIT ▾</option>
                <option value="[">[</option>
                <option value="]">]</option>
                <option value="^">^</option>
                <option value="%">%</option>
                <option value="Σ">Σ</option>
                <option value="RKM_ON">🔴 Rekam ON</option>
                <option value="RKM_OFF">⚪ Rekam OFF</option>
                <option value="LIHAT_RWT">📜 Riwayat</option>
            </select>
        </div>

        <!-- Tombol Clear -->
        <button class="invisible-btn" style="background: rgba(220,53,69,0.6);" onclick="hapusLayar()">CLEAR</button>

    </div>
</div>

<script>
    const display = document.getElementById('mainDisplay');
    let rekamStatus = true; 
    let riwayatMemori = [];
    let riwayatIndeks = 0;

    function tekanKunci(karakter) {
        if (display.getAttribute('data-hasil') === 'true') {
            display.value = '';
            display.removeAttribute('data-hasil');
        }
        display.value += karakter;
        
        if (rekamStatus && !riwayatMemori.includes(display.value)) {
            riwayatMemori.push(display.value);
        }
    }

    function inputDropdown(val, tipe) {
        if (!val) return;

        if (val === "RKM_ON") {
            rekamStatus = true;
        } else if (val === "RKM_OFF") {
            rekamStatus = false;
        } else if (val === "LIHAT_RWT") {
            muatRiwayatCepat();
        } else {
            let nilaiReal = val;
            if (val === '[') nilaiReal = '(';
            if (val === ']') nilaiReal = ')';
            
            display.value += nilaiReal;
            
            if (rekamStatus && !riwayatMemori.includes(display.value)) {
                riwayatMemori.push(display.value);
            }
        }
        document.getElementById(tipe === 'anak' ? 'pilihAnak' : 'pilihSimbol').selectedIndex = 0;
    }

    function muatRiwayatCepat() {
        if (riwayatMemori.length === 0) return;
        display.value = riwayatMemori[riwayatIndeks];
        display.removeAttribute('data-hasil');
        riwayatIndeks = (riwayatIndeks + 1) % riwayatMemori.length;
    }

    function hapusLayar() {
        display.value = "";
        display.removeAttribute('data-hasil');
    }

    function hitungSamaDengan() {
        const rumus = display.value;
        if (!rumus) return;
        try {
            const hasilTurunan = math.derivative(rumus, 'x');
            display.value = hasilTurunan.toString();
            display.setAttribute('data-hasil', 'true');
        } catch (err) {
            display.value = "Error";
            display.setAttribute('data-hasil', 'true');
        }
    }
</script>
</body>
</html>
