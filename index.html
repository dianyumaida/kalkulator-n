<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Fitur Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        
        .calculator { 
            width: 100%; max-width: 460px; aspect-ratio: 460 / 520; 
            background: url('Folder/gambar/bodykal.jpg') no-repeat center; background-size: 100% 100%;
            padding: 3% 4.8% 5.5% 4.8% !important; margin-bottom: 20px; position: relative; display: flex; flex-direction: column;
        }
        
        /* 1. LAYAR UTAMA PENJUMLAHAN DIPERBESAR */
        #screen { 
            width: 100%; height: 210px !important; background: transparent; color: #000; text-align: right; 
            padding: 20px 25px 0 25px !important; font-size: 4.5rem; border: none; display: block !important; 
            line-height: 140px !important; overflow-y: auto; overflow-x: hidden; word-wrap: break-word; word-break: break-all;
        }
        #screen.editing-active { background: rgba(255, 254, 187, 0.4); }
        
        .row { display: flex !important; justify-content: space-between !important; margin-bottom: 7% !important; gap: 2.8% !important; padding: 0 1% !important; }
        .row-top { gap: 1.8% !important; padding: 0 1.5% 0 1.2% !important; }
        .row-bottom { margin-bottom: 0 !important; margin-top: 2% !important; gap: 5.5% !important; padding: 0 1.5% !important; position: relative; }

        button { 
            flex: 1 !important; height: 9.8vw !important; max-height: 50px !important; 
            font-size: 1.3rem !important; font-weight: bold !important; border: none !important; 
            border-radius: 4px !important; cursor: pointer !important; background: rgba(0, 0, 0, 0.04) !important; color: #222 !important;
            display: block !important; text-align: center !important; padding: 0 !important; margin: 0 !important; line-height: 9.8vw !important; 
            -webkit-tap-highlight-color: transparent !important;
        }
        button:active { background: rgba(0, 0, 0, 0.15) !important; }
        .row-top button { font-size: 1.05rem !important; line-height: 9.8vw !important; }

        .btn-pilih, .btn-edit, .btn-clear { 
            background: rgba(0, 0, 0, 0) !important; color: transparent !important; 
            height: 12.5vw !important; max-height: 58px !important; cursor: pointer !important; 
            border: none !important; outline: none !important; -webkit-tap-highlight-color: transparent !important;
        }

        /* 2. MENU PILIH GABUNG MASUK KE TOMBOL (MELAYANG KE ATAS) */
        .dropdown-pilih {
            display: none; position: absolute; bottom: 115%; left: 1.5%; width: 97%;
            background: #ffffff; border: 2px solid #ccc; border-radius: 8px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2); z-index: 999; overflow: hidden;
        }
        .menu-group { border-bottom: 1px solid #eee; }
        .group-header { background: #f8f9fa; padding: 10px 15px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; font-size: 14px; color: #333; }
        .item-row, .item-row-history { display: flex; justify-content: space-between; padding: 10px 20px; background: #fff; border-top: 1px solid #f5f5f5; cursor: pointer; font-size: 14px; color: #444; }
        #sec-riwayat { max-height: 120px; overflow-y: auto; background: #fff; }
        .history-list-item { display: block; width: 100%; padding: 5px 0; border-bottom: 1px dashed #eee; font-size: 13px; color: #555; text-align: left; }
    </style>
</head>
<body>

    <div class="calculator">
        <div id="screen">0</div>
        
        <!-- BARIS 1: Angka 0-9 -->
        <div class="row row-top">
            <button onclick="tekan('0')">0</button><button onclick="tekan('1')">1</button><button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button><button onclick="tekan('4')">4</button><button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button><button onclick="tekan('7')">7</button><button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>
        
        <!-- BARIS 2: Simbol . sampai = -->
        <div class="row">
            <button onclick="tekan('.')">.</button><button onclick="tekan('+')">+</button><button onclick="tekan('-')">-</button>
            <button onclick="tekan('*')">x</button><button onclick="tekan('/')">:</button>
            <!-- Tombol Sama Dengan (=) Aktif Normal -->
            <button onclick="hitungHasil()">=</button>
        </div>
        
            <!-- BARIS 3: Area Kotak Transparan Terbawah -->
    <div class="rom row-bottom" style="position: relative;">
        
        <!-- Pembungkus khusus agar tombol PILIH dan Dropdown Menu bersatu -->
        <div class="pilih-wrapper" style="position: relative; flex: 1; display: flex;">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button">PILIH</button>
            
            <!-- MENU DROPDOWN MELAYANG DI ATAS TOMBOL PILIH -->
            <div id="dropdown-menu" class="dropdown-menu" style="display: none; position: absolute; bottom: 125%; left: 0; width: 250px; background: #ffffff; border: 2px solid #ccc; border-radius: 8px; box-shadow: 0px -4px 15px rgba(0,0,0,0.2); z-index: 999; padding: 10px; box-sizing: border-box;">
                
                <!-- KOTAK 1: SIMBOL -->
                <div class="menu-group" style="border-bottom: 1px solid #eee; padding: 8px 0; text-align: left;">
                    <div class="group-header" onclick="toggleSub('sec-simbol')" style="background: #f8f9fa; padding: 8px 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; font-size: 14px;">
                        <span>💻 Simbol</span><span>▼</span>
                    </div>
                    <div id="sec-simbol" class="sub-menu">
                        <label class="item-row" onclick="tekan('%')" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 14px; color: #333; cursor: pointer;">
                            <span>% (Persen)</span><input type="radio" name="m" id="rad-percent">
                        </label>
                        <label class="item-row" onclick="tekan('Σ')" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 14px; color: #333; cursor: pointer;">
                            <span>Σ (Sigma)</span><input type="radio" name="m" id="rad-sigma">
                        </label>
                        <label class="item-row" onclick="tekan('^')" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 14px; color: #333; cursor: pointer;">
                            <span>^ (Pangkat)</span><input type="radio" name="m" id="rad-pow">
                        </label>
                    </div>
                </div>

                <!-- KOTAK 2: ALGORITMA -->
                <div class="menu-group" style="border-bottom: 1px solid #eee; padding: 8px 0; text-align: left;">
                    <div class="group-header" onclick="toggleSub('sec-algo')" style="background: #f8f9fa; padding: 8px 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; font-size: 14px;">
                        <span>💻 Algoritma</span><span>▶</span>
                    </div>
                    <div id="sec-algo" class="sub-menu" style="display: none; padding: 8px 12px; font-size: 14px; color: #777;">
                        <span>Segera Datang</span>
                    </div>
                </div>
                <!-- KOTAK 3: RIWAYAT -->
                <div class="menu-group" style="padding: 8px 0; text-align: left;">
                    <div class="group-header" onclick="toggleSub('sec-riwayat')" style="background: #f8f9fa; padding: 8px 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: bold; font-size: 14px;">
                        <span>💻 Riwayat</span><span>▼</span>
                    </div>
                    <div id="sec-riwayat" class="sub-menu" style="display: flex; flex-direction: column; align-items: flex-start; padding: 8px 12px;">
                        <div id="h-txt" style="width: 100%; max-height: 80px; overflow-y: auto; font-size: 13px; color: #333;">Belum ada riwayat</div>
                        <button onclick="delH()" type="button" style="margin-top: 8px; background: #ff4d4d; color: white; padding: 4px 10px; font-size: 11px; border: none; border-radius: 4px; cursor: pointer; display: inline-block !important; width: auto !important; height: auto !important; max-height: initial !important; line-height: initial !important;">Hapus</button>
                    </div>
                </div>

            </div> <!-- Penutup #dropdown-menu -->
        </div> <!-- Penutup .pilih-wrapper -->

        <button id="btn-edit" onclick="nodeEdit()" class="btn-edit" type="button">EDIT</button>
        <button onclick="del()" ondblclick="clearAll()" class="btn-clear" type="button">CLEAR</button>
    </div> <!-- Penutup .rom.row-bottom -->

</div> <!-- Penutup .calculator utama Anda -->

<script>
const scr = document.getElementById("screen");
let isEdit = false;

// Memastikan fungsi menangkap karakter tombol dengan benar
function tekan(karakter) {
    if (isEdit) return;
    
    // Konversi nilai string jika tidak sengaja bertipe object event
    let v = String(karakter);
    
    if (scr.innerText === "0" && !"+-*/%x:^Σ".includes(v)) {
        scr.innerText = v;
    } else {
        scr.innerText += v;
    }
}

function hitungHasil() {
    if (isEdit || scr.innerText === "0") return;
    try {
        let txt = scr.innerText;
        let riwayatAwal = txt;

        // Normalisasi operator visual ke operator komputasi JavaScript
        txt = txt.replace(/x/g, "*").replace(/:/g, "/");
        txt = txt.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        txt = txt.replace(/(\d+)%/g, "($1/100)");

        // Logika Eksekusi Sigma
        txt = txt.replace(/Σ(\d+)/g, function(match, angka) {
            let total = 0;
            for (let i = 1; i <= parseInt(angka); i++) { total += i; }
            return total;
        });

        let res = eval(txt);
        
        // Simpan ke Riwayat
        const containerRiwayat = document.getElementById('h-txt');
        if (containerRiwayat) {
            if (containerRiwayat.innerText.includes("Belum ada riwayat")) {
                containerRiwayat.innerHTML = "";
            }
            let barisBaru = document.createElement("div");
            barisBaru.className = "history-list-item";
            barisBaru.style.borderBottom = "1px dashed #eee";
            barisBaru.style.padding = "4px 0";
            barisBaru.innerText = riwayatAwal + " = " + res;
            containerRiwayat.appendChild(barisBaru);
            barisBaru.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        scr.innerText = res;
    } catch(e) {
        scr.innerText = "Error";
    }
}

function del() {
    if (!isEdit) {
        scr.innerText = scr.innerText.length > 1 ? scr.innerText.slice(0, -1) : "0";
    }
}

function clearAll() {
    scr.innerText = "0";
    isEdit = false;
    scr.contentEditable = "false";
    
    let btnEdit = document.getElementById("btn-edit");
    if (btnEdit) btnEdit.innerText = "EDIT";
    
    document.querySelectorAll('input[name="m"]').forEach(r => r.checked = false);
}

function nodeEdit() {
    isEdit = !isEdit;
    scr.contentEditable = isEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isEdit ? "OK" : "EDIT";
    if (isEdit) scr.focus();
}

function klikTombolPilih() {
    const menu = document.getElementById('dropdown-menu');
    menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
}

function toggleSub(id) {
    const el = document.getElementById(id);
    el.style.display = (el.style.display === "none") ? "block" : "none";
}

function delH() {
    document.getElementById('h-txt').innerHTML = "Belum ada riwayat";
}
</script>
</body>
</html>
