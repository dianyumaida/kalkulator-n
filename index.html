    <div class="menu-container">
        <div class="menu-header" onclick="toggleMainMenu()">
            <span>-- Pilih Menu --</span>
            <span id="main-arrow">▼</span>
        </div>
        <div id="main-menu-content" class="menu-content">
            <div class="menu-group">
                <div class="group-header" onclick="toggleGroup(this)">
                    <span>📁 -- simbol --</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="group-items">
                    <label class="item-row" onclick="pilihSimbol('%')">
                        <span>% (Persen)</span>
                        <input type="radio" name="calc-mode" id="rad-percent">
                    </label>
                    <label class="item-row" onclick="pilihSimbol('Σ')">
                        <span>Σ (Sigma)</span>
                        <input type="radio" name="calc-mode" id="rad-sigma">
                    </label>
                    <label class="item-row" onclick="pilihSimbol('^')">
                        <span>^ (Pangkat)</span>
                        <input type="radio" name="calc-mode" id="rad-pow">
                    </label>
                </div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggleGroup(this)">
                    <span>📁 -- algoritma --</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="group-items" style="display: none;">
                    <div class="item-row"><span>Fitur Segera Datang</span></div>
                </div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggleGroup(this)">
                    <span>📁 -- riwayat --</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="group-items">
                    <div class="item-row-history">
                        <span id="history-text">Belum ada riwayat</span>
                        <button onclick="hapusRiwayat()" class="btn-delete-history">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const elemenLayar = document.getElementById("screen");
        const tombolEdit = document.getElementById("btn-edit");
        let isEditModeActive = false;
        let memoriRiwayat = "";

        function tekanAngka(nilai) {
            if (isEditModeActive) return;
            if (elemenLayar.innerText === "0" && !"+-*/".includes(nilai)) {
                elemenLayar.innerText = nilai;
            } else {
                elemenLayar.innerText += nilai;
            }
        }
        function pilihSimbol(simbol) {
            if (isEditModeActive) return;
            if (elemenLayar.innerText === "0") {
                elemenLayar.innerText = simbol;
            } else {
                elemenLayar.innerText += simbol;
            }
        }
        function hitungHasil() {
            if (isEditModeActive) return;
            let teksLayar = elemenLayar.innerText;
            if (!teksLayar || teksLayar === "0") return;
            try {
                memoriRiwayat = teksLayar;
                let ekspresi = teksLayar.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
                let hasil = eval(ekspresi);
                elemenLayar.innerText = hasil;
                document.getElementById('history-text').innerText = memoriRiwayat + " = " + hasil;
            } catch (e) {
                elemenLayar.innerText = "Error";
            }
        }
        function hapusSatuAngka() {
            if (isEditModeActive) return;
            let teks = elemenLayar.innerText;
            elemenLayar.innerText = teks.slice(0, -1) || "0";
        }
        function bersihkanSemua() {
            elemenLayar.innerText = "0";
            isEditModeActive = false;
            elemenLayar.contentEditable = "false";
            elemenLayar.classList.remove("editing-active");
            tombolEdit.style.background = "#ffcc00";
            tombolEdit.innerText = "EDIT";
            document.getElementById("rad-percent").checked = false;
            document.getElementById("rad-sigma").checked = false;
            document.getElementById("rad-pow").checked = false;
        }
        function aktifkanModeEdit() {
            if (!isEditModeActive) {
                isEditModeActive = true;
                elemenLayar.contentEditable = "true";
                elemenLayar.classList.add("editing-active");
                elemenLayar.focus();
                tombolEdit.style.background = "#2ecc71";
                tombolEdit.innerText = "OK";
            } else {
                isEditModeActive = false;
                elemenLayar.contentEditable = "false";
                elemenLayar.classList.remove("editing-active");
                tombolEdit.style.background = "#ffcc00";
                tombolEdit.innerText = "EDIT";
            }
        }
        function toggleMainMenu() {
            const content = document.getElementById('main-menu-content');
            const arrow = document.getElementById('main-arrow');
            if (content.style.display === "none") {
                content.style.display = "block";
                arrow.innerText = "▼";
            } else {
                content.style.display = "none";
                arrow.innerText = "▲";
            }
        }
        function toggleGroup(element) {
            const groupItems = element.nextElementSibling;
            const arrow = element.querySelector('.arrow');
            if (groupItems.style.display === "none") {
                groupItems.style.display = "block";
                arrow.innerText = "▼";
            } else {
                groupItems.style.display = "none";
                arrow.innerText = "▶";
            }
        }
        function hapusRiwayat() {
            document.getElementById('history-text').innerText = "Belum ada riwayat";
            memoriRiwayat = "";
        }
    </script>
</body>
</html>
