<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator</title>
    
    <!-- TEMPATKAN KODE CSS DI SINI -->
    <style>
        .calculator-container {
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            border: 2px solid #000;
            padding: 5px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .calculator-screen {
            height: 150px;
            border: 2px solid #000;
            margin-bottom: 5px;
        }
        .calculator-row {
            display: flex;
            margin-bottom: 5px;
        }
        .calculator-row button {
            flex: 1;
            padding: 10px 0;
            font-weight: bold;
            border: 1px solid #000;
            background: #fff;
        }
        .btn-delete {
            flex: 2 !important; 
        }
        .btn-pilih {
            display: block;
            width: 100%;
            padding: 12px 0;
            text-align: center;
            border: 2px solid #000;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            box-sizing: border-box;
        }
        .calculator-row button:active, .btn-pilih:active {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <!-- Kode HTML Kalkulator Anda Berada di Sini -->
    <div class="calculator-container">
        <div class="calculator-screen"></div>
        <!-- ... dan seterusnya ... -->
    </div>

</body>
</html>
