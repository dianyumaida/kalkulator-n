<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pecahan Berlapis Sukses</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7ebe1; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .calculator { width: 360px; background-color: #ffffff; border: 2px solid #000; border-radius: 12px; padding: 20px; box-shadow: 5px 5px 0px #000000; }
        .display-container { width: 100%; height: 280px; border: 2px solid #000; margin-bottom: 15px; background-color: #fff; padding: 12px; box-sizing: border-box; text-align: left; overflow-y: auto; color: #d13438; font-weight: bold; font-size: 1.4rem; }
        .frac { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; padding: 4px 8px; margin: 4px; }
        .num { border-bottom: 2px solid #d13438; padding-bottom: 4px; margin-bottom: 2px; }
        .den { padding-top: 4px; min-height: 25px; }
        .history-item { margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 12px; line-height: 2.2; }
        .current-line { min-height: 60px; line-height: 2.2; display: inline-block; }
        .operator-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .operator-row button { background-color: #fce4d6; border: 2px solid #000; border-radius: 5px; padding: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .main-grid { display: grid; grid-template-columns: 1.2fr 2fr; gap: 15px; }
        .left-menu { background-color: #e2efda; border: 2px solid #000; border-radius: 5px; padding: 8px; display: flex; flex-direction: column; gap: 8px; }
        .left-menu button { padding: 10px 2px; font-weight: bold; font-size: 0.85rem; cursor: pointer; border: 1px solid #000; background-color: #fff; border-radius: 4px; }
        .number-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .number-grid button { background-color: #ffffff; border: 2px solid #000; border-radius: 5px; padding: 15px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .backspace-btn { background-color: #fff2cc !important; font-size: 1.4rem !important; }
        .delete-btn { background-color: #f8cbad !important; font-size: 0.95rem !important; font-weight: bold; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="calculator">
        <div id="display-screen" class="display-container"><div id="history-log"></div><div id="current-input-line" class="current-line"></div></div>
        <div class="operator-row">
            <button onclick="window.tekanOperator('+')">+</button><button onclick="window.tekanOperator('-')">-</button>
            <button onclick="window.tekanOperator('*')">×</button><button onclick="window.tekanOperator(':')">:</button>
            <button onclick="window.hitung()">=</button>
        </div>
        <div class="main-grid">
            <div class="left-menu">
                <button onclick="window.tekanKarakter('(')">(</button><button onclick="window.tekanKarakter(')')">)</button>
                <button onclick="window.tekanPecahan()">Pecahan</button><button onclick="window.tekanKarakter('%')">%</button>
            </div>
            <div class="number-grid">
                <button onclick="window.tekanKarakter('6')">6</button><button onclick="window.tekanKarakter('1')">1</button>
                <button onclick="window.tekanKarakter('7')">7</button><button onclick="window.tekanKarakter('2')">2</button>
                <button onclick="window.tekanKarakter('8')">8</button><button onclick="window.tekanKarakter('3')">3</button>
                <button onclick="window.tekanKarakter('9')">9</button><button onclick="window.tekanKarakter('4')">4</button>
                <button onclick="window.tekanKarakter('0')">0</button><button onclick="window.tekanKarakter('5')">5</button>
                <button class="backspace-btn" onclick="window.backspace()">←</button>
                <button class="delete-btn" onclick="window.hapusAll()">DELETE</button>
            </div>
        </div>
    </div>
    <script>
        const currentLine = document.getElementById("current-input-line");
        const historyLog = document.getElementById("history-log");
        const displayScreen = document.getElementById("display-screen");
        let targetAktif = currentLine;

        function bersihkanNolAwal(el) { if (el.innerHTML === "0" || el.innerHTML === "") el.innerHTML = ""; }

        window.tekanKarakter = function(char) { bersihkanNolAwal(targetAktif); targetAktif.innerHTML += char; displayScreen.scrollTop = displayScreen.scrollHeight; };
        window.tekanOperator = function(op) { bersihkanNolAwal(targetAktif); targetAktif.innerHTML += (op === "*" ? " × " : op === ":" ? " : " : " " + op + " "); displayScreen.scrollTop = displayScreen.scrollHeight; };

        window.tekanPecahan = function() {
            let kontenLama = currentLine.innerHTML; if (kontenLama === "0" || !kontenLama.trim()) return;
            let fracSpan = document.createElement("span"); fracSpan.className = "frac";
            let numSpan = document.createElement("span"); numSpan.className = "num"; numSpan.innerHTML = kontenLama;
            let denSpan = document.createElement("span"); denSpan.className = "den";
            fracSpan.appendChild(numSpan); fracSpan.appendChild(denSpan);
            currentLine.innerHTML = ""; currentLine.appendChild(fracSpan);
            targetAktif = denSpan; displayScreen.scrollTop = displayScreen.scrollHeight;
        };

        window.hitung = function() {
            let htmlKalkulasi = currentLine.innerHTML; if (!htmlKalkulasi.trim() || htmlKalkulasi === "0") return;
            try {
                let rumusMurni = htmlKalkulasi.replace(/<span class="frac"><span class="num">/g, "(").replace(/<\/span><span class="den">/g, ")/(").replace(/<\/span><\/span>/g, ")").replace(/×/g, "*").replace(/:/g, "/").replace(/([0-9\.]+)\s*%/g, "($1/100)");
                let hasilAngka = eval(rumusMurni); if (!isFinite(hasilAngka)) throw new Error();
                let hasilAkhir = Number(hasilAngka.toFixed(4)).toString();
                historyLog.innerHTML += `<div class="history-item">${htmlKalkulasi}<br>= ${hasilAkhir}</div>`;
                currentLine.innerHTML = hasilAkhir;
            } catch (err) {
                historyLog.innerHTML += `<div class="history-item">${htmlKalkulasi}<br>= Error</div>`;
                currentLine.innerHTML = "0";
            }
            targetAktif = currentLine; displayScreen.scrollTop = displayScreen.scrollHeight;
        };

        window.backspace = function() {
            if (targetAktif.innerHTML.length > 0) {
                let teks = targetAktif.innerHTML;
                targetAktif.innerHTML = teks.endsWith(" ") ? teks.slice(0, -3) : teks.slice(0, -1);
            } else if (targetAktif !== currentLine) {
                let parentFrac = targetAktif.closest(".frac");
                if (parentFrac) {
                    let isiPembilang = parentFrac.querySelector(".num").innerHTML;
                    let parentDariFrac = parentFrac.parentNode;
                    parentFrac.remove(); parentDariFrac.innerHTML = isiPembilang; targetAktif = parentDariFrac;
                }
            }
            if (!currentLine.innerHTML.trim()) { currentLine.innerHTML = "0"; targetAktif = currentLine; }
        };

        window.hapusAll = function() { currentLine.innerHTML = "0"; historyLog.innerHTML = ""; targetAktif = currentLine; };
        window.hapusAll();
    </script>
</body>
</html>
