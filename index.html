<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pecahan Bertingkat</title>
    
    <!-- Ambil pustaka visual matematika KaTeX dari CDN terpercaya -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>

    <style>
        /* --- CSS: DESAIN KOTAK KALKULATOR --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f7ebe1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator {
            width: 340px;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 5px 5px 0px #000000;
        }

        /* DISPLAY UTAMA: Rata kiri atas, mendukung scroll, memanjang ke bawah */
        .display-container {
            width: 100%;
            height: 200px;
            border: 2px solid #000;
            margin-bottom: 15px;
            background-color: #fff;
            padding: 12px;
            box-sizing: border-box;
            text-align: left;            /* Dimulai dari kiri atas sesuai gambar */
            overflow-y: auto;            /* Auto scroll ke bawah jika penuh */
            color: #d13438;              /* Warna tulisan merah */
        }

        .history-item {
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px dashed #ccc;
        }

        .current-line-container {
            min-height: 40px;
            margin-top: 5px;
        }

        /* Grid Tombol Operator Atas */
        .operator-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .operator-row button {
            background-color: #fce4d6;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Grid Bagian Bawah */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 15px;
        }

        /* Area Menu Sisi Kiri (Hijau Sesuai Gambar) */
        .left-menu {
            background-color: #e2efda;
            border: 2px solid transparent;
            border-radius: 5px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .left-menu button {
            padding: 8px 2px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid #000;
            background-color: #fff;
            border-radius: 4px;
        }

        /* Grid Angka Sisi Kanan */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .number-grid button {
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Tombol Delete Pink lebar */
        .delete-btn {
            grid-column: span 2;
            background-color: #f8cbad !important;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- Layar Tampilan Utama Kalkulator -->
        <div id="display-screen" class="display-container">
            <div id="history-log"></div>
            <div id="current-input-line" class="current-line-container"></div>
        </div>

        <!-- Baris Tombol Operator Utama -->
        <div class="operator-row">
            <button onclick="appendOperator('+')">+</button>
            <button onclick="appendOperator('-')">-</button>
            <button onclick="appendOperator('*')">×</button>
            <button onclick="appendOperator('/')">÷</button>
            <button onclick="calculate()">=</button>
        </div>

        <div class="main-grid">
            <!-- Sisi Kiri: Tambahan Fitur Tanda Kurung & Simbol Utama -->
            <div class="left-menu">
                <button onclick="appendSymbol('(')">(</button>
                <button onclick="appendSymbol(')')">)</button>
                <button onclick="appendOperator('/')">Pecahan</button>
                <button onclick="appendSymbol('%')">%</button>
            </div>

            <!-- Sisi Kanan: Angka & Tombol Hapus -->
            <div class="number-grid">
                <button onclick="appendNumber('6')">6</button>
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('3')">3</button>
                <button onclick="appendNumber('9')">9</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('5')">5</button>
                <button class="delete-btn" onclick="clearDisplay()">DELETE</button>
            </div>
        </div>
    </div>

    <!-- --- JAVASCRIPT: LOGIKA PENJUMLAHAN FUNGSIONAL --- -->
    <script>
        let rawMathExpression = ""; 
        
        const currentInputLine = document.getElementById("current-input-line");
        const historyLog = document.getElementById("history-log");
        const displayScreen = document.getElementById("display-screen");

        function appendNumber(num) {
            rawMathExpression += num;
            renderMathView();
        }

        function appendOperator(op) {
            // Memberikan spasi di sekeliling operator agar regex pendeteksi pecahan bekerja valid
            rawMathExpression += " " + op + " ";
            renderMathView();
        }

        function appendSymbol(sym) {
            rawMathExpression += sym;
            renderMathView();
        }

        // Mengubah teks input biasa menjadi bentuk LaTeX agar didukung visual KaTeX
        function convertToLaTeX(inputStr) {
            let text = inputStr.trim();
            if (!text) return "0";

            // Ganti simbol perkalian bintang (*) menjadi silang visual (\times)
            text = text.replace(/\*/g, " \\times ");

            // Formula Regex kuat untuk mendeteksi pembagian dan mengubahnya menjadi susunan pecahan vertikal \frac{atas}{bawah}
            let divisionRegex = /(\([^\)]+\)|[0-9\.]+%?)\s*\/ \s*(\([^\)]+\)|[0-9\.]+%?)/g;
            while (divisionRegex.test(text)) {
                text = text.replace(divisionRegex, function(match, p1, p2) {
                    return `\\frac{${p1}}{${p2}}`;
                });
            }
            return text;
        }

        function renderMathView() {
            let latexCode = convertToLaTeX(rawMathExpression);
            katex.render(latexCode, currentInputLine, { throwOnError: false });
        }

        function calculate() {
            let expr = rawMathExpression.trim();
            if (!expr) return;

            try {
                // Sempurnakan logika matematika persen (%) agar dikenali Javascript eval() (contoh: 1% diubah menjadi 1/100)
                let evalExpression = expr.replace(/([0-9\.]+)\s*%/g, "($1/100)");
                
                // Menghitung string matematika menggunakan mesin eval aman
                let resultRaw = eval(evalExpression);
                
                // Cek jika pembagian menghasilkan pembagi nol (Infinity)
                if(!isFinite(resultRaw)) {
                    throw new Error("DivByZero");
                }

                let resultFinal = Number(resultRaw.toFixed(4)).toString();

                // Membuat elemen log baru untuk ditaruh di atas
                const itemDiv = document.createElement("div");
                itemDiv.className = "history-item";
                
                // Satukan format pecahan matematika asal dengan jawabannya ke bawah
                let logLaTeX = convertToLaTeX(rawMathExpression) + " \\\\ = " + resultFinal;
                katex.render(logLaTeX, itemDiv, { throwOnError: false });
                
                historyLog.appendChild(itemDiv);
                
                // Gunakan hasil perhitungan terakhir sebagai angka awal baru
                rawMathExpression = resultFinal;
            } catch (error) {
                const errorDiv = document.createElement("div");
                errorDiv.className = "history-item";
                katex.render(convertToLaTeX(rawMathExpression) + " \\\\ = \\text{Error}", errorDiv, { throwOnError: false });
                historyLog.appendChild(errorDiv);
                rawMathExpression = "";
            }

            renderMathView();
            // Otomatis scroll layar ke baris terbawah
            displayScreen.scrollTop = displayScreen.scrollHeight;
        }

        function clearDisplay() {
            rawMathExpression = "";
            historyLog.innerHTML = "";
            renderMathView();
        }

        // Tampilkan angka 0 di awal saat web pertama kali dimuat
        renderMathView();
    </script>
</body>
</html>
