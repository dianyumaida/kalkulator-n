<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Digital Kustom</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            
            /* MEMANGGIL GAMBAR DARI FOLDER LOKAL ANDA */
            background-image: url('Folder/gambar/bodykal.jpg'); 
            
            /* PENGATURAN GAMBAR AGAR PAS DI LAYAR */
            background-size: cover;       /* Gambar menutupi seluruh layar */
            background-position: center;   /* Gambar selalu berada di tengah */
            background-repeat: no-repeat;  /* Gambar tidak mengulang (tile) */
            background-attachment: fixed;  /* Gambar tetap diam saat di-scroll */
        }
        .calculator {
            background-color: rgba(32, 32, 32, 0.85); /* Dibuat sedikit transparan (0.85) agar estetik */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px); /* Memberikan efek blur kaca pada kalkulator */
        }
        #display {
            width: 100%;
            height: 50px;
            background-color: #333;
            border: none;
            color: white;
            text-align: right;
            font-size: 24px;
            padding: 5px 10px;
            box-sizing: border-box;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #e0e0e0;
            transition: 0.2s;
        }
        button:hover { background-color: #d4d4d4; }
        .operator { background-color: #ff9500; color: white; }
        .operator:hover { background-color: #e08400; }
        .clear { background-color: #ff3b30; color: white; }
        .clear:hover { background-color: #d32f2f; }
        .equal { grid-column: span 2; background-color: #34c759; color: white; }
        .equal:hover { background-color: #28a745; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">x</button>
        <button onclick="appendValue('-')" class="operator">-</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('0')">0</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
