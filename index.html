<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Vertikal</title>
    <style>
        /* --- BAGIAN CSS (DESAIN KALKULATOR) --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f7ebe1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator {
            width: 320px;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 5px 5px 0px #000000;
        }

        /* Desain Layar Utama (Fix agar teks tidak melorot ke bawah) */
        .display-container {
            width: 100%;
            height: 140px;
            border: 2px solid #000;
            margin-bottom: 15px;
            background-color: #fff;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
        }

        /* Menampilkan rumus aktif */
        #history-screen {
            font-size: 1rem;
            color: #666;
            white-space: nowrap;
            overflow-x: auto;
            width: 100%;
            text-align: right;
        }

        /* Menampilkan angka masukan & Hasil utama */
        #display-screen {
            font-size: 2.2rem;
            color: #d13438;
            font-weight: bold;
            white-space: nowrap;
            overflow-x: auto;
            width: 100%;
            text-align: right;
        }

        /* Grid Tombol Operator Atas */
        .operator-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .operator-row button {
            background-color: #fce4d6;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Bagian Bawah: Grid Menu Kiri & Tombol Angka Kanan */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 15px;
        }

        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-box {
            border: 2px solid #000;
            background-color: #e2efda;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .number-grid button {
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Tombol Delete Pink lebar di bagian bawah */
        .delete-btn {
            grid-column: span 2;
            background-color: #f8cbad !important;
            color: #000;
        }

        button:active {
            transform: scale(0.95);
            background-color: #ddd !important;
        }
    </style>
</head>
<body>

    <!-- --- BAGIAN HTML (STRUKTUR KALKULATOR) --- -->
    <div class="calculator">
        
        <!-- Layar Monitor -->
        <div class="display-container">
            <div id="history-screen"></div>
            <div id="display-screen">0</div>
        </div>

        <!-- Baris Operator Atas -->
        <div class="operator-row">
            <button onclick="appendOperator('+')">+</button>
            <button onclick="appendOperator('-')">-</button>
            <button onclick="appendOperator('*')">×</button>
            <button onclick="appendOperator('/')">÷</button>
            <button onclick="calculate()">=</button>
        </div>

        <!-- Grid Utama Bawah -->
        <div class="main-grid">
            <!-- Sisi Kiri: Menu Fitur -->
            <div class="left-menu">
                <div class="menu-box">
                    <span>sudut</span>
                    <input type="radio" name="mode" checked>
                </div>
                <div class="menu-box">
                    <span>rumus</span>
                    <input type="radio" name="mode">
                </div>
            </div>

            <!-- Sisi Kanan: Angka & Delete -->
            <div class="number-grid">
                <button onclick="appendNumber('6')">6</button>
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('3')">3</button>
                <button onclick="appendNumber('9')">9</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('5')">5</button>
                <button class="delete-btn" onclick="clearDisplay()">DELETE</button>
            </div>
        </div>
    </div>

    <!-- --- BAGIAN JAVASCRIPT (LOGIKA PERHITUNGAN) --- -->
    <script>
        let currentInput = "0"; // Menyimpan angka yang sedang aktif diketik
        let expression = "";    // Menyimpan baris matematika lengkap untuk dievaluasi

        const displayScreen = document.getElementById("display-screen");
        const historyScreen = document.getElementById("history-screen");

        function updateScreen() {
            displayScreen.textContent = currentInput;
            historyScreen.textContent = expression;
        }

        function appendNumber(num) {
            if (currentInput === "0") {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateScreen();
        }

        function appendOperator(op) {
            // Pasang angka terakhir ke susunan rumus matematika eksekusi
            if (currentInput !== "0" || expression === "") {
                expression += currentInput + " " + op + " ";
            } else {
                // Jika operator ditekan berturut-turut, ganti operator terakhir
                expression = expression.slice(0, -3) + " " + op + " ";
            }
            currentInput = "0"; // reset pengetikan angka baru setelah operator
            updateScreen();
        }

        function calculate() {
            if (expression === "") return;
            
            // Tambahkan input angka paling akhir ke ekspresi penuh
            expression += currentInput;
            
            try {
                // Eksekusi string matematika menggunakan fungsi eval bawaan browser
                let rawResult = eval(expression);
                
                // Batasi desimal panjang jika ada pembagian sisa banyak
                let finalResult = Number(rawResult.toFixed(4)).toString();
                
                currentInput = finalResult; 
                expression = ""; // Reset riwayat atas setelah ditekan sama dengan
            } catch (error) {
                currentInput = "Error";
                expression = "";
            }
            updateScreen();
        }

        function clearDisplay() {
            currentInput = "0";
            expression = "";
            updateScreen();
        }
    </script>
</body>
</html>
