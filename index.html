<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sketsa - Sinkronisasi Semua Rumus & Data</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #f5ece2; /* Warna kertas sketsa */
            padding: 20px;
            min-height: 100vh;
        }

        /* Kontainer Utama Kalkulator Vertikal */
        .kalkulator-box {
            display: flex;
            flex-direction: column;
            width: 440px;
            background: #fff;
            border: 3px solid #333;
            box-shadow: 5px 5px 0px #333;
            padding: 15px;
            border-radius: 8px;
        }

        /* CONTAINER LAYAR UTAMA */
        .layer-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        /* 1. LAYER JERNIH (Tampilan Aliran Kiri Atas ke Bawah) */
        .layer-jernih {
            width: 100%;
            height: 200px;
            border: 3px solid #333;
            background-color: #f9f9f9;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            position: relative;
        }

        .layer-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .layer-title {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-clear-layer {
            background-color: #ff4d4d;
            color: white;
            border: 1px solid #333;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-clear-layer:hover {
            background-color: #ff1a1a;
        }

        /* Aliran log riwayat dari kiri atas berbaris turun ke bawah */
        .history-stream {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            font-size: 0.95rem;
            color: #333;
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 2px 0;
            width: 100%;
            word-wrap: break-word;
        }

        /* Input aktif di bawah layar jernih (rata kiri) */
        .current-input {
            width: 100%;
            text-align: left;
            font-size: 1.4rem;
            font-weight: bold;
            color: #000;
            border-top: 2px solid #333;
            padding-top: 5px;
            min-height: 35px;
            word-wrap: break-word;
        }

        /* PANEL TOMBOL SIMBOL DASAR */
        .panel-simbol {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 12px;
        }

        .btn-simbol {
            border: 2px solid #333;
            background: #ffe6cc;
            padding: 8px 2px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
        }

        .btn-simbol:active {
            background: #ccd;
        }

        /* BAGIAN BAWAH: Navigasi Dropdown PILIH & Tombol Angka */
        .tampilan-bawah {
            display: flex;
            gap: 12px;
        }

        /* 2. TOMBOL PILIH (Dropdown Vertikal Fleksibel) */
        .kolom-pilih {
            display: flex;
            flex-direction: column;
            width: 120px;
        }

        .select-pilih {
            width: 100%;
            flex: 1;
            border: 3px solid #333;
            background-color: #e6ffed; /* Warna hijau muda */
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            padding: 10px 5px;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            text-align: center;
            appearance: none; 
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='100' height='50'><polygon points='0,0 100,0 50,50' style='fill:%23333333;'/></svg>");
            background-repeat: no-repeat;
            background-position: center bottom 15px;
            background-size: 12px 6px;
        }

        .select-pilih option {
            writing-mode: horizontal-tb;
            text-orientation: initial;
            background-color: #fff;
            color: #333;
            font-size: 0.95rem;
            padding: 8px;
            text-align: left;
        }

        .select-pilih optgroup {
            writing-mode: horizontal-tb;
            text-orientation: initial;
            font-weight: bold;
            color: #555;
            background-color: #f0f0f0;
        }

        /* 3. GRID ANGKA & DELETE (Sisi Kanan) */
        .kolom-angka {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .grid-num {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-num {
            border: 3px solid #333;
            background: #fff;
            padding: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
        }

        .btn-num:active {
            background-color: #eee;
        }

        .btn-delete {
            width: 100%;
            border: 3px solid #333;
            background-color: #ffdde0;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-delete:active {
            background-color: #ffccd0;
        }
    </style>
</head>
<body>

    <div class="kalkulator-box">
        
        <!-- BAGIAN ATAS: LAYER CONTAINER -->
        <div class="layer-container">
            <div class="layer-jernih">
                <div class="layer-header">
                    <div class="layer-title">Layer Jernih</div>
                    <button class="btn-clear-layer" onclick="bersihkanLayerJernih()">CLEAR LAYER</button>
                </div>
                <div class="history-stream" id="historyStream"></div>
                <div class="current-input" id="activeScreen">0</div>
            </div>
        </div>

        <!-- PANEL TOMBOL SIMBOL MATEMATIKA DASAR -->
        <div class="panel-simbol">
            <button class="btn-simbol" onclick="tekanSimbol('+')">+</button>
            <button class="btn-simbol" onclick="tekanSimbol('-')">-</button>
            <button class="btn-simbol" onclick="tekanSimbol('*')">×</button>
            <button class="btn-simbol" onclick="tekanSimbol('/')">÷</button>
            <button class="btn-simbol" onclick="hitungSamaDengan()">=</button>
        </div>

        <!-- BAGIAN BAWAH -->
        <div class="tampilan-bawah">
            
            <!-- SISI KIRI: DROPDOWN PILIH (SINKRON RUMUS DAN DATA DATA) -->
            <div class="kolom-pilih">
                <select class="select-pilih" id="dropdownPilih" onchange="eksekusiDropdown(this.value)">
                    <option value="" disabled selected>PILIH ▼</option>
                    
                    <optgroup label="── FUNGSI & RUMUS ──">
                        <option value="log">log (Logaritma)</option>
                        <option value="ln">ln (Log Alami)</option>
                        <option value="sin">sin (Radian)</option>
                        <option value="cos">cos (Radian)</option>
                        <option value="tan">tan (Radian)</option>
                        <option value="akar">√ (Akar Kuadrat)</option>
                        <option value="kuadrat">x² (Kuadrat)</option>
                        <option value="integral">∫ (Integral Dasar)</option>
                    </optgroup>

                    <optgroup label="── DATA & KONSTANTA ──">
                        <option value="pi">π (Pi = 3.1415)</option>
                        <option value="euler">e (Euler = 2.7182)</option>
                    </optgroup>
                </select>
            </div>

            <!-- SISI KANAN: TOMBOL ANGKA SESUAI SKETSA -->
            <div class="kolom-angka">
                <div class="grid-num">
                    <button class="btn-num" onclick="tekanAngka('6')">6</button>
                    <button class="btn-num" onclick="tekanAngka('1')">1</button>
                    
                    <button class="btn-num" onclick="tekanAngka('7')">7</button>
                    <button class="btn-num" onclick="tekanAngka('2')">2</button>
                    
                    <button class="btn-num" onclick="tekanAngka('8')">8</button>
                    <button class="btn-num" onclick="tekanAngka('3')">3</button>
                    
                    <button class="btn-num" onclick="tekanAngka('9')">9</button>
                    <button class="btn-num" onclick="tekanAngka('4')">4</button>
                    
                    <button class="btn-num" onclick="tekanAngka('0')">0</button>
