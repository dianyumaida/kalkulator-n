<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Fix Total</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .calculator-container {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .bg-image {
            width: 100%;
            display: block;
            height: auto;
        }

        /* LAYAR DI PALING ATAS */
        #display {
            position: absolute;
            top: 1%;         
            left: 5%;        
            width: 90%;      
            height: 7%;     
            background-color: rgba(51, 51, 51, 0.9); 
            border: 2px solid #222;
            color: #ffffff;
            text-align: right;
            font-size: 24px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        /* BARIS 10 TOMBOL ANGKA (SEKARANG DINAIKKAN AGAR PAS KOTAK HITAM KECIL) */
        .number-row {
            position: absolute;
            bottom: 31%;     
            left: 1%;        
            width: 98%;      
            height: 9%;      
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
        }

        /* BARIS 5 TOMBOL OPERATOR (* : + - =) */
        .operator-row {
            position: absolute;
            bottom: 18%;     
            left: 1%;        
            width: 98%;      
            height: 11%;     
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
        }

        /* BARIS TOMBOL PALING BAWAH (PILIH, EDIT, CLEAR) */
        .bottom-row {
            position: absolute;
            bottom: 1%;      
            left: 1%;        
            width: 98%;      
            height: 15%;     
            display: grid;
            grid-template-columns: 2fr 1fr 2fr; /* Menyesuaikan lebar tombol Pilih, Edit, Clear */
            gap: 4px;
        }

        /* TOMBOL UJI COBA BERWARNA MERAH */
        .test-btn {
            background: rgba(255, 0, 0, 0.25); 
            border: 1px solid red;
            cursor: pointer;
            border-radius: 4px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .test-btn:active {
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <img src="Folder/gambar/bodykal.jpg" alt="Kalkulator" class="bg-image">

    <input type="text" id="display" readonly placeholder="0">
    
    <!-- 10 Tombol Angka (Pas di atas kotak-kotak kecil) -->
    <div class="number-row">
        <button class="test-btn" onclick="appendValue('1')"></button>
        <button class="test-btn" onclick="appendValue('2')"></button>
        <button class="test-btn" onclick="appendValue('3')"></button>
        <button class="test-btn" onclick="appendValue('4')"></button>
        <button class="test-btn" onclick="appendValue('5')"></button>
        <button class="test-btn" onclick="appendValue('6')"></button>
        <button class="test-btn" onclick="appendValue('7')"></button>
        <button class="test-btn" onclick="appendValue('8')"></button>
        <button class="test-btn" onclick="appendValue('9')"></button>
        <button class="test-btn" onclick="appendValue('0')"></button>
    </div>
    
    <!-- 5 Tombol Operator (Pas di atas kotak *, :, +, -, =) -->
    <div class="operator-row">
        <button class="test-btn" onclick="appendValue('*')"></button>
        <button class="test-btn" onclick="appendValue('/')"></button> 
        <button class="test-btn" onclick="appendValue('+')"></button>
        <button class="test-btn" onclick="appendValue('-')"></button>
        <button class="test-btn" onclick="calculate()"></button>      
    </div>

    <!-- Tombol Khusus Paling Bawah -->
    <div class="bottom-row">
        <button class="test-btn" onclick="alert('Tombol Pilih')"></button>
        <button class="test-btn" onclick="alert('Tombol Edit')"></button>
        <button class="test-btn" onclick="clearDisplay()"></button> <!-- Tombol CLEAR untuk menghapus -->
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch (error) { display.value = 'Error'; }
    }
</script>

</body>
</html>
