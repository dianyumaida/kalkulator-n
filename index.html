<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <object type="text/html" data="Folder/index.html" width="100%" height="800px">
   
</object>

    <style>
        body { font-family: Arial, sans-serif; padding: 10px; background: #fff; color: #333; margin: 0; }
        h3 { margin-top: 0; font-size: 16px; border-bottom: 2px solid #ccc; padding-bottom: 5px; color: #111; }
        .grid-simbol { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 16px; }
        .radio-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .radio-item input { transform: scale(1.3); cursor: pointer; }
        label { cursor: pointer; font-weight: 500; }
    </style>
</head>
<body>
    <h3>Pilih Simbol:</h3>
    <form id="formSimbol">
        <div class="grid-simbol">
            <!-- SISTEM KURUNG TERPISAH SATU-SATU -->
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="{">{</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="}">}</label></div>
            
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="[">[</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="]">]</label></div>
            
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="(">(</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value=")">)</label></div>
            
            <!-- SIMBOL MATEMATIKA UTAMA -->
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="%">%</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="~">~</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="sqrt(">√</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="^">^</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="°">°</label></div>
            
            <!-- SISTEM PECAHAN BERLAPIS BERBASIS FUNGSI STRUKTUR -->
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="frac(,)">/</label></div>
        </div>
    </form>
</body>
</html>
