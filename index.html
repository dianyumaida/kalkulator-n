<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Kustom</title>
    <style>
        /* Desain Utama Kalkulator Retro */
        .calculator {
            width: 380px;
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 20px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 20px auto;
            box-sizing: border-box;
        }

        /* AREA LAYAR UTAMA (DIBESARKAN) */
        .screen-container {
            border: 5px solid #000000;
            padding: 25px 15px 15px 15px;
            margin-bottom: 20px;
            background: #ffffff;
        }
        
        #screen {
            font-size: 85px; /* Layar diperbesar sesuai permintaan */
            text-align: right;
            font-weight: bold;
            min-height: 95px;
            line-height: 95px;
            word-wrap: break-word;
            margin-bottom: 5px;
            padding-right: 5px;
        }

        /* BARIS KOTAK PERTAMA: TOMBOL ANGKA 0-9 */
        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 5px solid #000000;
            padding: 8px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 45px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: inset 0 -2px 0 #ccc;
        }
        .rom-grid-first button:active {
            background: #e0e0e0;
        }

        /* BARIS KOTAK KEDUA: OPERATOR (* : + - .) */
        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            border: 5px solid #000000;
            padding: 8px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 50px;
            margin: 0 4px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
        }
        .rom-grid-second button:active {
            background: #f0f0f0;
        }

        /* BARIS KOTAK KETIGA: TOMBOL FUNGSI (PILIH, EDIT, CLEAR/DEL) */
        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 12px;
            background: #e5e5e5;
        }
        .btn-pilih {
            flex: 1.2;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00; /* Warna Kuning / OK / EDIT */
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a; /* Warna Merah */
            border: 4px solid #000000;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* Dropdown Menu melayang di atas tombol PILIH */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 125%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            box-shadow: 0px -5px 12px rgba(0,0,0,0.3);
            z-index: 999;
            padding: 12px;
            box-sizing: border-box;
        }
        .dropdown-item {
            padding: 10px;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            text-align: left;
        }
        .dropdown-item:hover {
            background: #f5f5f5;
        }

        /* Log Tampilan Kecil untuk Memantau Perhitungan Turun Ke Bawah */
        .calc-log {
            font-size: 14px;
            color: #666;
            text-align: left;
            min-height: 20px;
            margin-bottom: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Monitor Utama -->
    <div class="screen-container">
        <div id="calc-flow" class="calc-log">Mulai perhitungan...</div>
        <div id="screen">0</div>
    </div>

    <!-- BARIS KOTAK PERTAMA: Angka 0-9 -->
    <div class="rom-grid-first">
        <button onclick="tekan('0')">0</button>
        <button onclick="tekan('1')">1</button>
        <button onclick="tekan('2')">2</button>
        <button onclick="tekan('3')">3</button>
        <button onclick="tekan('4')">4</button>
        <button onclick="tekan('5')">5</button>
        <button onclick="tekan('6')">6</button>
        <button onclick="tekan('7')">7</button>
        <button onclick="tekan('8')">8</button>
        <button onclick="tekan('9')">9</button>
    </div>

    <!-- BARIS KOTAK KEDUA: Operator * : + - . -->
    <div class="rom-grid-second">
        <button onclick="pilihOperator('*')">*</button>
        <button onclick="pilihOperator(':')">:</button>
        <button onclick="pilihOperator('+')">+</button>
        <button onclick="pilihOperator('-')">-</button>
        <button onclick="tekan('.')">.</button>
    </div>

    <!-- BARIS KOTAK KETIGA: Navigasi & Fungsi Perintah -->
    <div class="row-bottom" style="position: relative;">
        
        <!-- Dropdown PILIH -->
        <div style="flex: 1.2; position: relative; display: flex;">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
            
            <div id="dropdown-menu" class="dropdown-menu">
                <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 6px; text-align: left;">Fungsi Tambahan:</div>
                <div class="dropdown-item" onclick="pilihOperator('%')">% (Persen)</div>
                <div class="dropdown-item" onclick="pilihOperator('Σ')">Σ (Sigma)</div>
                <div class="dropdown-item" onclick="pilihOperator('^')">^ (Pangkat)</div>
            </div>
        </div>

        <!-- Tombol EDIT / OK (Kuning) -->
        <button id="btn-edit" onclick="prosesHitungTurun()" class="btn-edit" type="button">EDIT</button>
        
        <!-- Tombol Gabungan CLEAR/DEL (Merah) -->
        <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
    </div>

</div>

<script>
const scr = document.getElementById("screen");
const flow = document.getElementById("calc-flow");
let clickTimer = null;

let totalAkumulasi = 0; 
let operatorAktif = "+"; 
let inputBaru = true;

// Memasukkan angka ke layar
function tekan(karakter) {
    let v = String(karakter);
    
    if (inputBaru || scr.innerText === "0") {
        scr.innerText = v;
        inputBaru = false;
    } else {
        scr.innerText += v;
    }
}

// Logika ketika operator beruntun ditekan (memicu hitung turun ke bawah)
function pilihOperator(op) {
    eksekusiKalkulasiLokal();
    operatorAktif = op === ":" ? "/" : (op === "x" ? "*" : op);
    inputBaru = true;
    flow.innerText = `Subtotal: ${totalAkumulasi} (${op})`;
}

// Fungsi internal untuk menghitung baris saat ini sebelum turun ke bawah
function eksekusiKalkulasiLokal() {
    let nilaiSaatIni = parseFloat(scr.innerText) || 0;
    
    if (operatorAktif === "+") totalAkumulasi += nilaiSaatIni;
    else if (operatorAktif === "-") totalAkumulasi -= nilaiSaatIni;
    else if (operatorAktif === "*") totalAkumulasi *= nilaiSaatIni;
    else if (operatorAktif === "/") {
        if (nilaiSaatIni !== 0) totalAkumulasi /= nilaiSaatIni;
    }
    else if (operatorAktif === "%") totalAkumulasi = totalAkumulasi * (nilaiSaatIni / 100);
    
    scr.innerText = totalAkumulasi;
}

// Memicu hasil akhir saat tombol kuning (EDIT/OK) ditekan
function prosesHitungTurun() {
    eksekusiKalkulasiLokal();
    flow.innerText = "Hasil Akhir Perhitungan:";
    inputBaru = true;
    operatorAktif = "+"; // Reset ke default untuk transaksi berikutnya
}

// Logika Satu Tombol untuk CLEAR dan DEL
function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            // Klik 1x: Hapus satu angka ke belakang (DEL)
            if (scr.innerText.length > 1) {
                scr.innerText = scr.innerText.slice(0, -1);
            } else {
                scr.innerText = "0";
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        // Klik 2x cepat: Reset Total (CLEAR ALL)
        scr.innerText = "0";
        totalAkumulasi = 0;
        operatorAktif = "+";
        inputBaru = true;
        flow.innerText = "Mulai perhitungan...";
    }
}

function klikTombolPilih() {
    const menu = document.getElementById('dropdown-menu');
    menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
}
</script>

</body>
</html>
