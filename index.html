<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Digital Kustom</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Membawa kalkulator agak ke atas */
            padding-top: 50px;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
            
            /* GAMBAR LATAR BELAKANG ANDA */
            background-image: url('Folder/gambar/bodykal.jpg'); 
            background-size: contain;      /* Agar gambar kustom Anda tidak terpotong */
            background-position: top center;/* Mulai dari atas tengah */
            background-repeat: no-repeat;
            background-color: #ffffff;    /* Warna dasar jika gambar tidak penuh */
        }
        
        .calculator {
            background-color: transparent; /* TRANSPARAN TOTAL */
            padding: 10px;
            width: 90%;
            max-width: 360px;
            box-shadow: none; /* Menghilangkan bayangan kotak luar */
        }
        
        #display {
            width: 100%;
            height: 60px;
            background-color: rgba(51, 51, 51, 0.9); /* Layar input tetap gelap agar angka terbaca */
            border: 2px solid #222;
            color: #fff;
            text-align: right;
            font-size: 28px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        /* TOMBOL DIGITAL DIBUAT SEMI-TRANSPARAN */
        button {
            padding: 18px 0;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            background-color: rgba(224, 224, 224, 0.7); /* Transparan 70% */
            color: #000;
            transition: 0.1s;
        }
        
        button:hover { background-color: rgba(212, 212, 212, 0.9); }
        
        .operator { background-color: rgba(255, 149, 0, 0.8); color: white; }
        .operator:hover { background-color: rgba(224, 132, 0, 1); }
        
        .clear { background-color: rgba(255, 59, 48, 0.8); color: white; }
        .clear:hover { background-color: rgba(211, 47, 47, 1); }
        
        .equal { grid-column: span 2; background-color: rgba(52, 199, 89, 0.8); color: white; }
        .equal:hover { background-color: rgba(40, 167, 69, 1); }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Layar diletakkan di atas gambar Anda -->
    <input type="text" id="display" readonly>
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">x</button>
        <button onclick="appendValue('-')" class="operator">-</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('0')">0</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch (error) { display.value = 'Error'; }
    }
</script>

</body>
</html>
