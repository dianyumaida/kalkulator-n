<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Akuntansi Akurat</title>
    <style>
        body {
            margin: 0; padding: 0; background: #f4f4f4;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow-x: hidden; 
        }
        .calculator {
            width: 380px; height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 380px 730px; background-position: center;
            background-repeat: no-repeat; border: none !important;
            box-shadow: none !important; box-sizing: border-box;
            position: relative; margin: 10px auto;
        }
        .screen-container {
            position: absolute; top: 35px; left: 20px;    
            width: 340px; height: 250px; padding: 10px;
            box-sizing: border-box; overflow-y: auto;
            display: flex; flex-direction: column;
            pointer-events: auto !important; z-index: 5; background: transparent;
        }
        .calc-row {
            font-size: 32px; font-weight: bold; color: #000000;
            line-height: 1.3; width: 100%; text-align: right; word-wrap: break-word;
        }
        .calc-row.latest-result {
            font-size: 40px; color: #1a237e; border-bottom: 2px dashed #000;
            padding-bottom: 4px; margin-bottom: 8px;
        }
        .buttons-container {
            position: absolute; top: 0; left: 0;
            width: 380px; height: 730px; pointer-events: none; z-index: 10;
        }
        .buttons-container button {
            background: rgba(255, 255, 255, 0.4) !important; 
            border: 1px solid rgba(0, 0, 0, 0.3) !important;   
            color: #000000 !important; font-weight: 900 !important;              
            font-size: 16px !important; outline: none !important;
            cursor: pointer !important; padding: 0 !important; margin: 0 !important;
            pointer-events: auto !important; position: absolute; 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 🌟 PERBAIKAN KOORDINAT HORIZONTAL AGAR DEMPET PAS DI TENGAH 🌟 */
        .rom-grid-first {
            position: absolute; top: 502px; left: 0; width: 380px; height: 36px;
            display: block !important; box-sizing: border-box; padding: 0; margin: 0;
        }
        .rom-grid-first button { top: 0px !important; height: 36px !important; width: 28px !important; }
        
        /* Posisi left ditarik ke kiri secara presisi mengikuti koreksi gambar Anda */
        .btn-num-0 { left: 17px !important; }
        .btn-num-1 { left: 50px !important; }   
        .btn-num-2 { left: 83px !important; }   
        .btn-num-3 { left: 118px !important; }  
        .btn-num-4 { left: 151px !important; }  
        .btn-num-5 { left: 188px !important; }  
        .btn-num-6 { left: 226px !important; }  
        .btn-num-7 { left: 265px !important; }  
        .btn-num-8 { left: 303px !important; }  
        .btn-num-9 { left: 341px !important; }

        .rom-grid-second {
            position: absolute; top: 578px; left: 0; width: 380px; height: 50px;
            display: flex !important; flex-direction: row !important;
            justify-content: flex-start !important; gap: 7.5px !important; 
            padding: 0 8px 0 9px; box-sizing: border-box;
        }
        .rom-grid-second button {
            top: 0px !important; height: 50px !important;
            width: 65px !important; font-size: 22px !important;
        }
        .btn-op-mul { left: auto !important; position: relative !important; }
        .btn-op-div { left: auto !important; position: relative !important; }
        .btn-op-add { left: auto !important; position: relative !important; }
        .btn-op-sub { left: auto !important; position: relative !important; }
        .btn-op-equal { left: auto !important; position: relative !important; }

        .row-bottom {
            position: absolute; top: 653px; left: 0; width: 380px; height: 48px;
            display: flex !important; flex-direction: row !important;
            justify-content: space-between !important; padding: 0 10px 0 10px; box-sizing: border-box;
        }
        .row-bottom button { top: 0px !important; height: 48px !important; }
        .btn-pilih { width: 122px !important; position: relative !important; }
        .btn-edit  { width: 106px !important; position: relative !important; }
        .btn-clear { width: 110px !important; font-size: 15px !important; position: relative !important; }

        .dropdown-menu {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: #f4f4f4;
            border: 6px solid #000000; z-index: 9999;
            box-sizing: border-box; overflow-y: auto;
        }
        .menu-title-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: #eeeeee; border-bottom: 2px solid #ccc; padding: 15px; font-weight: bold; font-size: 18px;
        }
        .folder-header {
            display: flex; justify-content: space-between; align-items: center;
            background: #ffffff; border-bottom: 1px solid #e0e0e0; padding: 14px 20px;
            font-size: 16px; font-weight: bold; color: #333333; cursor: pointer; user-select: none;
        }
        .folder-header span { display: flex; align-items: center; gap: 8px; }
        .sub-dropdown-content { display: none; background: #ffffff; }
        .cucu-radio-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 25px 12px 45px; font-size: 16px; color: #444444;
            cursor: pointer; border-bottom: 1px solid #f0f0f0; background: #ffffff;
        }
        .cucu-radio-row input[type="radio"] { cursor: pointer; margin: 0; width: 20px; height: 20px; accent-color: #555; }
        .history-list-box { max-height: 130px; overflow-y: auto; padding: 10px 15px; margin: 10px 45px; background: #ffffff; font-size: 15px; font-weight: bold; text-align: right; border: 2px solid #000000; }
        .btn-hapus-riwayat { background: #ff2a2a; color: #ffffff; border: 3px solid #000000; font-weight: bold; padding: 12px 0; margin: 15px auto; cursor: pointer; font-size: 16px; display: block; width: 85%; text-align: center; box-shadow: 4px 4px 0px #000000; }
        .btn-close-menu { background: #ff2a2a; color: #ffffff; border: 3px solid #000000; font-weight: bold; padding: 15px 0; cursor: pointer; font-size: 16px; width: 85%; display: block; margin: 10px auto; box-shadow: 4px 4px 0px #000000; }
    </style>
</head>
<body>
<div class="calculator">
    <div class="screen-container" id="screen-display"></div>
    <div class="buttons-container">
        <div class="rom-grid-first">
            <button onclick="tekan('0')" class="btn-num-0" type="button">0</button>
            <button onclick="tekan('1')" class="btn-num-1" type="button">1</button>
            <button onclick="tekan('2')" class="btn-num-2" type="button">2</button>
            <button onclick="tekan('3')" class="btn-num-3" type="button">3</button>
            <button onclick="tekan('4')" class="btn-num-4" type="button">4</button>
            <button onclick="tekan('5')" class="btn-num-5" type="button">5</button>
            <button onclick="tekan('6')" class="btn-num-6" type="button">6</button>
            <button onclick="tekan('7')" class="btn-num-7" type="button">7</button>
            <button onclick="tekan('8')" class="btn-num-8" type="button">8</button>
            <button onclick="tekan('9')" class="btn-num-9" type="button">9</button>
        </div>
        <div class="rom-grid-second">
            <button onclick="tekan('*')" class="btn-op-mul" type="button">*</button>
            <button onclick="tekan(':')" class="btn-op-div" type="button">:</button>
            <button onclick="tekan('+')" class="btn-op-add" type="button">+</button>
            <button onclick="tekan('-')" class="btn-op-sub" type="button">-</button>
            <button onclick="hitungHasil()" class="btn-op-equal" type="button">=</button>
        </div>
        <div class="row-bottom">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button">PILIH</button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>

        <div id="dropdown-menu" class="dropdown-menu">
        <div class="menu-title-bar"><span>-- Pilih Menu --</span><span>▼</span></div>
        <div class="folder-header" onclick="toggleFolder('simbol-panel', 'arrow-simbol')"><span>📁 -- simbol --</span><span id="arrow-simbol">▼</span></div>
        <div id="simbol-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('.', 'simbol-opt')"><span>. (Titik Desimal)</span><input type="radio" name="simbol-opt"></div>
            <div class="cucu-radio-row" onclick="pilihCucu('%', 'simbol-opt')"><span>% (Persen)</span><input type="radio" name="simbol-opt"></div>
            <div class="cucu-radio-row" onclick="pilihCucu('^', 'simbol-opt')"><span>^ (Pangkat)</span><input type="radio" name="simbol-opt"></div>
        </div>
        <div class="folder-header" onclick="toggleFolder('sigma-panel', 'arrow-sigma')"><span>📁 -- sigma --</span><span id="arrow-sigma">▼</span></div>
        <div id="sigma-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('Σ', 'sigma-opt')"><span>Ketik Manual (Σ)</span><input type="radio" name="sigma-opt"></div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ3', 'sigma-opt')"><span>Hingga 3 (Σ3)</span><input type="radio" name="sigma-opt"></div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ5', 'sigma-opt')"><span>Hingga 5 (Σ5)</span><input type="radio" name="sigma-opt"></div>
        </div>
        <div class="folder-header" onclick="toggleFolder('riwayat-panel', 'arrow-riwayat')"><span>📁 -- riwayat --</span><span id="arrow-riwayat">▼</span></div>
        <div id="riwayat-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihOpsiRekord(true, 'rad-on')"><span>Riwayat Hitungan (ON)</span><input type="radio" name="riwayat-opt" id="rad-on" checked></div>
            <div class="cucu-radio-row" onclick="pilihOpsiRekord(false, 'rad-off')"><span>Riwayat Hitungan (OFF)</span><input type="radio" name="riwayat-opt" id="rad-off"></div>
            <div id="history-box-content" class="history-list-box">Belum ada riwayat</div>
            <button type="button" class="btn-hapus-riwayat" onclick="hapusRiwayatPermanen(event)">Hapus</button>
        </div>
        <div style="padding-top: 10px; text-align: center;"><button type="button" class="btn-close-menu" onclick="tutupSemuaMenu()">KEMBALI KE KALKULATOR X</button></div>
    </div>
</div>
<script>
const display = document.getElementById("screen-display");
const historyBox = document.getElementById("history-box-content");
let clickTimer = null, isManualEdit = false, rumusBarisIni = "", riwayatHitunganHTML = "", isRecordActive = true; 
function tekan(karakter) { if (isManualEdit) return; rumusBarisIni += String(karakter); renderLayar(); }
function klikTombolPilih() { document.getElementById('dropdown-menu').style.display = "block"; }
function toggleFolder(pId, aId) { const p = document.getElementById(pId), a = document.getElementById(aId); if (p.style.display === "block") { p.style.display = "none"; a.innerText = "▼"; } else { p.style.display = "block"; a.innerText = "▲"; } }
function pilihCucu(t, r) { const e = window.event ? window.event.currentTarget : null; if (e) { const rad = e.querySelector('input[type="radio"]'); if (rad) rad.checked = true; } tekan(t); setTimeout(function() { tutupSemuaMenu(); document.querySelectorAll(`input[name="${r}"]`).forEach(i => i.checked = false); }, 180); }
function pilihOpsiRekord(s, id) { isRecordActive = s; document.getElementById(id).checked = true; setTimeout(function() { tutupSemuaMenu(); }, 180); }
function tutupSemuaMenu() { document.getElementById('dropdown-menu').style.display = "none"; document.getElementById('simbol-panel').style.display = "none"; document.getElementById('sigma-panel').style.display = "none"; document.getElementById('riwayat-panel').style.display = "none"; document.getElementById('arrow-simbol').innerText = "▼"; document.getElementById('arrow-sigma').innerText = "▼"; document.getElementById('arrow-riwayat').innerText = "▼"; }
function updateHistoryBoxMenu(d) { if (!isRecordActive) return; if (historyBox) { if (historyBox.innerText.includes("Belum ada riwayat")) { historyBox.innerHTML = ""; } historyBox.innerHTML += d; historyBox.scrollTop = historyBox.scrollHeight; } }
// Perbaikan Typo Kata Dropdown 
function hapusRiwayatPermanen(e) { if (e) e.stopPropagation(); rumusBarisIni = ""; riwayatHitunganHTML = ""; display.innerHTML = ""; if (historyBox) { historyBox.innerHTML = "Belum ada riwayat"; } setTimeout(function() { tutupSemuaMenu(); }, 100); }
function renderLayar() { let h = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : ""; display.innerHTML = riwayatHitunganHTML + h; display.scrollTop = display.scrollHeight; }
function hitungHasil() { if (rumusBarisIni === "") return; try { let exp = rumusBarisIni, rAsli = rumusBarisIni; if (/[Σ∑\u03A3\u2211]$/.test(exp)) { exp = exp.slice(0, -1); } exp = exp.replace(/:/g, "/").replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)").replace(/(\d+)%/g, "($1/100)").replace(/(\d+)([Σ∑\u03A3\u2211])/g, "$1*$2"); exp = exp.replace(/[Σ∑\u03A3\u2211](\d+)/g, function(m, a) { let t = 0, b = parseInt(a) || 0; for (let i = 1; i <= b; i++) { t += i; } return "(" + t + ")"; }); exp = exp.replace(/[Σ∑\u03A3\u2211]/g, "0").replace(/\+\+/g, "+").replace(/\-\-/g, "+"); let hasil = eval(exp); let bR = `<div style="font-size:14px; color:#555;">${rAsli}</div>`, bH = `<div style="font-size:18px; color:#1a237e; border-bottom:1px dashed #ccc; padding-bottom:3px; margin-bottom:5px;">= ${hasil}</div>`; if (isRecordActive) { riwayatHitunganHTML += `<div class="calc-row">${rAsli}</div><div class="calc-row latest-result">= ${hasil}</div>`; updateHistoryBoxMenu(bR + bH); } else { riwayatHitunganHTML = `<div class="calc-row latest-result">= ${hasil}</div>`; } rumusBarisIni = ""; renderLayar(); } catch(e) { rumusBarisIni = ""; riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:24px;">Error</div>`; renderLayar(); } }
function aktifkanModeEdit() { isManualEdit = !isManualEdit; display.contentEditable = isManualEdit ? "true" : "false"; if (isManualEdit) display.focus(); }
function handleClearClick() { if (clickTimer == null) { clickTimer = setTimeout(function () { clickTimer = null; if (rumusBarisIni.length > 0) { rumusBarisIni = rumusBarisIni.slice(0, -1); renderLayar(); } }, 250); } else { clearTimeout(clickTimer); clickTimer = null; rumusBarisIni = ""; riwayatHitunganHTML = ""; display.innerHTML = ""; } }
</script>
</body>
</html>
