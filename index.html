<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Gambar</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }

        /* Pembungkus utama yang ukurannya mengikuti gambar kostum Anda */
        .calculator-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* Batas lebar maksimal agar tidak terlalu besar di PC */
            margin-top: 20px;
        }

        /* Gambar kostum Anda sebagai pondasi utama */
        .bg-image {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Menempatkan layar digital pas di atas area layar gambar Anda */
        #display {
            position: absolute;
            top: 5%;         /* Geser naik/turun (persen) agar pas di kolom layar gambar */
            left: 5%;        /* Jarak dari kiri */
            width: 90%;      /* Lebar layar */
            height: 12%;     /* Tinggi layar */
            background-color: rgba(51, 51, 51, 0.9); /* Latar gelap transparan */
            border: 2px solid #222;
            color: #ffffff;
            text-align: right;
            font-size: 28px;
            padding: 5px 15px;
            box-sizing: border-box;
            border-radius: 8px;
        }

        /* Area tombol tak terlihat yang ditempatkan di atas gambar tombol asli */
        .button-grid {
            position: absolute;
            bottom: 5%;      /* Jarak area tombol dari bawah gambar */
            left: 5%;        /* Jarak area tombol dari kiri */
            width: 90%;      /* Lebar total area tombol */
            height: 60%;     /* Tinggi total area tombol */
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 Kolom sesuai gambar Anda */
            gap: 8px;        /* Jarak antar tombol */
        }

        /* MEMBUAT TOMBOL MENJADI GAIB / TRANSPARAN TOTAL */
        .invisible-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            border-radius: 5px;
            -webkit-tap-highlight-color: transparent; /* Hilangkan efek highlight biru di HP */
        }

        /* Efek sedikit kilatan warna saat ditekan di HP agar pengguna tahu tombol aktif */
        .invisible-btn:active {
            background-color: rgba(0, 0, 0, 0.15); 
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <!-- Gambar kostum Anda diletakkan di sini -->
    <img src="Folder/gambar/bodykal.jpg" alt="Kalkulator Kostum" class="bg-image">

    <!-- Layar Angka Digital -->
    <input type="text" id="display" readonly placeholder="0">
    
    <!-- Susunan Tombol Transparan (Disesuaikan dengan urutan gambar Anda) -->
    <div class="button-grid">
        <!-- Baris 1: Angka 1 sampai 5 -->
        <button class="invisible-btn" onclick="appendValue('1')"></button>
        <button class="invisible-btn" onclick="appendValue('2')"></button>
        <button class="invisible-btn" onclick="appendValue('3')"></button>
        <button class="invisible-btn" onclick="appendValue('4')"></button>
        <button class="invisible-btn" onclick="appendValue('5')"></button>
        
        <!-- Baris 2: Angka 6 sampai 0 (ditambah Tombol Clear C) -->
        <button class="invisible-btn" onclick="appendValue('6')"></button>
        <button class="invisible-btn" onclick="appendValue('7')"></button>
        <button class="invisible-btn" onclick="appendValue('8')"></button>
        <button class="invisible-btn" onclick="appendValue('9')"></button>
        <button class="invisible-btn" onclick="appendValue('0')"></button>
        
        <!-- Baris 3: Simbol Matematika (* , : , + , - , =) dan Tombol Clear -->
        <button class="invisible-btn" onclick="appendValue('*')"></button>
        <button class="invisible-btn" onclick="appendValue('/')"></button> <!-- Simbol Titik Dua (:) diartikan bagi (/) -->
        <button class="invisible-btn" onclick="appendValue('+')"></button>
        <button class="invisible-btn" onclick="appendValue('-')"></button>
        <button class="invisible-btn" onclick="calculate()"></button>
        
        <!-- Tombol Clear (C) tambahan jika di gambar kostum Anda ada area kosong atau tombol reset -->
        <!-- Jika letaknya terpisah, nanti posisinya bisa kita geser secara khusus -->
        <button class="invisible-btn" onclick="clearDisplay()" style="grid-column: span 5; height: 30px; margin-top: 5px; background: rgba(255,0,0,0.05);"></button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function appendValue(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() {
        try { display.value = eval(display.value); } 
        catch (error) { display.value = 'Error'; }
    }
</script>

</body>
</html>
