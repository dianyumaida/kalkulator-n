<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Vertikal</title>
    <style>
        /* --- CSS: TAMPILAN KALKULATOR --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f7ebe1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator {
            width: 320px;
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 5px 5px 0px #000000;
        }

        /* PERBAIKAN DISPLAY: Rata kiri atas dan mendukung baris baru */
        .display-container {
            width: 100%;
            height: 150px;
            border: 2px solid #000;
            margin-bottom: 15px;
            background-color: #fff;
            padding: 10px;
            box-sizing: border-box;
            text-align: left;            /* Teks mulai dari kiri atas seperti di gambar */
            font-size: 1.5rem;
            color: #d13438;              /* Warna teks merah */
            font-weight: bold;
            overflow-y: auto;            /* Otomatis memunculkan scroll vertikal jika baris penuh */
            white-space: pre-wrap;       /* Menjaga teks agar bisa turun ke bawah (\n) */
            line-height: 1.3;
        }

        /* Baris Operator Atas */
        .operator-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .operator-row button {
            background-color: #fce4d6;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Grid Utama Bawah */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            gap: 15px;
        }

        /* Area Hijau Kosong Sesuai Gambar Baru Anda */
        .left-space {
            border: 2px solid transparent;
            background-color: #e2efda; /* Warna hijau muda polos */
            border-radius: 5px;
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .number-grid button {
            background-color: #ffffff;
            border: 2px solid #000;
            border-radius: 5px;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Tombol Delete Pink lebar */
        .delete-btn {
            grid-column: span 2;
            background-color: #f8cbad !important;
            color: #000;
        }

        button:active {
            transform: scale(0.95);
            background-color: #ddd !important;
        }
    </style>
</head>
<body>

    <div class="calculator">
        
        <!-- Layar Monitor Hasil -->
        <div id="display-screen" class="display-container"></div>

        <!-- Baris Operator Atas -->
        <div class="operator-row">
            <button onclick="appendOperator('+')">+</button>
            <button onclick="appendOperator('-')">-</button>
            <button onclick="appendOperator('*')">×</button>
            <button onclick="appendOperator('/')">÷</button>
            <button onclick="calculate()">=</button>
        </div>

        <!-- Grid Utama Bawah -->
        <div class="main-grid">
            <!-- Sisi Kiri: Area Kosong Hijau Sesuai Gambar -->
            <div class="left-space"></div>

            <!-- Sisi Kanan: Angka & Delete -->
            <div class="number-grid">
                <button onclick="appendNumber('6')">6</button>
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('3')">3</button>
                <button onclick="appendNumber('9')">9</button>
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('0')">0</button>
                <button onclick="appendNumber('5')">5</button>
                <button class="delete-btn" onclick="clearDisplay()">DELETE</button>
            </div>
        </div>
    </div>

    <!-- --- JAVASCRIPT: LOGIKA TURUN BARIS --- -->
    <script>
        let currentLine = "";  // Menyimpan ketikan baris saat ini (misal: 5*2)
        let fullHistory = "";  // Menyimpan seluruh teks kumulatif yang tampil di layar
        
        const displayScreen = document.getElementById("display-screen");

        function appendNumber(num) {
            currentLine += num;
            renderDisplay();
        }

        function appendOperator(op) {
            // Mengubah simbol perkalian dan pembagian agar terlihat rapi di layar
            let visualOp = op;
            if (op === '*') visualOp = 'x';
            if (op === '/') visualOp = '÷';

            currentLine += " " + visualOp + " ";
            renderDisplay();
        }

        function calculate() {
            if (currentLine.trim() === "") return;

            try {
                // Konversi simbol visual 'x' kembali menjadi '*' untuk dievaluasi JavaScript
                let mathExpression = currentLine.replace(/x/g, '*').replace(/÷/g, '/');
                
                // Hitung hasil matematika
                let rawResult = eval(mathExpression);
                let finalResult = Number(rawResult.toFixed(4)).toString();
                
                // Satukan teks rumusan dengan hasil di baris baru (\n)
                fullHistory += currentLine + "\n=" + finalResult + "\n\n";
                
                // Reset baris masukan baru untuk perhitungan selanjutnya
                currentLine = ""; 
            } catch (error) {
                fullHistory += currentLine + "\n=Error\n\n";
                currentLine = "";
            }
            renderDisplay();
            
            // Otomatis scroll layar ke bagian paling bawah jika riwayat sudah panjang
            displayScreen.scrollTop = displayScreen.scrollHeight;
        }

        function clearDisplay() {
            currentLine = "";
            fullHistory = "";
            renderDisplay();
        }

        function renderDisplay() {
            // Tampilkan riwayat lama digabung dengan ketikan yang sedang berjalan
            displayScreen.textContent = fullHistory + currentLine;
        }
    </script>
</body>
</html>
