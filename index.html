<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Akuntansi Akurat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden; 
        }

        /* FRAME BINGKAI UTAMA KALKULATOR */
        .calculator {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 380px 730px; 
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            box-shadow: none !important;
            box-sizing: border-box;
            position: relative; 
            margin: 10px auto;
        }

        /* AREA MONITOR LAYAR PUTIHAN */
        .screen-container {
            position: absolute;
            top: 35px;     
            left: 20px;    
            width: 340px;  
            height: 250px; 
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            pointer-events: auto !important;
            z-index: 5;
            background: transparent;
        }

        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* CONTAINER LAPISAN SENSOR TOMBOL */
        .buttons-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 730px;
            pointer-events: none; 
            z-index: 10;
        }

        /* Kotak putih samar transparan tetap dipertahankan untuk pengecekan terakhir Anda */
        .buttons-container button {
            background: rgba(255, 255, 255, 0.4) !important; 
            border: 1px solid rgba(0, 0, 0, 0.3) !important;   
            color: #000000 !important;                        
            font-weight: 900 !important;              
            font-size: 16px !important;
            outline: none !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
            pointer-events: auto !important; 
            position: absolute; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🌟 BARIS 1: TOMBOL ANGKA (0-9) - PENYESUAIAN MIKRO AKHIR ANGKA 5, 6, 7, 8 🌟 */
        .rom-grid-first button { top: 502px; height: 36px; width: 28px !important; }
        
        .btn-num-0 { left: 17px; }
        .btn-num-1 { left: 53px; }
        .btn-num-2 { left: 89px; }
        .btn-num-3 { left: 125px; }
        .btn-num-4 { left: 160px; } 
        .btn-num-5 { left: 194px; } /* Digeser ke kiri sedikit dari 195px */
        .btn-num-6 { left: 230px; } /* Digeser ke kiri sedikit dari 231px */
        .btn-num-7 { left: 268px; } /* Digeser ke kanan sedikit dari 266px */
        .btn-num-8 { left: 304px; } /* Digeser ke kanan sedikit dari 302px */
        .btn-num-9 { left: 341px; }

        /* 🌟 BARIS 2: TOMBOL OPERATOR (* : + - =) 🌟 */
        .rom-grid-second button { top: 578px; height: 50px; width: 65px !important; font-size: 22px !important; }
        
        .btn-op-mul { left: 12px; }
        .btn-op-div { left: 85px; }
        .btn-op-add { left: 158px; }
        .btn-op-sub { left: 231px; }
        .btn-op-equal { left: 304px; }

        /* 🌟 BARIS 3: FUNGSI NAVIGASI BAWAH (PILIH, EDIT, CLEAR) 🌟 */
        .row-bottom button { top: 653px; height: 48px; }
        
        .btn-pilih { left: 12px;  width: 122px; }
        .btn-edit  { left: 146px; width: 106px; }
        .btn-clear { left: 266px; width: 110px; font-size: 15px !important; }

        /* PANEL MODAL MENU PILIH BESAR FULL SCREEN */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            border: 6px solid #000000;
            z-index: 9999;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .menu-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eeeeee;
            border-bottom: 2px solid #ccc;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            cursor: pointer;
            user-select: none;
        }
        .folder-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-dropdown-content {
            display: none;
            background: #ffffff;
        }

        .cucu-radio-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 25px 12px 45px;
            font-size: 16px;
            color: #444444;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            background: #ffffff;
        }

        .cucu-radio-row input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: #555;
        }

        .history-list-box {
            max-height: 130px;
            overflow-y: auto;
            padding: 10px 15px;
            margin: 10px 45px;
            background: #ffffff;
            font-size: 15px;
            font-weight: bold;
            text-align: right;
            border: 2px solid #000000;
        }

        .btn-hapus-riwayat {
            background: #ff2a2a;
            color: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            margin: 15px auto;
            cursor: pointer;
            font-size: 16px;
            display: block;
            width: 85%;
            text-align: center;
            box-shadow: 4px 4px 0px #000000;
        }

        .btn-close-menu {
            background: #ff2a2a;
            color: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 15px 0;
            cursor: pointer;
            font-size: 16px;
            width: 85%;
            display: block;
            margin: 10px auto;
            box-shadow: 4px 4px 0px #000000;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Monitor Layar -->
    <div class="screen-container" id="screen-display"></div>

    <div class="buttons-container">
        <!-- Baris 1: Angka Individual Piksel -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')" class="btn-num-0" type="button">0</button>
            <button onclick="tekan('1')" class="btn-num-1" type="button">1</button>
            <button onclick="tekan('2')" class="btn-num-2" type="button">2</button>
            <button onclick="tekan('3')" class="btn-num-3" type="button">3</button>
            <button onclick="tekan('4')" class="btn-num-4" type="button">4</button>
            <button onclick="tekan('5')" class="btn-num-5" type="button">5</button>
            <button onclick="tekan('6')" class="btn-num-6" type="button">6</button>
            <button onclick="tekan('7')" class="btn-num-7" type="button">7</button>
            <button onclick="tekan('8')" class="btn-num-8" type="button">8</button>
            <button onclick="tekan('9')" class="btn-num-9" type="button">9</button>
        </div>

        <!-- Baris 2: Operator -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')" class="btn-op-mul" type="button">*</button>
            <button onclick="tekan(':')" class="btn-op-div" type="button">:</button>
            <button onclick="tekan('+')" class="btn-op-add" type="button">+</button>
            <button onclick="tekan('-')" class="btn-op-sub" type="button">-</button>
            <button onclick="hitungHasil()" class="btn-op-equal" type="button">=</button>
        </div>

        <!-- Baris 3: Navigasi Fungsi -->
        <div class="row-bottom">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button">PILIH</button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>

    <!-- MODAL MENU PILIH BESAR / FULL SCREEN -->
    <div id="dropdown-menu" class="dropdown-menu">
        <div class="menu-title-bar">
            <span>-- Pilih Menu --</span>
            <span>▼</span>
        </div>
        
        <!-- 1. FOLDER ANAK: SIMBOL -->
        <div class="folder-header" onclick="toggleFolder('simbol-panel', 'arrow-simbol')">
            <span>📁 -- simbol --</span>
            <span id="arrow-simbol">▼</span>
        </div>
        <div id="simbol-panel" class="sub-dropdown-content">
