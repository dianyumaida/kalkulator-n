<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Fix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        
                .calculator { 
            width: 100%; max-width: 460px; aspect-ratio: 460 / 520; 
            background: url('Folder/gambar/bodykal.jpg') no-repeat center; background-size: 100% 100%;
            padding: 3% 4.8% 5.5% 4.8% !important; /* Padding atas dikurangi dari 5.5% menjadi 3% agar tombol naik */
            margin-bottom: 20px; position: relative; display: flex; flex-direction: column;
        }
        
        /* POSISI ANGKA 0 DI LAYAR: Tinggi area layar hitam dikurangi agar tombol terdorong naik */
        #screen { 
            width: 100%; 
            height: 160px !important; /* Dikurangi dari 185px agar semua tombol di bawahnya ikut naik ke kotak */
            background: transparent; color: #000; text-align: right; 
            padding-right: 25px !important; font-size: 4.5rem; border: none; display: block !important; 
            line-height: 150px !important; /* Memaksa angka 0 sejajar naik ke posisi tengah atas kotak layar */
            overflow: hidden;
        }

        #screen.editing-active { background: rgba(255, 254, 187, 0.4); }
        
        .row { display: flex !important; justify-content: space-between !important; margin-bottom: 9% !important; gap: 2.8% !important; padding: 0 1% !important; }
        .row-top { gap: 3.5% !important; padding: 0 2.5% 0 2% !important; }
        .row-bottom { margin-bottom: 0 !important; margin-top: 1% !important; gap: 5.5% !important; padding: 0 1.5% !important; }

        button { 
            flex: 1 !important; height: 9.8vw !important; max-height: 50px !important; 
            font-size: 1.1rem !important; font-weight: bold !important; border: none !important; 
            border-radius: 4px !important; cursor: pointer !important; background: rgba(0, 0, 0, 0.04) !important; color: #222 !important;
        }
        button:active { background: rgba(0, 0, 0, 0.15) !important; }
        
        /* TOMBOL BAWAH TRANSPARAN AGAR GAMBAR TIDAK TERTUTUP DAN TETAP BISA DIKLIK */
        .btn-pilih, .btn-edit, .btn-clear { background: rgba(0, 0, 0, 0.001) !important; color: transparent !important; height: 9.8vw !important; max-height: 50px !important; cursor: pointer !important; }

        /* MENU DROPDOWN */
        .menu-container { width: 100%; max-width: 460px; border: 1px solid #ccc; border-radius: 8px; background: #f0f0f0; overflow: hidden; }
        .menu-header { background: #e0e0e0; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .menu-group { border-bottom: 1px solid #eee; }
        .group-header { background: #fff; padding: 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: 500; }
        .item-row, .item-row-history { display: flex; justify-content: space-between; padding: 12px 20px; background: #fff; border-top: 1px solid #f5f5f5; cursor: pointer; }
    </style>
</head>
<body>

    <div class="calculator">
        <div id="screen">0</div>
        
        <!-- BARIS 1 (1-9) -->
        <div class="row row-top">
            <button onclick="tekan('1')">1</button><button onclick="tekan('2')">2</button><button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button><button onclick="tekan('5')">5</button><button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button><button onclick="tekan('8')">8</button><button onclick="tekan('9')">9</button>
        </div>
        
        <!-- BARIS 2 (0 sampai :) -->
        <div class="row">
            <button onclick="tekan('0')">0</button><button onclick="tekan('.')">.</button>
            <button onclick="tekan('+')">+</button><button onclick="tekan('-')">-</button>
            <button onclick="tekan('*')">x</button><button onclick="tekan('/')">:</button>
        </div>
        
        <!-- BARIS 3 (TOMBOL ASLI GAMBAR BAWAH) -->
        <div class="row row-bottom">
            <button onclick="hasil()" class="btn-pilih">=</button>
            <button id="btn-edit" onclick="modeEdit()" class="btn-edit">EDIT</button>
            <button onclick="del()" ondblclick="clearAll()" class="btn-clear">CLEAR</button>
        </div>
    </div>

    <div class="menu-container">
        <div class="menu-header" onclick="toggle('main-menu-content')"><span>-- Pilih Menu --</span><span>▼</span></div>
        <div id="main-menu-content">
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-simbol')"><span>📁 -- simbol --</span><span>▼</span></div>
                <div id="sec-simbol">
                    <label class="item-row" onclick="tekan('%')"><span>% (Persen)</span><input type="radio" name="m" id="rad-percent"></label>
                    <label class="item-row" onclick="tekan('Σ')"><span>Σ (Sigma)</span><input type="radio" name="m" id="rad-sigma"></label>
                    <label class="item-row" onclick="tekan('^')"><span>^ (Pangkat)</span><input type="radio" name="m" id="rad-pow"></label>
                </div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-algo')"><span>📁 -- algoritma --</span><span>▶</span></div>
                <div id="sec-algo" style="display:none;"><div class="item-row"><span>Segera Datang</span></div></div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-riwayat')"><span>📁 -- riwayat --</span><span>▼</span></div>
                <div id="sec-riwayat">
                    <div class="item-row-history">
                        <span id="h-txt">Belum ada riwayat</span>
                        <button onclick="delH()" style="background:#ff4d4d; color:white; padding:4px 10px; font-size:13px; border:none; border-radius:4px; cursor:pointer;">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scr = document.getElementById("screen");
        let isEdit = false;

        function tekan(v) {
            if(isEdit) return;
            scr.innerText = (scr.innerText === "0" && !"+-*/^%Σ".includes(v)) ? v : scr.innerText + v;
        }

        function hasil() {
            if(isEdit || scr.innerText === "0") return;
            try {
                let txt = scr.innerText;
                let riwayatAwal = txt;
                txt = txt.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
                txt = txt.replace(/(\d+)%/g, "($1/100)");
                txt = txt.replace(/(\d+)Σ/g, function(match, angka) {
                    let total = 0;
                    for (let i = 1; i <= parseInt(angka); i++) { total += i; }
                    return total;
                });
                let res = eval(txt);
                document.getElementById('h-txt').innerText = riwayatAwal + " = " + res;
                scr.innerText = res;
            } catch(e) { scr.innerText = "Error"; }
        }

        function del() { if(!isEdit) scr.innerText = scr.innerText.slice(0, -1) || "0"; }
        function clearAll() {
            scr.innerText = "0"; isEdit = false; scr.contentEditable = "false";
            document.getElementById("btn-edit").innerText = "EDIT";
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        }

        function modeEdit() {
            isEdit = !isEdit;
            scr.contentEditable = isEdit ? "true" : "false";
            document.getElementById("btn-edit").innerText = isEdit ? "OK" : "EDIT";
            if(isEdit) scr.focus();
        }

        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "none") ? "block" : "none";
        }
        function delH() { document.getElementById('h-txt').innerText = "Belum ada riwayat"; }
    </script>
</body>
</html>
