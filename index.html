<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        /* FRAME BINGKAI UTAMA KALKULATOR */
        .calculator {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            border-radius: 4px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            position: relative; 
            overflow: hidden;
            /* Memberi jarak aman agar area konten pas di dalam bingkai gambar */
            padding: 30px 25px; 
        }

        /* AREA MONITOR LAYAR PUTIH GAMBAR */
        .screen-container {
            height: 300px; /* Dikunci tingginya agar pas dengan area layar gambar */
            background: transparent !important; /* Transparan agar warna layar gambar terlihat */
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            margin-bottom: 45px; /* Jarak pendorong agar tidak menabrak baris tombol bawah */
        }
        
        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* CONTAINER AREA TOMBOL (4 KOLOM X 4 BARIS) */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Mengatur jarak vertikal antar baris tombol */
        }

        .rom-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Kolom Merata */
            gap: 10px; /* Jarak horizontal antar tombol */
        }

        /* SENSOR TOMBOL DIBUAT MURNI TRANSPARAN */
        .rom-grid button {
            height: 52px; /* Tinggi tombol yang sangat pas untuk disentuh di HP */
            background: transparent !important; /* 100% Transparan agar gambar tombol asli kelihatan */
            border: none !important; /* Menghilangkan kotak bawaan kode */
            outline: none !important;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Layar Utama Transparan -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Area Tombol Transparan Tepat di Atas Kotak Gambar -->
    <div class="buttons-container">
        <div class="rom-grid">
            <!-- Baris 1 -->
            <button onclick="tekan('7')"></button>
            <button onclick="tekan('8')"></button>
            <button onclick="tekan('9')"></button>
            <button onclick="tekan('*')"></button>
            
            <!-- Baris 2 -->
            <button onclick="tekan('4')"></button>
            <button onclick="tekan('5')"></button>
            <button onclick="tekan('6')"></button>
            <button onclick="tekan(':')"></button>
            
            <!-- Baris 3 -->
            <button onclick="tekan('1')"></button>
            <button onclick="tekan('2')"></button>
            <button onclick="tekan('3')"></button>
            <button onclick="tekan('+')"></button>
            
            <!-- Baris 4 -->
            <button onclick="tekan('0')"></button>
            <button onclick="handleClearClick()"></button>
            <button onclick="hitungHasil()"></button>
            <button onclick="tekan('-')"></button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    rumusBarisIni += String(karakter);
    renderLayar();
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        ekspresi = ekspresi.replace(/:/g, "/"); 

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:24px;">Error</div>`;
        renderLayar();
    }
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
