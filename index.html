<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom Ekonomi IT</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Kotak Kalkulator Murni Menggunakan Gambar Anda */
        .calculator-container {
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 100% 100%; /* Memaksa gambar pas dengan kotak */
            background-position: center;
            background-repeat: no-repeat;
            width: 100%;
            max-width: 360px;
            height: 640px; /* Tinggi disesuaikan dengan proporsi gambar */
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Area Layar - Dibuat Bening agar Layar Gambar Anda yang Terlihat */
        .display-section {
            background: transparent;
            border: none;
            height: 115px;
            width: 100%;
            padding: 25px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }

        #result-display {
            color: #cc2222; /* Angka Merah */
            font-size: 2.2rem;
            font-weight: bold;
            line-height: 1;
        }

        #formula-display {
            color: #555555;
            font-size: 1rem;
            margin-top: 10px;
            width: 100%;
            text-align: right;
        }

        /* Baris Operator Tengah (Dibuat Bening) */
        .operator-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            margin-top: 15px;
            height: 45px;
        }

        .btn-op, .btn-equal, .btn-delete {
            background: transparent; /* BENING */
            border: none; /* TANPA GARIS */
            font-size: 1.4rem;
            font-weight: bold;
            color: #000000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tata Letak Bagian Bawah */
        .bottom-layout {
            display: grid;
            grid-template-columns: 1.25fr 1fr 1fr;
            gap: 6px;
            margin-top: 25px;
            height: 290px;
        }

        /* Panel Hijau Kiri (Dibuat Bening) */
        .green-panel {
            background: transparent; /* BENING */
            border: none;
            padding: 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .radio-scroll {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
        }

        /* Kotak Pilihan di Dalam Panel Hijau */
        .radio-scroll label {
            background-color: rgba(255, 255, 255, 0.8); /* Putih transparan agar rapi */
            border: 1px solid #000000;
            padding: 4px;
            font-size: 0.75rem;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 4px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Tombol PILIH Teks Merah (Dibuat Bening) */
        .btn-pilih {
            background: transparent; /* BENING */
            border: none;
            color: #cc2222;
            font-weight: bold;
            padding: 5px 0;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
            margin-bottom: 5px;
        }

        /* Kolom Angka Tengah dan Kanan (Dibuat Bening) */
        .num-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 5px;
        }

        .btn-num {
            background: transparent; /* BENING */
            border: none; /* TANPA GARIS */
            font-size: 1.4rem;
            font-weight: bold;
            color: #000000;
            cursor: pointer;
            height: 46px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <!-- Layar Atas -->
        <div class="display-section">
            <div id="result-display">0</div>
            <div id="formula-display"></div>
        </div>

        <!-- Baris Operator Tengah -->
        <div class="operator-row">
            <button class="btn-op" onclick="append('+')">+</button>
            <button class="btn-op" onclick="append('-')">-</button>
            <button class="btn-op" onclick="append('*')">&times;</button>
            <button class="btn-op" onclick="append('/')">:</button>
            <button class="btn-delete" onclick="clearAll()">AC</button>
            <button class="btn-equal" onclick="calculate()">=</button>
        </div>

        <!-- Bagian 3 Kolom Bawah -->
        <div class="bottom-layout">
            <!-- Kolom 1 (Kiri - Slot Hijau) -->
            <div class="green-panel">
                <div class="radio-scroll">
                    <label><input type="radio" name="calc-option" value="integral" checked> ∫ dx (PV)</label>
                    <label><input type="radio" name="calc-option" value="sigma"> ∑ (NPV)</label>
                    <label><input type="radio" name="calc-option" value="^"> Pangkat (^)</label>
                    <label><input type="radio" name="calc-option" value="°"> Sudut (°)</label>
                    <label><input type="radio" name="calc-option" value="%"> Persen (%)</label>
                    <label><input type="radio" name="calc-option" value="("> Kurung (</label>
                    <label><input type="radio" name="calc-option" value=")"> Kurung )</label>
                    <label><input type="radio" name="calc-option" value="."> Titik (.)</label>
                </div>
                <button class="btn-pilih" onclick="insertRadioValue()">&lt; PILIH &gt;</button>
            </div>

            <!-- Kolom 2 (Tengah - Angka 6 sampai 0) -->
            <div class="num-column">
                <button class="btn-num" onclick="append('6')">6</button>
                <button class="btn-num" onclick="append('7')">7</button>
                <button class="btn-num" onclick="append('8')">8</button>
                <button class="btn-num" onclick="append('9')">9</button>
                <button class="btn-num" onclick="append('0')">0</button>
            </div>

            <!-- Kolom 3 (Kanan - Angka 1 sampai 5) -->
            <div class="num-column">
                <button class="btn-num" onclick="append('1')">1</button>
                <button class="btn-num" onclick="append('2')">2</button>
                <button class="btn-num" onclick="append('3')">3</button>
                <button class="btn-num" onclick="append('4')">4</button>
                <button class="btn-num" onclick="append('5')">5</button>
            </div>
        </div>
    </div>

    <script>
        let formulaDisplay = document.getElementById('formula-display');
        let resultDisplay = document.getElementById('result-display');
        let currentInput = '';
        let activeMode = null;

        function append(value) {
            currentInput += value;
            formulaDisplay.innerText = currentInput;
        }

        function clearAll() {
            currentInput = '';
            activeMode = null;
            formulaDisplay.innerText = '';
            resultDisplay.innerText = '0';
        }

        function insertRadioValue() {
            const selectedRadio = document.querySelector('input[name="calc-option"]:checked');
            if (selectedRadio) {
                const val = selectedRadio.value;
                if (val === 'integral' || val === 'sigma') {
                    setMode(val);
                } else if (val === '%') {
                    processPercent();
                } else {
                    append(val);
                }
            }
        }

        function processPercent() {
            if (currentInput) {
                try {
                    let tokens = currentInput.split(/([\+\-\*\/])/);
                    let lastToken = tokens.pop();
                    if (!isNaN(lastToken) && lastToken !== '') {
                        let percentValue = parseFloat(lastToken) / 100;
                        currentInput = tokens.join('') + percentValue;
                        formulaDisplay.innerText = currentInput;
                    }
                } catch (e) {
                    resultDisplay.innerText = 'Error %';
                }
            }
        }

        function setMode(mode) {
            activeMode = mode;
            if (mode === 'integral') {
                currentInput = '∫(0,5)[20000*e^(-0.08*t)]';
            } else if (mode === 'sigma') {
                currentInput = '∑(t=1,4)[10000/(1+0.1)^t]';
            }
            formulaDisplay.innerText = currentInput;
        }

        function calculate() {
            try {
                let expression = currentInput;

                if (activeMode === 'integral') {
                    let f = (t) => 20000 * Math.exp(-0.08 * t);
                    let a = 0, b = 5, n = 1000, h = (b - a) / n;
                    let sum = 0.5 * (f(a) + f(b));
                    for (let i = 1; i < n; i++) sum += f(a + i * h);
