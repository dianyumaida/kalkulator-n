<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Dasar Akuntansi</title>
    <style>
        /* PEMBUNGKUS LUAR: Menjaga agar kalkulator pas di tengah layar HP */
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* FRAME BINGKAI UTAMA KALKULATOR (DIKUNCI PIKSEL TETAP) */
        .calculator {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 380px 730px; 
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            box-sizing: border-box;
            position: relative; 
            margin: 10px auto;
        }

        /* AREA MONITOR LAYAR PUTIHAN ATAS (DIKUNCI TETAP) */
        .screen-container {
            position: absolute;
            top: 35px;     
            left: 20px;    
            width: 340px;  
            height: 250px; /* Dikurangi tingginya sedikit agar tidak menabrak area tombol yang naik */
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            pointer-events: auto !important;
            z-index: 5;
            background: transparent;
        }

        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* CONTAINER LAPISAN SENSOR TOMBOL TRANSPARAN */
        .buttons-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 730px;
            pointer-events: none; 
            z-index: 10;
        }

        .buttons-container button {
            background: transparent !important;
            border: none !important;
            outline: none !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
            pointer-events: auto !important; 
            position: absolute; 
        }

        /* 🌟 BARIS 1: TOMBOL ANGKA (0-9) - DITARIK NAIK 🌟 */
        /* Koordinat diturunkan dari 522px ke 420px (Naik 102 piksel ke atas) */
        .rom-grid-first button { top: 420px; height: 48px; }
        
        .btn-num-0 { left: 16px;  width: 32px; }
        .btn-num-1 { left: 52px;  width: 32px; }
        .btn-num-2 { left: 88px;  width: 32px; }
        .btn-num-3 { left: 124px; width: 32px; }
        .btn-num-4 { left: 160px; width: 32px; }
        .btn-num-5 { left: 196px; width: 32px; }
        .btn-num-6 { left: 232px; width: 32px; }
        .btn-num-7 { left: 268px; width: 32px; }
        .btn-num-8 { left: 304px; width: 32px; }
        .btn-num-9 { left: 340px; width: 32px; }

        /* 🌟 BARIS 2: TOMBOL OPERATOR (* : + - =) - DITARIK NAIK 🌟 */
        /* Koordinat diturunkan dari 592px ke 490px agar ikut merapat naik ke atas */
        .rom-grid-second button { top: 490px; height: 58px; }
        
        .btn-op-mul { left: 16px;  width: 65px; }
        .btn-op-div { left: 88px;  width: 65px; }
        .btn-op-add { left: 160px; width: 65px; }
        .btn-op-sub { left: 232px; width: 65px; }
        .btn-op-equal { left: 304px; width: 65px; }

        /* 🌟 BARIS 3: FUNGSI TERBAWAH (PILIH, EDIT, CLEAR) - DITARIK NAIK 🌟 */
        /* Koordinat diturunkan dari 668px ke 565px agar pas menutup baris ketiga gambar */
        .row-bottom button { top: 565px; height: 55px; }
        
        .btn-pilih { left: 16px;  width: 120px; }
        .btn-edit  { left: 148px; width: 106px; }
        .btn-clear { left: 266px; width: 98px; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Monitor Layar Transparan -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Lapisan Koordinat Sensor Sentuh Jari Tetap -->
    <div class="buttons-container">
        <!-- Baris 1: Angka -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')" class="btn-num-0" type="button"></button>
            <button onclick="tekan('1')" class="btn-num-1" type="button"></button>
            <button onclick="tekan('2')" class="btn-num-2" type="button"></button>
            <button onclick="tekan('3')" class="btn-num-3" type="button"></button>
            <button onclick="tekan('4')" class="btn-num-4" type="button"></button>
            <button onclick="tekan('5')" class="btn-num-5" type="button"></button>
            <button onclick="tekan('6')" class="btn-num-6" type="button"></button>
            <button onclick="tekan('7')" class="btn-num-7" type="button"></button>
            <button onclick="tekan('8')" class="btn-num-8" type="button"></button>
            <button onclick="tekan('9')" class="btn-num-9" type="button"></button>
        </div>

        <!-- Baris 2: Operator -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')" class="btn-op-mul" type="button"></button>
            <button onclick="tekan(':')" class="btn-op-div" type="button"></button>
            <button onclick="tekan('+')" class="btn-op-add" type="button"></button>
            <button onclick="tekan('-')" class="btn-op-sub" type="button"></button>
            <button onclick="hitungHasil()" class="btn-op-equal" type="button"></button>
        </div>

        <!-- Baris 3: Navigasi Fungsi Biasa -->
        <div class="row-bottom">
            <button onclick="void(0)" class="btn-pilih" type="button"></button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button"></button>
            <button onclick="handleClearClick()" class="btn-clear" type="button"></button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        ekspresi = ekspresi.replace(/:/g, "/"); 

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:24px;">Error</div>`;
        renderLayar();
    }
}

// Mengunci mode edit manual
function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
