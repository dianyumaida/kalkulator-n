<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pecahan Berfungsi Normal</title>
    
    <!-- Memuat MathJax untuk render pecahan -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://jsdelivr.net"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f0f0; margin: 0; }
        
        /* Wadah Utama Kalkulator */
        .calculator { width: 340px; background: white; border: 2px solid #000; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Layar Utama Atas */
        .display-screen { border: 2px solid #000; height: 220px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; font-size: 1.4rem; background: #fff; }
        
        /* Baris Tombol Operator Atas (+ - * : =) */
        .operator-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .btn-op { background-color: #ffe5d9; border: 1px solid #000; border-radius: 5px; padding: 10px 0; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        
        /* Bagian Bawah: Panel Kiri dan Panel Angka */
        .bottom-section { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        
        /* Panel Kiri (Hijau) */
        .left-panel { background-color: #e2efda; border: 1px solid #000; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
        .input-box { background: white; border: 1px solid #000; border-radius: 5px; height: 35px; }
        .btn-pilih { background: white; border: 1px solid #000; border-radius: 5px; color: red; font-weight: bold; font-size: 0.9rem; padding: 6px 0; cursor: pointer; text-align: center; }
        
        /* Panel Kanan (Tombol Angka) */
        .num-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-num { background: white; border: 1px solid #000; border-radius: 5px; padding: 12px 0; font-size: 1.2rem; font-weight: bold; cursor: pointer; text-align: center; }
        
        /* Tombol Khusus Bawah */
        .btn-back { background-color: #fff2cc; }
        .btn-delete { background-color: #f8cecc; font-size: 0.9rem; font-weight: bold; }
        
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Layar Hasil Atas -->
    <div class="display-screen" id="screen">
        <div id="math-output">$$ \text{Masukkan Rumus...} $$</div>
    </div>

    <!-- Tombol Operator Utama -->
    <div class="operator-row">
        <button class="btn-op" onclick="press('+', '+')">+</button>
        <button class="btn-op" onclick="press('-', '-')">-</button>
        <button class="btn-op" onclick="press('\\times', '*')">×</button>
        <button class="btn-op" onclick="press(':', ':')">:</button>
        <button class="btn-op" onclick="hitung()">=</button>
    </div>

    <!-- Bagian Bawah -->
    <div class="bottom-section">
        <!-- Panel Hijau Kiri -->
        <div class="left-panel">
            <div class="input-box"></div>
            <div class="input-box"></div>
            <div class="input-box"></div>
            <button class="btn-pilih">&lt; PILIH &gt;</button>
        </div>

        <!-- Panel Angka Kanan -->
        <div class="num-panel">
            <button class="btn-num" onclick="press('6', '6')">6</button>
            <button class="btn-num" onclick="press('1', '1')">1</button>
            
            <button class="btn-num" onclick="press('7', '7')">7</button>
            <button class="btn-num" onclick="press('2', '2')">2</button>
            
            <button class="btn-num" onclick="press('8', '8')">8</button>
            <button class="btn-num" onclick="press('3', '3')">3</button>
            
            <button class="btn-num" onclick="press('9', '9')">9</button>
            <button class="btn-num" onclick="press('4', '4')">4</button>
            
            <button class="btn-num" onclick="press('0', '0')">0</button>
            <button class="btn-num" onclick="press('5', '5')">5</button>
            
            <button class="btn-num btn-back" onclick="backspace()">←</button>
            <button class="btn-num btn-delete" onclick="clearAll()">DELETE</button>
        </div>
    </div>
</div>

<script>
    let history = []; 

    function press(visual, mathValue) {
        history.push({ visual: visual, math: mathValue });
        updateDisplay();
    }

    function backspace() {
        history.pop();
        updateDisplay();
    }

    function clearAll() {
        history = [];
        const outputDiv = document.getElementById('math-output');
        
        // Aturan Wajib MathJax v3: Clear elemen sebelum mengubah HTML internallnya
        if (window.MathJax && MathJax.typesetClear) {
            MathJax.typesetClear([outputDiv]);
        }
        outputDiv.innerHTML = "$$ \\text{Masukkan Rumus...} $$";
        if (window.MathJax && MathJax.typeset) MathJax.typeset([outputDiv]);
    }

    // Fungsi pembuat pecahan bertingkat LaTeX secara berulang
    function generateLatex() {
        let tokens = history.map(item => item.visual);
        let str = tokens.join(" ");
        
        // Regex pintar untuk membungkus komponen sebelum dan sesudah tanda ':' menjadi pecahan \frac{}{}
        while (str.includes(":")) {
            str = str.replace(/(\S+)\s*:\s*(\S+)/, "\\frac{$1}{$2}");
        }
        return str;
    }

    function updateDisplay() {
        const outputDiv = document.getElementById('math-output');
        
        if (history.length === 0) {
            if (window.MathJax && MathJax.typesetClear) MathJax.typesetClear([outputDiv]);
            outputDiv.innerHTML = "$$ \\text{Masukkan Rumus...} $$";
            if (window.MathJax && MathJax.typeset) MathJax.typeset([outputDiv]);
            return;
        }
        
        let latexFormula = generateLatex();
        
        // Bersihkan tracking MathJax lama pada elemen DOM ini agar teks mentah tidak bocor ke layar
        if (window.MathJax && MathJax.typesetClear) {
            MathJax.typesetClear([outputDiv]);
        }
        
        outputDiv.innerHTML = "$$ " + latexFormula + " $$";
        
        // Picu kompilasi visual grafis pecahan yang baru
        if (window.MathJax && MathJax.typeset) {
            MathJax.typeset([outputDiv]);
        }
    }

    function hitung() {
        if (history.length === 0) return;
        const outputDiv = document.getElementById('math-output');
        
        try {
            // Mengubah token internal ':' menjadi '/' agar dimengerti Javascript secara matematika asli
            let expr = history.map(item => item.math === ':' ? '/' : item.math).join("");
            
            // Evaluasi perhitungan matematika murni di sistem latar belakang
            let hasil = eval(expr); 
            
            if (hasil !== undefined) {
                let rumusAwal = generateLatex();
                
                if (window.MathJax && MathJax.typesetClear) {
                    MathJax.typesetClear([outputDiv]);
                }
                
                // Menampilkan rumus di atas, lalu hasil kalkulasi turun di bawahnya secara vertikal
                outputDiv.innerHTML = `$$ ${rumusAwal} $$ <hr style="width:100%; border:0; border-top:1px dashed #ccc; margin:10px 0;"> $$ = ${hasil} $$`;
                
                if (window.MathJax && MathJax.typeset) {
                    MathJax.typeset([outputDiv]);
                }
            }
        } catch (error) {
            if (window.MathJax && MathJax.typesetClear) MathJax.typesetClear([outputDiv]);
            outputDiv.innerHTML = "$$ \\text{Format Salah} $$";
            if (window.MathJax && MathJax.typeset) MathJax.typeset([outputDiv]);
        }
    }
</script>

</body>
</html>
