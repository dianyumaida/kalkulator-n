<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tampilan Rumus Kalkulator</title>
    
    <!-- Script MathJax untuk menerjemahkan kode LaTeX menjadi rumus visual -->
    <script src="https://polyfill.io"></script>
    <script id="MathJax-script" async src="https://jsdelivr.net"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .kalkulator-container { max-width: 500px; background: white; padding: 25px; margin: 30px auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ccc; }
        .screen { background: #eef2f3; padding: 20px; border-radius: 6px; min-height: 100px; margin-bottom: 20px; border: 1px solid #ddd; font-size: 20px; overflow-x: auto; }
        h3 { text-align: center; color: #333; margin-top: 0; }
    </style>
</head>
<body>

<div class="kalkulator-container">
    <h3>Layar Kalkulator Matematika</h3>
    
    <!-- Tempat rumus matematika ditampilkan -->
    <div class="screen">
        <!-- Rumus Baris 1 & 2 (Pecahan Bertingkat) -->
        $$\frac{\frac{a}{b} + \frac{a}{2}}{(d : e) - \frac{b}{c} + 5^{\frac{1}{2}}} \times \frac{a}{c} \times c$$
        
        <hr style="border: 0; border-top: 1px dashed #bbb; margin: 15px 0;">
        
        <!-- Rumus Baris 3 (Hasil Kesamaan) -->
        $$= \frac{a}{b} \times \frac{a}{c} \times c$$
    </div>
</div>

</body>
</html>
