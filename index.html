<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Jernih Aktif</title>
    <!-- Library SheetJS untuk Ekspor Excel -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 10px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .baris-nilai-radio {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .layar-atas {
            background: #e0e0e0;
            padding: 10px;
            margin-bottom: 15px;
            text-align: right;
            font-size: 1.2em;
            border-radius: 4px;
            min-height: 25px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Jernih Aktif</h2>
    
    <div id="layar" class="layar-atas">INPUT VARIABEL (A/B/C/D)</div>

    <div class="baris-nilai-radio">
        <label for="r_konst1">Nilai Konstanta Tetap (a: 8, b: 2)</label>
        <input type="radio" name="grup_menu" id="r_konst1" checked>
    </div>

    <button onclick="pindahEditVariabel()">Ganti Variabel</button>
    <button onclick="eksporKeExcel()">Ekspor Excel</button>
</div>

<script>
    let parameterRumus = { v_a: 10, v_b: 20 };
    let listKomponen = ['v_a', 'v_b'];
    let indeksFokus = 0;
    let logDataExcel = [];

    function pindahEditVariabel() {
        indeksFokus = (indeksFokus + 1) % listKomponen.length;
        updateTeksLayarAtas();
    }

    function updateTeksLayarAtas() {
        let labelNama = listKomponen[indeksFokus];
        document.getElementById('layar').innerText = "Fokus: " + labelNama + " (" + parameterRumus[labelNama] + ")";
    }

    function eksporKeExcel() {
        alert("Fungsi Ekspor Excel Berhasil Dipanggil!");
    }

    // Inisialisasi tampilan pertama kali
    updateTeksLayarAtas();
</script>

</body>
</html>
