<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        /* Kontainer Utama Kalkulator */
        .calculator {
            width: 380px;
            height: 730px;
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* AREA LAYAR UTAMA (SETENGAH ATAS - DIPERBESAR) */
        .screen-container {
            flex: 1;
            border: 5px solid #000000;
            padding: 15px;
            background: #ffffff;
            box-sizing: border-box;
            margin-bottom: 15px;
            min-height: 320px;
            overflow-y: auto; /* Memungkinkan baris hasil hitungan di-scroll jika penuh */
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Memaksa semua teks rata kanan atas */
            justify-content: flex-start; /* Mulai barisan teks dari paling atas */
        }
        
        /* Gaya Baris Ketikan dan Hasil Hitungan */
        .calc-row {
            font-size: 32px; /* Ukuran pas agar muat beberapa baris ke bawah */
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        /* Menyoroti hasil paling baru agar lebih tebal */
        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e; /* Berwarna biru gelap penanda hasil akhir */
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* AREA KOTAK TOMBOL (MERAPAT DI BAWAH) */
        .buttons-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* BARIS KOTAK 1: ANGKA 0-9 */
        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 42px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* BARIS KOTAK KEDUA: OPERATOR (* : + - =) */
        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 48px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
        }

        /* BARIS KOTAK KETIGA: FUNGSI TERBAWAH */
        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* Dropdown Menu melayang */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 130%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            box-shadow: 0px -5px 12px rgba(0,0,0,0.3);
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
        }
        .dropdown-item {
            padding: 10px;
            font-size: 15px;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
            text-align: left;
            color: #000;
        }
        .dropdown-item:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- 1. AREA LAYAR MONITOR (KOSONG DI AWAL, MENUMPUK KE BAWAH) -->
    <div class="screen-container" id="screen-display">
        <!-- Baris-baris kalkulasi otomatis ditambahkan ke sini lewat JavaScript -->
    </div>

    <!-- 2. AREA KOTAK TOMBOL (MERAPAT DI BAWAH) -->
    <div class="buttons-container">
        
        <!-- BARIS KOTAK PERTAMA: Angka 0-9 -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <!-- BARIS KOTAK KEDUA: Operator Utama & Sama Dengan (* : + - =) -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')">*</button>
            <button onclick="tekan(':')">:</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="hitungHasil()">=</button>
        </div>

        <!-- BARIS KOTAK KETIGA: PILIH, EDIT, CLEAR -->
        <div class="row-bottom" style="position: relative;">
            
            <!-- Dropdown PILIH -->
            <div style="flex: 1.2; position: relative; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
                
                <div id="dropdown-menu" class="dropdown-menu">
                    <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 6px; margin-bottom: 6px; text-align: left;">Fungsi & Simbol:</div>
                    <div class="dropdown-item" onclick="tekan('.')">. (Titik Desimal)</div>
                    <div class="dropdown-item" onclick="tekan('%')">% (Persen)</div>
                    <div class="dropdown-item" onclick="tekan('Σ')">Σ (Sigma)</div>
                    <div class="dropdown-item" onclick="tekan('^')">^ (Pangkat)</div>
                </div>
            </div>

            <!-- Tombol EDIT (Kuning) -->
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            
            <!-- Tombol CLEAR / DEL (Merah) -->
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>

    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let stringRumusAktif = ""; 
let currentLineElement = null;

// Fungsi saat tombol ditekan
function tekan(karakter) {
    if (isManualEdit) return;
    let v = String(karakter);
    
    // Jika belum ada baris pengetikan aktif, buat baris baru di kanan atas
    if (!currentLineElement) {
        currentLineElement = document.createElement("div");
        currentLineElement.className = "calc-row";
        display.appendChild(currentLineElement);
    }
    
    stringRumusAktif += v;
    currentLineElement.innerText = stringRumusAktif;
    
    // Auto-scroll ke paling bawah layar jika baris sudah sangat banyak
    display.scrollTop = display.scrollHeight;
}

// Fungsi eksekusi hitung turun ke bawah saat klik Sama Dengan (=)
function hitungHasil() {
    if (isManualEdit || stringRumusAktif === "") return;
    try {
        let ekspresi = stringRumusAktif;

        // Normalisasi simbol komputasi JavaScript
        ekspresi = ekspresi.replace(/x/g, "*").replace(/:/g, "/");
        ekspresi = ekspresi.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        ekspresi = ekspresi.replace(/(\d+)%/g, "($1/100)");

        ekspresi = ekspresi.replace(/Σ(\d+)/g, function(match, angka) {
            let total = 0;
            for (let i = 1; i <= parseInt(angka); i++) { total += i; }
            return total;
        });

        let hasil = eval(ekspresi);
        
        // Buat baris baru di bawahnya khusus untuk menampilkan HASIL
        let resultLine = document.createElement("div");
        resultLine.className = "calc-row latest-result";
        resultLine.innerText = "= " + hasil;
        display.appendChild(resultLine);
        
        // Reset penampung rumus untuk baris transaksi berikutnya
        stringRumusAktif = "";
        currentLineElement = null;
        
        display.scrollTop = display.scrollHeight;
    } catch(e) {
        if (currentLineElement) currentLineElement.innerText = "Error";
        stringRumusAktif = "";
        currentLineElement = null;
    }
}

// Mengizinkan layar diketik manual melalui keyboard laptop/PC jika diinginkan
