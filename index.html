<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Rumus Pecahan</title>
    
    <!-- Memuat MathJax untuk render pecahan bertingkat secara dinamis -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://jsdelivr.net"></script>

    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f0f0; margin: 0; }
        
        /* Wadah Utama Kalkulator */
        .calculator { width: 340px; background: white; border: 2px solid #000; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Layar Utama Atas */
        .display-screen { border: 2px solid #000; height: 220px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; font-size: 1.2rem; background: #fff; }
        
        /* Baris Tombol Operator Atas (+ - * : =) */
        .operator-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .btn-op { background-color: #ffe5d9; border: 1px solid #000; border-radius: 5px; padding: 10px 0; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        
        /* Bagian Bawah: Panel Kiri dan Panel Angka */
        .bottom-section { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        
        /* Panel Kiri (Hijau) */
        .left-panel { background-color: #e2efda; border: 1px solid #000; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
        .input-box { background: white; border: 1px solid #000; border-radius: 5px; height: 35px; }
        .btn-pilih { background: white; border: 1px solid #000; border-radius: 5px; color: red; font-weight: bold; font-size: 0.9rem; padding: 6px 0; cursor: pointer; text-align: center; }
        
        /* Panel Kanan (Tombol Angka) */
        .num-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .btn-num { background: white; border: 1px solid #000; border-radius: 5px; padding: 12px 0; font-size: 1.2rem; font-weight: bold; cursor: pointer; text-align: center; }
        
        /* Tombol Khusus Bawah */
        .btn-back { background-color: #fff2cc; }
        .btn-delete { background-color: #f8cecc; font-size: 0.9rem; font-weight: bold; }
        
        /* Hover effect sederhana */
        button:active { opacity: 0.7; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Layar Hasil Atas -->
    <div class="display-screen" id="screen">
        <div id="math-output">$$ \text{Masukkan Rumus...} $$</div>
    </div>

    <!-- Tombol Operator Utama -->
    <div class="operator-row">
        <button class="btn-op" onclick="press(' + ')">+</button>
        <button class="btn-op" onclick="press(' - ')">-</button>
        <button class="btn-op" onclick="press(' \\times ')">×</button>
        <button class="btn-op" onclick="press(' : ')">:</button>
        <button class="btn-op" onclick="hitung()">=</button>
    </div>

    <!-- Bagian Bawah -->
    <div class="bottom-section">
        <!-- Panel Hijau Kiri -->
        <div class="left-panel">
            <div class="input-box"></div>
            <div class="input-box"></div>
            <div class="input-box"></div>
            <button class="btn-pilih">&lt; PILIH &gt;</button>
        </div>

        <!-- Panel Angka Kanan -->
        <div class="num-panel">
            <button class="btn-num" onclick="press('6')">6</button>
            <button class="btn-num" onclick="press('1')">1</button>
            
            <button class="btn-num" onclick="press('7')">7</button>
            <button class="btn-num" onclick="press('2')">2</button>
            
            <button class="btn-num" onclick="press('8')">8</button>
            <button class="btn-num" onclick="press('3')">3</button>
            
            <button class="btn-num" onclick="press('9')">9</button>
            <button class="btn-num" onclick="press('4')">4</button>
            
            <button class="btn-num" onclick="press('0')">0</button>
            <button class="btn-num" onclick="press('5')">5</button>
            
            <button class="btn-num btn-back" onclick="backspace()">←</button>
            <button class="btn-num btn-delete" onclick="clearAll()">DELETE</button>
        </div>
    </div>
</div>

<script>
    let currentInput = "";

    // Fungsi saat tombol angka/operator ditekan
    function press(val) {
        currentInput += val;
        updateDisplay();
    }

    // Fungsi hapus satu karakter per satu (Backspace)
    function backspace() {
        if(currentInput.endsWith(' \\times ') || currentInput.endsWith(' : ')) {
            currentInput = currentInput.slice(0, -9);
        } else if(currentInput.endsWith(' + ') || currentInput.endsWith(' - ')) {
            currentInput = currentInput.slice(0, -3);
        } else {
            currentInput = currentInput.slice(0, -1);
        }
        updateDisplay();
    }

    // Fungsi hapus total
    function clearAll() {
        currentInput = "";
        document.getElementById('math-output').innerHTML = "$$ \\text{Masukkan Rumus...} $$";
        MathJax.typeset();
    }

    // Memperbarui tampilan rumus di layar secara real-time
    function updateDisplay() {
        if(currentInput === "") {
            document.getElementById('math-output').innerHTML = "$$ \\text{Masukkan Rumus...} $$";
            return;
        }
        
        // Mengubah input teks biasa menjadi format LaTeX Pecahan Bertingkat jika ada pembagian
        let latexFormula = formatToLatex(currentInput);
        
        document.getElementById('math-output').innerHTML = "$$ " + latexFormula + " $$";
        // Memicu MathJax untuk merender ulang kode matematika menjadi visual grafis pecahan
        MathJax.typeset();
    }

    // Pengubah input menjadi bentuk pecahan LaTeX bertingkat secara otomatis
    function formatToLatex(str) {
        let parts = str.split(' : ');
        if(parts.length > 1) {
            // Jika ada tanda titik dua (:), otomatis diubah jadi pecahan \frac{atas}{bawah}
            return `\\frac{${parts[0]}}{${parts[1]}}`;
        }
        return str;
    }

    // Fungsi ketika tombol (=) ditekan untuk menghitung hasil evaluasi rumus asli
    function hitung() {
        try {
            // Ubah simbol visual menjadi simbol operasi asli JavaScript untuk kalkulasi
            let jsExpression = currentInput.replace(/\\times/g, '*').replace(/:/g, '/');
            let hasil = eval(jsExpression);
            
            if(hasil !== undefined) {
                let formulaAsli = formatToLatex(currentInput);
                // Menampilkan rumus awal dan hasil akhirnya tepat di bawahnya secara vertikal
                document.getElementById('math-output').innerHTML = `$$ ${formulaAsli} $$ $$ = ${hasil} $$`;
                MathJax.typeset();
            }
        } catch (error) {
            document.getElementById('math-output').innerHTML = "$$ \\text{Format Salah} $$";
            MathJax.typeset();
        }
    }
</script>

</body>
</html>
