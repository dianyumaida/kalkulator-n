<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <!-- Layar Tampilan (Kotak Besar Atas) -->
        <!-- contenteditable="false" akan berubah jadi "true" saat tombol EDIT ditekan -->
        <div class="screen" id="screen" contenteditable="false">0</div>

        <!-- Baris Angka (1-9, 0) -->
        <div class="row numbers">
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendNumber('0')">0</button>
        </div>

        <!-- Baris Operator Utama & Fungsi -->
        <div class="row operators">
            <button onclick="setOperator('*')">×</button>
            <button onclick="setOperator('/')">:</button>
            <button onclick="setOperator('+')">+</button>
            <button onclick="setOperator('-')">-</button>
            <button onclick="calculate()">=</button>
            <button onclick="deleteLast()">DELET</button>
        </div>

        <!-- Baris Tombol Pilih (Radio Mode + Tombol Edit) -->
        <div class="row select-zone">
            <span class="label">▲ PILIH ▼</span>
            <label class="radio-container">
                <input type="radio" name="calc-mode" value="percent" id="rad-percent"> %
            </label>
            <label class="radio-container">
                <input type="radio" name="calc-mode" value="sigma" id="rad-sigma"> Σ
            </label>
            <button id="btn-edit" onclick="toggleEditMode()" style="background: #ffcc00;">EDIT</button>
            <button onclick="clearAll()" style="background: #ff4d4d; color: white;">CLEAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
