<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Vertikal - Perbaikan Fitur</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #f5ece2;
            padding: 20px;
            min-height: 100vh;
        }

        .kalkulator-box {
            display: flex;
            flex-direction: column;
            width: 440px;
            background: #fff;
            border: 3px solid #333;
            box-shadow: 5px 5px 0px #333;
            padding: 15px;
            border-radius: 8px;
        }

        .layer-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        .layer-jernih {
            width: 100%;
            height: 200px;
            border: 3px solid #333;
            background-color: #f9f9f9;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }

        .layer-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .layer-title {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-clear-layer {
            background-color: #ff4d4d;
            color: white;
            border: 1px solid #333;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-clear-layer:hover {
            background-color: #ff1a1a;
        }

        .history-stream {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            font-size: 0.95rem;
            color: #333;
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 2px 0;
            width: 100%;
            word-wrap: break-word;
        }

        .current-input {
            width: 100%;
            text-align: left;
            font-size: 1.4rem;
            font-weight: bold;
            color: #000;
            border-top: 2px solid #333;
            padding-top: 5px;
            min-height: 35px;
            word-wrap: break-word;
        }

        .panel-simbol {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 12px;
        }

        .btn-simbol {
            border: 2px solid #333;
            background: #ffe6cc;
            padding: 8px 2px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
        }

        .btn-simbol:active {
            background: #ccd;
        }

        .tampilan-bawah {
            display: flex;
            gap: 12px;
        }

        /* MENU UTAMA DAN SUB-MENU ANAK */
        .kolom-pilih {
            display: flex;
            flex-direction: column;
            width: 130px;
            gap: 5px;
        }

        .menu-induk {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid #333;
            background-color: #e6ffed;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }

        .menu-anak {
            list-style: none;
            padding-left: 10px;
            display: none; /* Tersembunyi sebelum menu induk diklik */
            flex-direction: column;
            gap: 4px;
            margin-top: 2px;
        }

        .menu-anak.buka {
            display: flex;
        }

        .menu-anak li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .menu-anak li:hover {
            background-color: #f0f0f0;
        }

        /* GRID ANGKA */
        .kolom-angka {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .grid-num {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-num {
            border: 3px solid #333;
            background: #fff;
            padding: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
        }

        .btn-num:active {
            background-color: #eee;
        }

        .btn-delete {
            width: 100%;
            border: 3px solid #333;
            background-color: #ffdde0;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-delete:active {
            background-color: #ffccd0;
        }
    </style>
</head>
<body>

    <div class="kalkulator-box">
        
        <!-- BAGIAN ATAS: LAYER -->
        <div class="layer-container">
            <div class="layer-jernih">
                <div class="layer-header">
                    <div class="layer-title">Layer Jernih</div>
                    <button class="btn-clear-layer" onclick="bersihkanLayerJernih()">CLEAR LAYER</button>
                </div>
                <div class="history-stream" id="historyStream"></div>
                <div class="current-input" id="activeScreen">0</div>
            </div>
        </div>

        <!-- PANEL TOMBOL SIMBOL DASAR -->
        <div class="panel-simbol">
            <button class="btn-simbol" onclick="tekanSimbol('+')">+</button>
            <button class="btn-simbol" onclick="tekanSimbol('-')">-</button>
            <button class="btn-simbol" onclick="tekanSimbol('*')">×</button>
            <button class="btn-simbol" onclick="tekanSimbol('/')">÷</button>
            <button class="btn-simbol" onclick="hitungSamaDengan()">=</button>
        </div>

        <!-- BAGIAN BAWAH -->
        <div class="tampilan-bawah">
            
            <!-- SISI KIRI: MENU PILIH DENGAN ANAK-ANAKNYA -->
            <div class="kolom-pilih">
                
                <!-- Kelompok Sudut -->
                <div class="menu-induk" onclick="toggleMenuAnak('anakSudut', 'radioSudut')">
                    <span>sudut</span>
                    <input type="radio" name="pilihan_utama" id="radioSudut">
                </div>
                <ul class="menu-anak" id="anakSudut">
                    <li onclick="eksekusiRumusAnak('sin', event)"><input type="radio" name="sub_pilih" id="r-sin"> sin</li>
                    <li onclick="eksekusiRumusAnak('cos', event)"><input type="radio" name="sub_pilih" id="r-cos"> cos</li>
                    <li onclick="eksekusiRumusAnak('tan', event)"><input type="radio" name="sub_pilih" id="r-tan"> tan</li>
                </ul>

                <!-- Kelompok Rumus Lain -->
                <div class="menu-induk" onclick="toggleMenuAnak('anakRumus', 'radioRumus')">
                    <span>rumus</span>
                    <input type="radio" name="pilihan_utama" id="radioRumus">
                </div>
                <ul class="menu-anak" id="anakRumus">
                    <li onclick="eksekusiRumusAnak('log', event)"><input type="radio" name="sub_pilih" id="r-log"> log</li>
                    <li onclick="eksekusiRumusAnak('akar', event)"><input type="radio" name="sub_pilih" id="r-akar"> √ akar</li>
                    <li onclick="eksekusiRumusAnak('integral', event)"><input type="radio" name="sub_pilih" id="r-int"> ∫ int</li>
                </ul>

            </div>

            <!-- SISI KANAN: TOMBOL ANGKA -->
            <div class="kolom-angka">
                <div class="grid-num">
                    <button class="btn-num" onclick="tekanAngka('6')">6</button>
                    <button class="btn-num" onclick="tekanAngka('1')">1</button>
                    
                    <button class="btn-num" onclick="tekanAngka('7')">7</button>
                    <button class="btn-num" onclick="tekanAngka('2')">2</button>
                    
                    <button class="btn-num" onclick="tekanAngka('8')">8</button>
                    <button class="btn-num" onclick="tekanAngka('3')">3</button>
                    
                    <button class="btn-num" onclick="tekanAngka('9')">9</button>
                    <button class="btn-num" onclick="tekanAngka('4')">4</button>
                    
                    <button class="btn-num" onclick="tekanAngka('0')">0</button>
                    <button class="btn-num" onclick="tekanAngka('5')">5</button>
                </div>
                
                <button class="btn-delete" onclick="hapusLayarAktif()">DELETE</button>
            </div>

        </div>
    </div>

    <script>
        const activeScreen = document.getElementById('activeScreen');
