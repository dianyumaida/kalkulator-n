<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Beruntun Akuntansi</title>
    <style>
        .calculator {
            width: 380px;
            height: 730px;
            background: #ffffff;
            border: 6px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 8px 8px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 10px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* AREA MONITOR LAYAR UTAMA */
        .screen-container {
            flex: 1;
            border: 5px solid #000000;
            padding: 15px;
            background: #ffffff;
            box-sizing: border-box;
            margin-bottom: 15px;
            min-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* PANEL KOTAK TOMBOL BAWAH */
        .buttons-container {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rom-grid-first {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-first button {
            flex: 1;
            height: 42px;
            margin: 0 2px;
            background: #f2f2f2;
            border: 3px solid #000000;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .rom-grid-second {
            display: flex;
            justify-content: space-between;
            border: 5px solid #000000;
            padding: 6px;
            background: #ffffff;
        }
        .rom-grid-second button {
            flex: 1;
            height: 48px;
            margin: 0 3px;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 24px;
            cursor: pointer;
        }

        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 5px solid #000000;
            padding: 10px;
            background: #e5e5e5;
        }
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-edit {
            flex: 1;
            background: #ffcc00;
            border: 4px solid #000000;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
            margin: 0 12px;
            text-align: center;
        }
        .btn-clear {
            flex: 1;
            background: #ff2a2a;
            color: #ffffff;
            font-weight: bold;
            padding: 12px 0;
            font-size: 16px;
            cursor: pointer;
        }

        /* PANEL MODAL MENU PILIH BESAR FULL SCREEN */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            border: 6px solid #000000;
            z-index: 9999;
            box-sizing: border-box;
            overflow-y: auto;
        }
        
        .menu-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eeeeee;
            border-bottom: 2px solid #ccc;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        /* Desain Folder Header */
        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #333333;
            cursor: pointer;
            user-select: none;
        }
        .folder-header span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Wadah Konten Cucu Dropdown */
        .sub-dropdown-content {
            display: none; /* Dikontrol penuh transisinya lewat skrip JS */
            background: #ffffff;
        }
        
        /* Baris Opsi Cucu Bersistem Radio */
        .cucu-radio-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 25px 12px 45px;
            font-size: 16px;
            color: #444444;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            background: #ffffff;
        }
        .cucu-radio-row:hover {
            background: #fafafa;
        }
        
        .cucu-radio-row input[type="radio"] {
            cursor: pointer;
            margin: 0;
            width: 20px;
            height: 20px;
            accent-color: #555;
        }

        .btn-close-menu {
            background: #ff2a2a;
            color: #ffffff;
            border: 2px solid #000000;
            font-weight: bold;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Tombol Hapus Riwayat */
        .btn-hapus-riwayat {
            background: #ff2a2a;
            color: #ffffff;
            border: 2px solid #000;
            font-weight: bold;
            padding: 10px 20px;
            margin: 15px auto;
            cursor: pointer;
            font-size: 15px;
            display: block;
            width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Screen Display -->
    <div class="screen-container" id="screen-display"></div>

    <!-- Buttons Container -->
    <div class="buttons-container">
        <div class="rom-grid-first">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        <div class="rom-grid-second">
            <button onclick="tekan('*')">*</button>
            <button onclick="tekan(':')">:</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="hitungHasil()">=</button>
        </div>

        <div class="row-bottom">
            <div style="flex: 1.2; display: flex;">
                <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
            </div>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>

    <!-- MODAL MENU PILIH BESAR / FULL SCREEN -->
    <div id="dropdown-menu" class="dropdown-menu">
        <div class="menu-title-bar">
            <span>-- Pilih Menu --</span>
            <span>▼</span>
        </div>
        
        <!-- 1. FOLDER ANAK: SIMBOL -->
        <div class="folder-header" onclick="toggleFolder('simbol-panel', 'arrow-simbol')">
            <span>📁 -- simbol --</span>
            <span id="arrow-simbol">▼</span>
        </div>
        <div id="simbol-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('.', 'simbol-opt')">
                <span>. (Titik Desimal)</span>
                <input type="radio" name="simbol-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('%', 'simbol-opt')">
                <span>% (Persen)</span>
                <input type="radio" name="simbol-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('^', 'simbol-opt')">
                <span>^ (Pangkat)</span>
                <input type="radio" name="simbol-opt">
            </div>
        </div>

        <!-- 2. FOLDER ANAK: SIGMA -->
        <div class="folder-header" onclick="toggleFolder('sigma-panel', 'arrow-sigma')">
            <span>📁 -- sigma --</span>
            <span id="arrow-sigma">▼</span>
        </div>
        <div id="sigma-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('Σ', 'sigma-opt')">
                <span>Ketik Manual (Σ)</span>
                <input type="radio" name="sigma-opt">
            </div>
            <div class="cucu-radio-row" onclick="pilihCucu('Σ3', 'sigma-opt')">
                <span>Hingga 3 (Σ3)</span>
                <input type="radio" name="sigma-opt">
            </div>
            <div class="cucu-radio-row" onclick="pucuKuadrat('Σ5', 'sigma-opt')">
            <!-- 🌟 SAMBUNGAN MULAI DARI SINI (Hingga 5 Σ5) 🌟 -->
            <div class="cucu-radio-row" onclick="pilihCucu('Σ5', 'sigma-opt')">
                <span>Hingga 5 (Σ5)</span>
                <input type="radio" name="sigma-opt">
            </div>
        </div> <!-- Penutup #sigma-panel -->

        <!-- 3. FOLDER ANAK: RIWAYAT -->
        <div class="folder-header" onclick="toggleFolder('riwayat-panel', 'arrow-riwayat')">
            <span>📁 -- riwayat --</span>
            <span id="arrow-riwayat">▼</span>
        </div>
        <div id="riwayat-panel" class="sub-dropdown-content">
            <div class="cucu-radio-row" onclick="pilihCucu('Riwayat', 'riwayat-opt')">
                <span>Riwayat Hitungan</span>
                <input type="radio" name="riwayat-opt" id="rad-riwayat-statis">
            </div>
            <button type="button" class="btn-hapus-riwayat" onclick="hapusRiwayatPermanen(event)">Hapus</button>
        </div>

        <!-- Tombol Batal Untuk Kembali Ke Kalkulator Utama -->
        <div style="padding: 20px; text-align: center;">
            <button type="button" class="btn-close-menu" onclick="tutupSemuaMenu()" style="width: 100%; padding: 12px 0; font-size: 16px;">KEMBALI KE KALKULATOR ✕</button>
        </div>
    </div> <!-- Penutup #dropdown-menu -->

</div> <!-- Penutup .calculator UTAMA Anda -->

<!-- LOGIKA JAVASCRIPT LENGKAP -->
<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function klikTombolPilih() {
    document.getElementById('dropdown-menu').style.display = "block";
}

function toggleFolder(panelId, arrowId) {
    const subPanel = document.getElementById(panelId);
    const arrow = document.getElementById(arrowId);
    
    if (subPanel.style.display === "block") {
        subPanel.style.display = "none";
        arrow.innerText = "▼";
    } else {
        subPanel.style.display = "block";
        arrow.innerText = "▲";
    }
}

function pilihCucu(teksRumus, radioName) {
    const eventTarget = window.event ? window.event.currentTarget : null;
    if (eventTarget) {
        const radio = eventTarget.querySelector('input[type="radio"]');
        if (radio) radio.checked = true;
    }

    if (teksRumus !== 'Riwayat') {
        tekan(teksRumus);
    }
    
    setTimeout(function() {
        tutupSemuaMenu();
        document.querySelectorAll(`input[name="${radioName}"]`).forEach(r => r.checked = false);
    }, 180);
}

function tutupSemuaMenu() {
    document.getElementById('dropdown-menu').style.display = "none";
    document.getElementById('simbol-panel').style.display = "none";
    document.getElementById('sigma-panel').style.display = "none";
    document.getElementById('riwayat-panel').style.display = "none";
    
    document.getElementById('arrow-simbol').innerText = "▼";
    document.getElementById('arrow-sigma').innerText = "▼";
    document.getElementById('arrow-riwayat').innerText = "▼";
}

function hapusRiwayatPermanen(event) {
    if (event) event.stopPropagation(); 
    rumusBarisIni = "";
    riwayatHitunganHTML = "";
    display.innerHTML = "";
    
    const radRiwayat = document.getElementById('rad-riwayat-statis');
    if (radRiwayat) radRiwayat.checked = false;
    
    setTimeout(function() {
        tutupSemuaMenu();
    }, 100);
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (isManualEdit || rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        
        ekspresi = ekspresi.replace(/:/g, "/"); 
        ekspresi = ekspresi.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        ekspresi = ekspresi.replace(/(\d+)%/g, "($1/100)");
        
        ekspresi = ekspresi.replace(/[Σ∑\u03A3\u2211](\d+)/g, function(match, angka) {
            let total = 0; 
            let batas = parseInt(angka) || 0;
            for (let i = 1; i <= batas; i++) { total += i; } 
            return String(total);
        });

        ekspresi = ekspresi.replace(/\+\+/g, "+");
        ekspresi = ekspresi.replace(/\-\-/g, "+");

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:22px;">Format Error</div>`;
        renderLayar();
    }
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    document.getElementById("btn-edit").innerText = isManualEdit ? "OK" : "EDIT";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
