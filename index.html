<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koreksi Lengkap - Angka & Simbol</title>
    <!-- Library Math.js untuk pemrosesan turunan rumus matematika -->
    <script src="https://cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: Arial, sans-serif;
            background-color: #2c3e50; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Wadah Utama Kalkulator berbasis Ukuran Gambar */
        .calculator-frame { 
            position: relative;
            width: 100%;
            max-width: 420px; 
            aspect-ratio: 4 / 7; 
            background-image: url('Folder/gambar/bodykal.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* KOTAK LAYAR (Biru Transparan untuk Koreksi) */
        .screen-overlay { 
            position: absolute;
            top: 6%;         /* <--- Atur posisi naik/turun layar */
            left: 8%;        /* <--- Atur posisi kiri/kanan layar */
            width: 84%;      /* <--- Atur lebar layar */
            height: 12%;     /* <--- Atur tinggi layar */
            background: rgba(0, 123, 255, 0.4); 
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: center;
            border: 2px solid #0056b3;
        }
        
        .display-input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 24px; 
            font-weight: bold;
            text-align: right;
            color: #fff;
            outline: none;
        }

        /* AREA BLOK TOMBOL (Sekarang menggunakan 5 kolom untuk memuat semua menu) */
        .buttons-overlay {
            position: absolute;
            top: 22%;        /* <--- Atur awal mulainya tombol dari atas */
            left: 5%;        /* <--- Atur batas kiri blok tombol */
            width: 90%;      /* <--- Atur total lebar blok tombol */
            height: 73%;     /* <--- Atur total tinggi blok tombol ke bawah */
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 Kolom Tombol */
            gap: 6px;        
            border: 2px dashed #28a745; 
        }

        /* TOMBOL KOREKSI (Merah Transparan dengan Label Teks) */
        .invisible-btn {
            background: rgba(220, 53, 69, 0.5); 
            border: 1px solid #dc3545;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            color: white;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 1px 1px #000;
        }
        
        .invisible-btn:active {
            background: rgba(220, 53, 69, 0.8);
        }
    </style>
</head>
<body>

<div class="calculator-frame">
    
    <div class="screen-overlay">
        <input type="text" id="mainDisplay" class="display-input" placeholder="0" readonly>
    </div>

    <!-- Grid Layout Tombol Baru (Total 30 Slot Tombol Koreksi) -->
    <div class="buttons-overlay">
        
        <!-- BARIS 1: Kontrol & Memori -->
        <button class="invisible-btn" onclick="toggleRekam('ON')">RKM ON</button> 
        <button class="invisible-btn" onclick="toggleRekam('OFF')">RKM OFF</button> 
        <button class="invisible-btn" onclick="muatRiwayatCepat()">RIWAYAT</button> 
        <button class="invisible-btn" onclick="hapusLayar()">CE</button> 
        <button class="invisible-btn" onclick="tekanKunci('^')">^</button>

        <!-- BARIS 2: Variabel Anak (x, a, b, c, d) -->
        <button class="invisible-btn" onclick="tekanKunci('x')">x</button>
        <button class="invisible-btn" onclick="tekanKunci('a')">a</button>
        <button class="invisible-btn" onclick="tekanKunci('b')">b</button>
        <button class="invisible-btn" onclick="tekanKunci('c')">c</button>
        <button class="invisible-btn" onclick="tekanKunci('d')">d</button>

        <!-- BARIS 3: Variabel g, Simbol, dan Angka Atas -->
        <button class="invisible-btn" onclick="tekanKunci('g')">g</button>
        <button class="invisible-btn" onclick="tekanKunci('(')">(</button> 
        <button class="invisible-btn" onclick="tekanKunci(')')">)</button> 
        <button class="invisible-btn" onclick="tekanKunci('%')">%</button>
        <button class="invisible-btn" onclick="tekanKunci('7')">7</button>

        <!-- BARIS 4: Angka & Operator -->
        <button class="invisible-btn" onclick="tekanKunci('8')">8</button>
        <button class="invisible-btn" onclick="tekanKunci('9')">9</button>
        <button class="invisible-btn" onclick="tekanKunci('+')">+</button>
        <button class="invisible-btn" onclick="tekanKunci('-')">-</button>
        <button class="invisible-btn" onclick="tekanKunci('4')">4</button>

        <!-- BARIS 5: Angka & Operator -->
        <button class="invisible-btn" onclick="tekanKunci('5')">5</button>
        <button class="invisible-btn" onclick="tekanKunci('6')">6</button>
        <button class="invisible-btn" onclick="tekanKunci('*')">*</button>
        <button class="invisible-btn" onclick="tekanKunci('/')">/</button>
        <button class="invisible-btn" onclick="tekanKunci('1')">1</button>

        <!-- BARIS 6: Angka Bawah & Eksekusi Utama -->
        <button class="invisible-btn" onclick="tekanKunci('2')">2</button>
        <button class="invisible-btn" onclick="tekanKunci('3')">3</button>
        <button class="invisible-btn" onclick="tekanKunci('0')">0</button>
        <button class="invisible-btn" onclick="tekanKunci('.')">.</button>
        <button class="invisible-btn" onclick="hitungSamaDengan()">=</button> 
        
    </div>
</div>

<script>
    const display = document.getElementById('mainDisplay');
    let rekamStatus = true; 
    let riwayatMemori = [];
    let riwayatIndeks = 0;

    function tekanKunci(karakter) {
        if (display.getAttribute('data-hasil') === 'true') {
            display.value = '';
            display.removeAttribute('data-hasil');
        }
        if (display.value === "0") display.value = "";
        display.value += karakter;
        
        if (rekamStatus) {
            if (!riwayatMemori.includes(display.value)) {
                riwayatMemori.push(display.value);
            }
        }
    }

    function toggleRekam(status) {
        rekamStatus = (status === 'ON');
        alert("Status Rekam: " + (rekamStatus ? "Aktif" : "Tidak Aktif"));
    }

    function muatRiwayatCepat() {
        if (riwayatMemori.length === 0) {
            alert("Riwayat masih kosong!");
            return;
        }
        display.value = riwayatMemori[riwayatIndeks];
        display.removeAttribute('data-hasil');
        riwayatIndeks = (riwayatIndeks + 1) % riwayatMemori.length;
    }

    function hapusLayar() {
        display.value = "0";
        display.removeAttribute('data-hasil');
    }

    function hitungSamaDengan() {
        const rumus = display.value;
        if (!rumus || rumus === "0") {
            display.value = "0";
            return;
        }
        try {
            const hasilTurunan = math.derivative(rumus, 'x');
            display.value = hasilTurunan.toString();
            display.setAttribute('data-hasil', 'true');
        } catch (err) {
            display.value = "Error";
            display.setAttribute('data-hasil', 'true');
        }
    }
</script>
</body>
</html>
