<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Akuntansi Akurat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden; 
        }

        /* FRAME BINGKAI UTAMA KALKULATOR */
        .calculator {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 380px 730px; 
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            box-shadow: 8px 8px 0px #000000;
            box-sizing: border-box;
            position: relative; 
            margin: 10px auto;
        }

        /* AREA MONITOR LAYAR PUTIHAN */
        .screen-container {
            position: absolute;
            top: 35px;     
            left: 20px;    
            width: 340px;  
            height: 250px; 
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            pointer-events: auto !important;
            z-index: 5;
            background: transparent;
        }

        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* CONTAINER LAPISAN SENSOR TOMBOL */
        .buttons-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 730px;
            pointer-events: none; 
            z-index: 10;
        }

        /* 🌟 AREA BACKGROUND BUTTON DIHAPUS, TEKS ANGKA/SIMBOL DIJAGA HITAM DEMPET 🌟 */
        .buttons-container button {
            background: transparent !important;       /* Transparan penuh tanpa kotak putih menghalangi */
            border: none !important;                  /* Menghilangkan garis merah penguji sebelumnya */
            color: #000000 !important;                 /* Angka hitam tebal menempel dempet di atas gambar */
            font-weight: 900 !important;              /* Ketebalan maksimal */
            font-size: 16px !important;
            outline: none !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
            pointer-events: auto !important; 
            position: absolute; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🌟 BARIS 1: TOMBOL ANGKA (0-9) - POSISI PAS DI TENGAH CETAKAN KOTAK 🌟 */
        .rom-grid-first button { top: 542px; height: 36px; }
        
        .btn-num-0 { left: 16px;  width: 25px; }
        .btn-num-1 { left: 52px;  width: 25px; }
        .btn-num-2 { left: 88px;  width: 25px; }
        .btn-num-3 { left: 124px; width: 25px; }
        .btn-num-4 { left: 160px; width: 25px; }
        .btn-num-5 { left: 196px; width: 25px; }
        .btn-num-6 { left: 232px; width: 25px; }
        .btn-num-7 { left: 268px; width: 25px; }
        .btn-num-8 { left: 304px; width: 25px; }
        .btn-num-9 { left: 340px; width: 25px; }

        /* 🌟 BARIS 2: TOMBOL OPERATOR (* : + - =) - POSISI PAS DI TENGAH CETAKAN KOTAK 🌟 */
        .rom-grid-second button { top: 610px; height: 42px; font-size: 22px !important; }
        
        .btn-op-mul { left: 12px;  width: 65px; }
        .btn-op-div { left: 85px;  width: 65px; }
        .btn-op-add { left: 158px; width: 65px; }
        .btn-op-sub { left: 231px; width: 65px; }
        .btn-op-equal { left: 304px; width: 65px; }

        /* 🌟 BARIS 3: FUNGSI TERBAWAH (PILIH, EDIT, CLEAR) - POSISI PAS DI TENGAH CETAKAN KOTAK 🌟 */
        .row-bottom button { top: 681px; height: 38px; font-size: 15px !important; color: #000000 !important; }
        
        .btn-pilih { left: 12px;  width: 120px; }
        .btn-edit  { left: 142px; width: 104px; }
        .btn-clear { left: 256px; width: 110px; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Monitor Layar -->
    <div class="screen-container" id="screen-display"></div>

    <div class="buttons-container">
        <!-- Baris 1: Angka -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')" class="btn-num-0" type="button">0</button>
            <button onclick="tekan('1')" class="btn-num-1" type="button">1</button>
            <button onclick="tekan('2')" class="btn-num-2" type="button">2</button>
            <button onclick="tekan('3')" class="btn-num-3" type="button">3</button>
            <button onclick="tekan('4')" class="btn-num-4" type="button">4</button>
            <button onclick="tekan('5')" class="btn-num-5" type="button">5</button>
            <button onclick="tekan('6')" class="btn-num-6" type="button">6</button>
            <button onclick="tekan('7')" class="btn-num-7" type="button">7</button>
            <button onclick="tekan('8')" class="btn-num-8" type="button">8</button>
            <button onclick="tekan('9')" class="btn-num-9" type="button">9</button>
        </div>

        <!-- Baris 2: Operator -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')" class="btn-op-mul" type="button">*</button>
            <button onclick="tekan(':')" class="btn-op-div" type="button">:</button>
            <button onclick="tekan('+')" class="btn-op-add" type="button">+</button>
            <button onclick="tekan('-')" class="btn-op-sub" type="button">-</button>
            <button onclick="hitungHasil()" class="btn-op-equal" type="button">=</button>
        </div>

        <!-- Baris 3: Navigasi Fungsi -->
        <div class="row-bottom">
            <button onclick="void(0)" class="btn-pilih" type="button">PILIH</button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        ekspresi = ekspresi.replace(/:/g, "/"); 

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:24px;">Error</div>`;
        renderLayar();
    }
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
