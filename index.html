<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        .calculator { width: 100%; max-width: 350px; background: #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        #screen { width: 100%; height: 50px; background: #fff; text-align: right; padding: 10px; font-size: 22px; border-radius: 5px; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
        button { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; background: #e0e0e0; }
        .operators button { background: #f9a825; color: white; }
        .menu-container { width: 100%; max-width: 350px; border: 1px solid #ccc; border-radius: 8px; background: #f0f0f0; overflow: hidden; }
        .menu-header { background: #e0e0e0; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .menu-group { border-bottom: 1px solid #eee; }
        .group-header { background: #fff; padding: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        .item-row, .item-row-history { display: flex; justify-content: space-between; padding: 10px 20px; background: #fff; border-top: 1px solid #f5f5f5; }
    </style>
</head>
<body>
    <!-- UTAMA: KALKULATOR -->
    <div class="calculator">
        <div id="screen">0</div>
        <div class="row">
            <button onclick="tekan('7')">7</button><button onclick="tekan('8')">8</button><button onclick="tekan('9')">9</button>
        </div>
        <div class="row">
            <button onclick="tekan('4')">4</button><button onclick="tekan('5')">5</button><button onclick="tekan('6')">6</button>
        </div>
        <div class="row">
            <button onclick="tekan('1')">1</button><button onclick="tekan('2')">2</button><button onclick="tekan('3')">3</button>
        </div>
        <div class="row">
            <button onclick="tekan('0')">0</button><button onclick="tekan('.')">.</button>
            <button id="btn-edit" onclick="modeEdit()" style="background:#ffcc00;">EDIT</button>
        </div>
        <div class="row operators">
            <button onclick="tekan('*')">x</button><button onclick="tekan('/')">:</button>
            <button onclick="tekan('+')">+</button><button onclick="tekan('-')">-</button>
        </div>
        <div class="row">
            <button onclick="hasil()" style="background:#2ecc71; color:white;">=</button>
            <button onclick="del()" style="background:#e67e22; color:white;">DEL</button>
            <button onclick="clearAll()" style="background:#ff4d4d; color:white;">CLEAR</button>
        </div>
    </div>

    <!-- UTAMA: MENU DROPDOWN -->
    <div class="menu-container">
        <div class="menu-header" onclick="toggle('main-menu-content')"><span>-- Pilih Menu --</span><span>▼</span></div>
        <div id="main-menu-content">
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-simbol')"><span>📁 -- simbol --</span><span>▼</span></div>
                <div id="sec-simbol">
                    <label class="item-row" onclick="tekan('%')"><span>% (Persen)</span><input type="radio" name="m"></label>
                    <label class="item-row" onclick="tekan('Σ')"><span>Σ (Sigma)</span><input type="radio" name="m"></label>
                    <label class="item-row" onclick="tekan('^')"><span>^ (Pangkat)</span><input type="radio" name="m"></label>
                </div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-algo')"><span>📁 -- algoritma --</span><span>▶</span></div>
                <div id="sec-algo" style="display:none;"><div class="item-row"><span>Segera Datang</span></div></div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-riwayat')"><span>📁 -- riwayat --</span><span>▼</span></div>
                <div id="sec-riwayat">
                    <div class="item-row-history">
                        <span id="h-txt">Belum ada riwayat</span>
                        <button onclick="delH()" style="background:#ff4d4d; color:white; padding:2px 8px; font-size:12px;">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- UTAMA: LOGIKA JAVASCRIPT -->
    <script>
        const scr = document.getElementById("screen");
        let isEdit = false;

        function tekan(v) {
            if(isEdit) return;
            scr.innerText = (scr.innerText === "0" && !"+-*/^%Σ".includes(v)) ? v : scr.innerText + v;
        }
                function hasil() {
            if(isEdit || scr.innerText === "0") return;
            try {
                let txt = scr.innerText;
                let riwayatAwal = txt; // Simpan tampilan asli untuk menu riwayat

                // 1. Perbaiki Sistem Pangkat ( ^ )
                txt = txt.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");

                // 2. Perbaiki Sistem Persen ( % )
                // Mengubah angka sebelum % menjadi dibagi 100 (Contoh: 50% menjadi 50/100)
                txt = txt.replace(/(\d+)%/g, "($1/100)");

                // 3. Perbaiki Sistem Sigma ( Σ )
                // Jika user mengetik angka lalu Σ (misal: 5Σ), sistem akan menghitung 1+2+3+4+5
                txt = txt.replace(/(\d+)Σ/g, function(match, angka) {
                    let total = 0;
                    for (let i = 1; i <= parseInt(angka); i++) {
                        total += i;
                    }
                    return total;
                });

                // Jalankan hitungan matematika asli
                let res = eval(txt);
                
                // Tampilkan ke menu riwayat dan layar kalkulator
                document.getElementById('h-txt').innerText = riwayatAwal + " = " + res;
                scr.innerText = res;
            } catch(e) { 
                scr.innerText = "Error"; 
            }
        }

        function del() { if(!isEdit) scr.innerText = scr.innerText.slice(0, -1) || "0"; }
        function clearAll() {
            scr.innerText = "0"; isEdit = false; scr.contentEditable = "false";
            document.getElementById("btn-edit").innerText = "EDIT";
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        }
        function modeEdit() {
            isEdit = !isEdit;
            scr.contentEditable = isEdit ? "true" : "false";
            document.getElementById("btn-edit").innerText = isEdit ? "OK" : "EDIT";
            if(isEdit) scr.focus();
        }
        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "none") ? "block" : "none";
        }
        function delH() { document.getElementById('h-txt').innerText = "Belum ada riwayat"; }
    </script>
</body>
</html>
