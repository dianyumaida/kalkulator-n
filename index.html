<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Saintifik Berlapis</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eef2f3; }
        .kalkulator-container { background: #2c3e50; padding: 20px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); position: relative; }
        #display { width: 100%; height: 70px; font-size: 26px; text-align: right; margin-bottom: 15px; padding: 10px; box-sizing: border-box; border: none; border-radius: 6px; background: #fff; color: #333; }
        .grid-tombol { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        button { background: #ecf0f1; border: none; border-radius: 8px; padding: 18px 0; font-size: 20px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:active { background: #bdc3c7; }
        .btn-delete { grid-column: span 3; background: #e74c3c !important; color: white !important; }
        .btn-sama-dengan { grid-column: span 2; background: #e67e22 !important; color: white !important; }
        .btn-pilih { grid-column: span 5; background: #2ecc71 !important; color: white !important; font-size: 18px !important; margin-top: 5px; }
        
        /* Box Floating Pemanggil File Terpisah pilihan.html */
        .pop-up-terpisah { display: none; position: absolute; bottom: 95px; left: 15px; right: 15px; background: white; border: 3px solid #2ecc71; border-radius: 8px; padding: 10px; box-shadow: 0 -5px 25px rgba(0,0,0,0.5); z-index: 100; }
        iframe { width: 100%; height: 220px; border: none; }
        .aksi-baris { display: flex; justify-content: space-between; margin-top: 8px; }
        .aksi-baris button { padding: 8px 20px !important; font-size: 14px !important; width: auto !important; }
    </style>
</head>
<body>

    <div class="kalkulator-container">
        <!-- Layar Tampilan Kalkulator -->
        <input type="text" id="display" placeholder="0" autofocus>

        <!-- Numpad Utama -->
        <div class="grid-tombol">
            <button onclick="tekanKey('1')">1</button>
            <button onclick="tekanKey('2')">2</button>
            <button onclick="tekanKey('3')">3</button>
            <button onclick="tekanKey('+')">+</button>
            <button onclick="tekanKey('-')">-</button>
            
            <button onclick="tekanKey('4')">4</button>
            <button onclick="tekanKey('5')">5</button>
            <button onclick="tekanKey('6')">6</button>
            <button onclick="tekanKey('*')">×</button>
            <button onclick="tekanKey('/')">÷</button>
            
            <button onclick="tekanKey('7')">7</button>
            <button onclick="tekanKey('8')">8</button>
            <button onclick="tekanKey('9')">9</button>
            <button onclick="tekanKey('0')">0</button>
            <button onclick="tekanKey('.')">.</button>
            
            <!-- Tombol Delete & Operator Evaluasi Perhitungan Berlapis -->
            <button class="btn-delete" onclick="resetLayar()">DELETE</button>
            <button class="btn-sama-dengan" onclick="hitungHasil()">=</button>
            
            <!-- Tombol Panggil Menu File Terpisah -->
            <button class="btn-pilih" id="btnPanggil">PILIH ▾</button>
        </div>

        <!-- Wadah Iframe File Terpisah -->
        <div class="pop-up-terpisah" id="boxIframe">
            <iframe src="pilihan.html" id="frameKonten"></iframe>
            <div class="aksi-baris">
                <button onclick="tutupPilihan()" style="background:#95a5a6; color:white;">Batal</button>
                <button onclick="masukkanSimbolKeIndeks()" style="background:#2ecc71; color:white;">Ok</button>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const btnPanggil = document.getElementById('btnPanggil');
        const boxIframe = document.getElementById('boxIframe');
        const frameKonten = document.getElementById('frameKonten');

        let indeksKursorSimpanan = 0;

        // 1. CODE PERINTAH PANGGIL FILE TERPISAH
        btnPanggil.addEventListener('click', () => {
            indeksKursorSimpanan = display.selectionStart; // Ambil posisi kursor aktif saat ini
            boxIframe.style.display = 'block'; // Buka jendela file terpisah
        });

        function tutupPilihan() {
            boxIframe.style.display = 'none';
        }

        // 2. CARA MELETAKKAN SIMBOL RADIO KE INDEKS STRUKTUR KURSOR
        function masukkanSimbolKeIndeks() {
            const iframeDoc = frameKonten.contentDocument || frameKonten.contentWindow.document;
            const radioTerpilih = iframeDoc.querySelector('input[name="sub_simbol"]:checked');
            
            if (radioTerpilih) {
                const simbol = radioTerpilih.value;
                
                const teksKiri = display.value.substring(0, indeksKursorSimpanan);
                const teksKanan = display.value.substring(indeksKursorSimpanan);
                
                // Letakkan simbol baru di tengah indeks kursor
                display.value = teksKiri + simbol + teksKanan;
                
                display.focus();
                // Jika yang dimasukkan adalah rumus pecahan bertumpuk frac(,), letakkan kursor tepat di dalam koma input pembilang
                let penyesuaianKursor = simbol === "frac(,)" ? 5 : simbol.length;
                display.setSelectionRange(indeksKursorSimpanan + penyesuaianKursor, indeksKursorSimpanan + penyesuaianKursor);
                
                radioTerpilih.checked = false; // Bersihkan status checked radio button
            }
            tutupPilihan();
        }

        function tekanKey(val) {
            display.focus();
            const start = display.selectionStart;
            const end = display.selectionEnd;
            display.setRangeText(val, start, end, 'end');
        }

        function resetLayar() {
            display.value = "";
            display.focus();
        }

        // =======================================================
        // ENGINE CODING PERHITUNGAN KHUSUS UNTUK RUMUS BERLAPIS
        // =======================================================
        function hitungHasil() {
            let ekspresi = display.value;
            try {
                // 1. Parser Fungsi Pecahan Berlapis frac(pembilang,penyebut) menggunakan regex berulang
                while (ekspresi.includes("frac(")) {
                    ekspresi = ekspresi.replace(/frac\(([^,]+),([^)]+)\)/g, "(($1)/($2))");
                }
                
                // 2. Parser Fungsi Akar Bertingkat sqrt(nilai)
                while (ekspresi.includes("sqrt(")) {
                    ekspresi = ekspresi.replace(/sqrt\(([^)]+)\)/g, "Math.sqrt($1)");
                }

                // 3. Ubah format tanda pangkat kustom ^ menjadi fungsi kuadrat bertingkat JS
                if (ekspresi.includes("^")) {
                    let komponen = ekspresi.split("^");
                    ekspresi = `Math.pow(${komponen[0]}, ${komponen[1]})`;
                }

                // Ubah tanda kurung kurawal & siku ke kurung biasa agar terbaca oleh mesin kompilasi eval JavaScript
                ekspresi = ekspresi.replace(/{/g, "(").replace(/}/g, ")");
                ekspresi = ekspresi.replace(/\[/g, "(").replace(/\]/g, ")");
                
                // Eksekusi kalkulasi perhitungan akhir matematika
                let hasilAkhir = eval(ekspresi);
                
                if (hasilAkhir !== undefined) {
                    display.value = hasilAkhir;
                }
            } catch (error) {
                display.value = "Error Rumus Bertingkat";
            }
        }
    </script>
</body>
</html>
