<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Simbol Kustom</title>
    <style>
        /* Desain layout mengikuti sketsa coretan tangan */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e1e;
        }

        .calculator-box {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.6);
        }

        /* Area layar display atas */
        #display {
            width: 100%;
            height: 60px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
            background: #111;
            color: #00ff66;
            border: 2px solid #444;
            border-radius: 6px;
        }

        /* Pembagian layout utama: Kiri (Numpad) dan Kanan (Aksi) */
        .main-layout {
            display: grid;
            grid-template-columns: 3fr 1.5fr;
            gap: 8px;
        }

        /* Grid untuk nomor 1-0 */
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        /* Grid khusus sisi kanan: DELETE dan EDIT */
        .action-grid {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
        }

        /* Tombol standar angka dan kontrol */
        button {
            padding: 18px 5px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #e0e0e0;
            border: none;
            border-radius: 6px;
            transition: background 0.2s;
        }

        button:active {
            background: #bbb;
        }

        /* Tombol angka 0 melebar penuh pada barisnya */
        .btn-nol {
            grid-column: span 3;
        }

        /* Tombol DELETE di bagian kanan atas */
        .btn-delete {
            background: #d32f2f;
            color: white;
            font-size: 14px;
        }

        /* Tombol EDIT (Backspace) tepat berada di bawah DELETE */
        .btn-edit {
            background: #f57c00;
            color: white;
            font-size: 22px;
        }

        /* Tombol PILIH horisontal lebar di paling bawah sketsa */
        .btn-pilih {
            grid-column: span 2;
            background: #2196F3;
            color: white;
            margin-top: 12px;
            padding: 15px;
            width: 100%;
        }

        /* Jendela Pop-up Modal Dialog */
        dialog {
            border: none;
            border-radius: 8px;
            padding: 20px;
            width: 260px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        dialog h3 {
            margin-top: 0;
            font-size: 16px;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .radio-item {
            margin: 12px 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-item input {
            transform: scale(1.2);
            cursor: pointer;
        }

        .modal-actions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .modal-actions button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="calculator-box">
        <!-- Display Layar -->
        <input type="text" id="display" placeholder="0" autofocus>

        <div class="main-layout">
            <!-- Bagian Kiri: Tombol Angka -->
            <div class="numpad-grid">
                <button onclick="inputAngka('1')">1</button>
                <button onclick="inputAngka('2')">2</button>
                <button onclick="inputAngka('3')">3</button>
                <button onclick="inputAngka('4')">4</button>
                <button onclick="inputAngka('5')">5</button>
                <button onclick="inputAngka('6')">6</button>
                <button onclick="inputAngka('7')">7</button>
                <button onclick="inputAngka('8')">8</button>
                <button onclick="inputAngka('9')">9</button>
                <button class="btn-nol" onclick="inputAngka('0')">0</button>
            </div>

            <!-- Bagian Kanan: DELETE & EDIT (Sesuai Posisi Gambar) -->
            <div class="action-grid">
                <button class="btn-delete" onclick="hapusSemua()">DELETE</button>
                <button class="btn-edit" onclick="hapusSatuKarakter()">⌫</button>
            </div>
        </div>

        <!-- Tombol PILIH Terpisah Paling Bawah -->
        <button class="btn-pilih" id="bukaSimbol">PILIH ▾</button>
    </div>

    <!-- MODAL POP-UP UNTUK SIMBOL RADIO BUTTON -->
    <dialog id="modalSimbol">
        <h3>Pilih Simbol:</h3>
        <form method="dialog" id="formSimbol">
            <div class="radio-item"><label><input type="radio" name="math_char" value="{}"> Kurung { }</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="[]"> Kurung [ ]</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="()"> Kurung ( )</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="%"> Persen %</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="~"> Tilde ~</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="√"> Akar √</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="^"> Pangkat ^</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="°"> Derajat °</label></div>
            <div class="radio-item"><label><input type="radio" name="math_char" value="/"> Pecahan /</label></div>
            
            <div class="modal-actions">
                <button type="button" id="tutupSimbol" style="background:#bbb;">Batal</button>
                <button type="submit" style="background:#2196F3; color:white;">Ok</button>
            </div>
        </form>
    </dialog>

    <!-- LOGIKA JAVASCRIPT PERINTAH PANGGIL & MELETAKKAN DI INDEKS KURSOR -->
    <script>
        const display = document.getElementById('display');
        const bukaSimbol = document.getElementById('bukaSimbol');
        const modalSimbol = document.getElementById('modalSimbol');
        const tutupSimbol = document.getElementById('tutupSimbol');
        const formSimbol = document.getElementById('formSimbol');

        // Variabel penyimpan indeks kursor terakhir sebelum modal terbuka
        let urutanKursorStart = 0;
        let urutanKursorEnd = 0;

        // 1. Perintah panggil memunculkan jendela modal pilihan
        bukaSimbol.addEventListener('click', () => {
            // Ambil titik indeks kursor aktif saat ini di dalam display
            urutanKursorStart = display.selectionStart;
            urutanKursorEnd = display.selectionEnd;
            modalSimbol.showModal(); 
        });

        // Menutup jendela modal jika batal
        tutupSimbol.addEventListener('click', () => {
            modalSimbol.close();
        });

        // 2. Memasukkan karakter berdasarkan indeks kursor aktif
        formSimbol.addEventListener('submit', () => {
            const checkedRadio = document.querySelector('input[name="math_char"]:checked');
            if (checkedRadio) {
                const simbol = checkedRadio.value;
                
                display.focus();
                // Meletakkan simbol tepat di posisi kursor/indeks teks yang dipilih user
                display.setRangeText(simbol, urutanKursorStart, urutanKursorEnd, 'end');
                
                // Reset tanda pilihan radio button
                checkedRadio.checked = false;
            }
        });

        // Fungsi input angka standar ke layar kalkulator
        function inputAngka(num) {
            display.focus();
            const start = display.selectionStart;
            const end = display.selectionEnd;
            display.setRangeText(num, start, end, 'end');
        }

        // Fungsi tombol DELETE (Menghapus seluruh layar)
        function hapusSemua() {
            display.value = "";
            display.focus();
        }

        // Fungsi tombol EDIT (Backspace / Menghapus 1 karakter di depan kursor)
        function hapusSatuKarakter() {
            display.focus();
            const start = display.selectionStart;
            const end = display.selectionEnd;

            if (start === end && start > 0) {
                // Menghapus satu karakter tepat di kiri kursor
                display.setRangeText("", start - 1, start, 'end');
            } else {
                // Menghapus teks yang sedang diblok/diseleksi
                display.setRangeText("", start, end, 'end');
            }
        }
    </script>
</body>
</html>
