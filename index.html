<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sketsa - Aliran Kiri Atas Ke Bawah</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #f5ece2; /* Warna kertas sesuai sketsa */
            padding: 20px;
            min-height: 100vh;
        }

        /* Kontainer Utama Kalkulator Vertikal */
        .kalkulator-box {
            display: flex;
            flex-direction: column;
            width: 420px;
            background: #fff;
            border: 3px solid #333;
            box-shadow: 5px 5px 0px #333;
            padding: 15px;
            border-radius: 8px;
        }

        /* CONTAINER LAYAR UTAMA */
        .layer-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        /* 1. LAYER JERNIH (Tampilan Aliran Kiri Atas ke Bawah) */
        .layer-jernih {
            width: 100%;
            height: 180px;
            border: 3px solid #333;
            background-color: #f9f9f9;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Memulai konten dari atas */
            align-items: flex-start;     /* Memulai konten dari sisi kiri */
            position: relative;
        }

        .layer-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .layer-title {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Tombol untuk mendelete / membersihkan isi Layer Jernih */
        .btn-clear-layer {
            background-color: #ff4d4d;
            color: white;
            border: 1px solid #333;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
        }

        .btn-clear-layer:hover {
            background-color: #ff1a1a;
        }

        /* Area log riwayat hasil dari kiri atas berbaris turun ke bawah */
        .history-stream {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left; /* Rata kiri sesuai permintaan */
            font-size: 1rem;
            color: #333;
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 2px 0;
            width: 100%;
            word-wrap: break-word;
        }

        /* Input aktif yang sedang diketik (berada di kiri bawah layar) */
        .current-input {
            width: 100%;
            text-align: left; /* Rata kiri */
            font-size: 1.4rem;
            font-weight: bold;
            color: #000;
            border-top: 2px solid #333;
            padding-top: 5px;
            min-height: 35px;
            word-wrap: break-word;
        }

        /* PANEL TOMBOL SIMBOL MATEMATIKA */
        .panel-simbol {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 12px;
        }

        .btn-simbol {
            border: 2px solid #333;
            background: #eef;
            padding: 8px 2px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
        }

        .btn-simbol:active {
            background: #ccd;
        }

        .btn-simbol.operator-utama {
            background: #ffe6cc;
        }

        /* BAGIAN BAWAH: Navigasi PILIH & Tombol Angka */
        .tampilan-bawah {
            display: flex;
            gap: 12px;
        }

        /* 2. TOMBOL PILIH (Sisi Kiri Memanjang) */
        .kolom-pilih {
            display: flex;
            flex-direction: column;
            width: 85px;
        }

        .btn-pilih {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 3px solid #333;
            background-color: #e6ffed; 
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            gap: 10px;
        }
        
        .btn-pilih span {
            writing-mode: vertical-lr;
            text-orientation: upright;
        }

        .btn-pilih:active {
            background-color: #cdffd8;
        }

        /* 3. GRID ANGKA & DELETE (Sisi Kanan) */
        .kolom-angka {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Susunan 2 Kolom sesuai sketsa asli */
        .grid-num {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-num {
            border: 3px solid #333;
            background: #fff;
            padding: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
        }

        .btn-num:active {
            background-color: #eee;
        }

        /* Tombol DELETE di bagian bawah angka */
        .btn-delete {
            width: 100%;
            border: 3px solid #333;
            background-color: #ffdde0;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-delete:active {
            background-color: #ffccd0;
        }
    </style>
</head>
<body>

    <div class="kalkulator-box">
        
        <!-- BAGIAN ATAS: LAYER CONTAINER -->
        <div class="layer-container">
            <div class="layer-jernih">
                <div class="layer-header">
                    <div class="layer-title">Layer Jernih</div>
                    <!-- Tombol Baru untuk Mereset/Delete isi Layer Jernih -->
                    <button class="btn-clear-layer" onclick="bersihkanLayerJernih()">CLEAR LAYER</button>
                </div>
                <!-- Aliran dari kiri atas ke bawah -->
                <div class="history-stream" id="historyStream"></div>
                <!-- Input aktif rata kiri -->
                <div class="current-input" id="activeScreen">0</div>
            </div>
        </div>

        <!-- PANEL TOMBOL SIMBOL -->
        <div class="panel-simbol">
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('+')">+</button>
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('-')">-</button>
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('*')">×</button>
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('/')">÷</button>
            <button class="btn-simbol operator-utama" onclick="hitungSamaDengan()">=</button>
            
            <button class="btn-simbol" onclick="tekanSimbol('%')">%</button>
            <button class="btn-simbol" onclick="tekanSimbol('**')">^</button>
            <button class="btn-simbol" onclick="fungsiSains('log')">log</button>
            <button class="btn-simbol" onclick="fungsiSains('sin')">∠rad</button> 
            <button class="btn-simbol" onclick="fungsiSains('integral')">∫</button>
        </div>

        <!-- BAGIAN BAWAH -->
        <div class="tampilan-bawah">
            
            <!-- SISI KIRI: TOMBOL PILIH -->
            <div class="kolom-pilih">
                <button class="btn-pilih" onclick="hitungSamaDengan()">
                    <span>PILIH</span>
                    <div>▼</div>
                </button>
            </div>

            <!-- SISI KANAN: TOMBOL ANGKA SESUAI SKETSA -->
            <div class="kolom-angka">
                <div class="grid-num">
                    <button class="btn-num" onclick="tekanAngka('6')">6</button>
                    <button class="btn-num" onclick="tekanAngka('1')">1</button>
                    
                    <button class="btn-num" onclick="tekanAngka('7') text')">7</button>
                    <button class="btn-num" onclick="tekanAngka('2')">2</button>
                    
                    <button class="btn-num" onclick="tekanAngka('8')">8</button>
                    <button class="btn-num" onclick="tekanAngka('3')">3</button>
                    
                    <button class="btn-num" onclick="tekanAngka('9')">9</button>
                    <button class="btn-num" onclick="tekanAngka('4')">4</button>
                    
                    <button class="btn-num" onclick="tekanAngka('0')">0</button>
                    <button class="btn-num" onclick="tekanAngka('5')">5</button>
                </div>
                
                <!-- TOMBOL DELETE INPUT (Untuk menghapus baris ketikan saat ini) -->
                <button class="btn-delete" onclick="hapusLayarAktif()">DELETE</button>
            </div>

        </div>
    </div>

    <script>
        const activeScreen = document.getElementById('activeScreen');
        const historyStream = document.getElementById('historyStream');
        let rumusSaatIni = '';

        // Memasukkan angka ke layar (Rata Kiri)
