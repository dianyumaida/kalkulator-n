<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pro - Menu Dropdown</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f9;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- STYLE KALKULATOR --- */
        .calculator {
            width: 100%;
            max-width: 350px;
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        #screen {
            width: 100%;
            height: 60px;
            background: #fff;
            color: #000;
            text-align: right;
            padding: 15px;
            font-size: 24px;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
        }

        #screen.editing-active {
            background: #fffebb;
            border: 2px solid #ffcc00;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #e0e0e0;
            transition: background 0.2s;
        }

        button:hover {
            background: #d4d4d4;
        }

        .operators button {
            background: #f9a825;
            color: white;
        }

        .operators button:hover {
            background: #f57f17;
        }

        /* --- STYLE MENU DROPDOWN --- */
        .menu-container {
            width: 100%;
            max-width: 350px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f0f0f0;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-header {
            background-color: #e0e0e0;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
        }

        .menu-content {
            background-color: #ffffff;
        }

        .menu-group {
            border-bottom: 1px solid #eee;
        }

        .group-header {
            background-color: #ffffff;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
        }

        .group-header:hover {
            background-color: #f9f9f9;
        }

        .group-items {
            background-color: #ffffff;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            border-top: 1px solid #f5f5f5;
            cursor: pointer;
            position: relative;
        }

        .item-row input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-custom {
            height: 18px;
            width: 18px;
            border: 2px solid #777;
            border-radius: 50%;
            display: inline-block;
        }

        .item-row input[type="radio"]:checked ~ .radio-custom {
            background-color: #555;
            border-color: #333;
        }

        .item-row-history {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            color: #555;
            border-top: 1px solid #f5f5f5;
        }

        .btn-delete-history {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-delete-history:hover {
            background-color: #e03333;
        }

        .arrow {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- CONTAINER KALKULATOR -->
    <div class="calculator">
        <div id="screen">0</div>

        <!-- Tombol Angka & Utama -->
        <div class="row">
            <button onclick="tekanAngka('7')">7</button>
            <button onclick="tekanAngka('8')">8</button>
            <button onclick="tekanAngka('9')">9</button>
        </div>
        <div class="row">
            <button onclick="tekanAngka('4')">4</button>
            <button onclick="tekanAngka('5')">5</button>
            <button onclick="tekanAngka('6')">6</button>
        </div>
        <div class="row">
            <button onclick="tekanAngka('1')">1</button>
            <button onclick="tekanAngka('2')">2</button>
            <button onclick="tekanAngka('3')">3</button>
        </div>
        <div class="row">
            <button onclick="tekanAngka('0')">0</button>
            <button onclick="tekanAngka('.')">.</button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" style="background: #ffcc00;">EDIT</button>
        </div>

        <!-- Operator Kanan -->
        <div class="row operators">
            <button onclick="tekanAngka('*')">x</button>
            <button onclick="tekanAngka('/')">:</button>
            <button onclick="tekanAngka('+')">+</button>
            <button onclick="tekanAngka('-')">-</button>
        </div>
        <div class="row">
            <button onclick="hitungHasil()" style="background: #2ecc71; color: white;">=</button>
            <button onclick="hapusSatuAngka()" style="background: #e67e22; color: white;">DEL</button>
            <button onclick="bersihkanSemua()" style="background: #ff4d4d; color: white;">CLEAR</button>
        </div>
    </div>

    <!-- CONTAINER MENU DROPDOWN (Persis Gambar) -->
    <div class="menu-container">
        <div class="menu-header" onclick="toggleMainMenu()">
            <span>-- Pilih Menu --</span>
            <span class="main-arrow">▼</span>
        </div>
        
        <div id="main-menu-content" class="menu-content">
            <!-- GROUP 1: SIMBOL -->
            <div class="menu-group">
                <div class="group-header" onclick="toggleGroup(this)">
                    <span>📁 -- simbol --</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="group-items">
                    <label class="item-row" onclick="pilihSimbol('%')">
                        <span>% (Persen)</span>
                        <input type="radio" name="calc-mode" id="rad-percent">
                        <span class="radio-custom"></span>
                    </label>
                    <label class="item-row" onclick="pilihSimbol('Σ')">
                        <span>Σ (Sigma)</span>
                        <input type="radio" name="calc-mode" id="rad-sigma">
                        <span class="radio-custom"></span>
                    </label>
                    <label class="item-row" onclick="pilihSimbol('^')">
                        <span>^ (Pangkat)</span>
                        <input type="radio" name="calc-mode" id="rad-pow">
                        <span class="radio-custom"></span>
                    </label>
                </div>
            </div>

            <!-- GROUP 2: ALGORITMA -->
            <div class="menu-group">
                <div class="group-header" onclick="toggleGroup(this)">
                    <span>📁 -- algoritma --</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="group-items" style="display: none;">
                    <div class="item-row"><span>Fitur Segera Datang</span></div>
                </div>
            </div>

            <!-- GROUP 3: RIWAYAT -->
            <div class="menu-group">
                <div class="group-header" onclick="toggleGroup(this)">
                    <span>📁 -- riwayat --</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="group-items">
                    <div class="item-row-history">
                        <span id="history-text">Belum ada riwayat</span>
                        <button onclick="hapusRiwayat()" class="btn-delete-history">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const elemenLayar = document.getElementById("screen");
        const tombolEdit = document.getElementById("btn-edit");
        let isEditModeActive = false;
        let memoriRiwayat = "";

        // Fungsi Memasukkan Angka & Operator ke Layar
        function tekanAngka(nilai) {
            if (isEditModeActive) return;

            if (elemenLayar.innerText === "0" && !"+-*/".includes(nilai)) {
                elemenLayar.innerText = nilai;
            } else {
                elemenLayar.innerText += nilai;
            }
        }

        // Fungsi Memilih Simbol dari Menu Dropdown ke Layar Kalkulator
        function pilihSimbol(simbol) {
            if (isEditModeActive) return;
            if (elemenLayar.innerText === "0") {
                elemenLayar.innerText = simbol;
            } else {
                elemenLayar.innerText += simbol;
            }
        }


    </script>
</body>
</html>
