<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sketsa - Fitur Lengkap</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #f5ece2; /* Warna kertas sesuai foto */
            padding: 20px;
            min-height: 100vh;
        }

        /* Kontainer Utama Kalkulator Vertikal */
        .kalkulator-box {
            display: flex;
            flex-direction: column;
            width: 420px;
            background: #fff;
            border: 3px solid #333;
            box-shadow: 5px 5px 0px #333;
            padding: 15px;
            border-radius: 8px;
        }

        /* 1. LAYER JERNIH (Bagian Atas) */
        .layer-jernih {
            width: 100%;
            height: 160px;
            border: 3px solid #333;
            background-color: #f9f9f9;
            margin-bottom: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .layer-title {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 3px;
        }

        /* Area log riwayat hasil yang otomatis turun ke bawah */
        .history-stream {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 5px;
            text-align: right;
            font-size: 1rem;
            color: #555;
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 2px 0;
        }

        /* Input aktif yang sedang diketik */
        .current-input {
            text-align: right;
            font-size: 1.5rem;
            font-weight: bold;
            color: #000;
            margin-top: 5px;
            min-height: 35px;
            word-wrap: break-word;
        }

        /* PANEL SIMBOL MATEMATIKA (Baru) */
        .panel-simbol {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-bottom: 12px;
        }

        .btn-simbol {
            border: 2px solid #333;
            background: #eef;
            padding: 8px 2px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-align: center;
        }

        .btn-simbol:active {
            background: #ccd;
        }

        .btn-simbol.operator-utama {
            background: #ffe6cc;
        }

        /* BAGIAN BAWAH: Navigasi PILIH & Tombol Angka */
        .tampilan-bawah {
            display: flex;
            gap: 12px;
        }

        /* 2. TOMBOL PILIH (Memanjang ke bawah di sisi kiri) */
        .kolom-pilih {
            display: flex;
            flex-direction: column;
            width: 85px;
        }

        .btn-pilih {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 3px solid #333;
            background-color: #e6ffed; /* Hijau muda untuk tombol aksi */
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 6px;
            gap: 10px;
        }
        
        .btn-pilih span {
            writing-mode: vertical-lr;
            text-orientation: upright;
        }

        .btn-pilih:active {
            background-color: #cdffd8;
        }

        /* 3. GRID ANGKA & DELETE (Sisi Kanan) */
        .kolom-angka {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Susunan 2 Kolom sesuai gambar asli Anda */
        .grid-num {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-num {
            border: 3px solid #333;
            background: #fff;
            padding: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
        }

        .btn-num:active {
            background-color: #eee;
        }

        /* Tombol DELETE di bagian paling bawah angka */
        .btn-delete {
            width: 100%;
            border: 3px solid #333;
            background-color: #ffdde0;
            padding: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-delete:active {
            background-color: #ffccd0;
        }
    </style>
</head>
<body>

    <div class="kalkulator-box">
        
        <!-- BAGIAN ATAS: LAYER JERNIH -->
        <div class="layer-jernih">
            <div class="layer-title">Layer Jernih</div>
            <div class="history-stream" id="historyStream"></div>
            <div class="current-input" id="activeScreen">0</div>
        </div>

        <!-- PANEL TOMBOL SIMBOL BARU -->
        <div class="panel-simbol">
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('+')">+</button>
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('-')">-</button>
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('*')">×</button>
            <button class="btn-simbol operator-utama" onclick="tekanSimbol('/')">÷</button>
            <button class="btn-simbol operator-utama" onclick="hitungSamaDengan()">=</button>
            
            <button class="btn-simbol" onclick="tekanSimbol('%')">%</button>
            <button class="btn-simbol" onclick="tekanSimbol('**')">^</button>
            <button class="btn-simbol" onclick="fungsiSains('log')">log</button>
            <button class="btn-simbol" onclick="fungsiSains('sin')">∠rad</button> 
            <button class="btn-simbol" onclick="fungsiSains('integral')">∫</button>
        </div>

        <!-- BAGIAN BAWAH -->
        <div class="tampilan-bawah">
            
            <!-- SISI KIRI: TOMBOL PILIH (Fungsi Tambahan / Menu Aksi Eksekusi) -->
            <div class="kolom-pilih">
                <button class="btn-pilih" onclick="hitungSamaDengan()">
                    <span>PILIH</span>
                    <div>▼</div>
                </button>
            </div>

            <!-- SISI KANAN: TOMBOL ANGKA SESUAI SKETSA -->
            <div class="kolom-angka">
                <div class="grid-num">
                    <!-- Kolom Kiri (6-0) & Kolom Kanan (1-5) -->
                    <button class="btn-num" onclick="tekanAngka('6')">6</button>
                    <button class="btn-num" onclick="tekanAngka('1')">1</button>
                    
                    <button class="btn-num" onclick="tekanAngka('7')">7</button>
                    <button class="btn-num" onclick="tekanAngka('2')">2</button>
                    
                    <button class="btn-num" onclick="tekanAngka('8')">8</button>
                    <button class="btn-num" onclick="tekanAngka('3')">3</button>
                    
                    <button class="btn-num" onclick="tekanAngka('9')">9</button>
                    <button class="btn-num" onclick="tekanAngka('4')">4</button>
                    
                    <button class="btn-num" onclick="tekanAngka('0')">0</button>
                    <button class="btn-num" onclick="tekanAngka('5')">5</button>
                </div>
                
                <!-- TOMBOL DELETE -->
                <button class="btn-delete" onclick="hapusLayar()">DELETE</button>
            </div>

        </div>
    </div>

    <script>
        const activeScreen = document.getElementById('activeScreen');
        const historyStream = document.getElementById('historyStream');
        let rumusSaatIni = '';

        // Memasukkan angka ke layar
        function tekanAngka(angka) {
            if (activeScreen.innerText === '0') {
                rumusSaatIni = angka;
            } else {
                rumusSaatIni += angka;
            }
            activeScreen.innerText = rumusSaatIni;
        }

        // Memasukkan simbol matematika ke layar
        function tekanSimbol(simbol) {
            if (rumusSaatIni === '' && simbol !== '-') return;
            
            // Mengubah tampilan visual pangkat agar rapi di layar
            let simbolTampil = simbol;
            if (simbol === '**') simbolTampil = '^';
            if (simbol === '*') simbolTampil = '×';
            if (simbol === '/') simbolTampil = '÷';

            rumusSaatIni += simbol;
            activeScreen.innerText = rumusSaatIni.replace(/\*\*/g, '^').replace(/\*/g, '×').replace(/\//g, '÷');
        }

        // Fungsi khusus Log, Integral, dan Sudut
        function fungsiSains(jenis) {
            let angka = parseFloat(rumusSaatIni);
            if (isNaN(angka)) {
                alert("Masukkan angka terlebih dahulu sebelum menekan fungsi!");
                return;
            }

            let hasil = 0;
            let deskripsi = '';

            if (jenis === 'log') {
                hasil = Math.log10(angka);
                deskripsi = `log(${angka})`;
            } else if (jenis === 'sin') {
                // Konversi hitung sudut (Simulasi nilai Sin Radian)
                hasil = Math.sin(angka);
                deskripsi = `sin∠(${angka} rad)`;
