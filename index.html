<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Pecahan Berlapis</title>
    <!-- Memuat Math.js dari CDN untuk akurasi pecahan murni -->
    <script src="https://cloudflare.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 350px;
        }
        h3 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        #display {
            width: 100%;
            height: 60px;
            font-size: 1.2rem;
            text-align: right;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 20px;
            background-color: #fafafa;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .num { background-color: #e3f2fd; color: #0d47a1; }
        .op { background-color: #ffe0b2; color: #e65100; }
        .bracket { background-color: #e8f5e9; color: #1b5e20; }
        .clear { background-color: #ffcdd2; color: #b71c1c; grid-column: span 2; }
        .equal { background-color: #2e7d32; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <h3>Kalkulator Pecahan</h3>
    <input type="text" id="display" placeholder="Contoh: {[(1/2)+(1/3)]/(1/4)}" autofocus>
    
    <div class="buttons">
        <!-- Tombol Clear & Kurung -->
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="bracket" onclick="append('(')">(</button>
        <button class="bracket" onclick="append(')')">)</button>
        
        <button class="bracket" onclick="append('{')">{</button>
        <button class="bracket" onclick="append('}')">}</button>
        <button class="bracket" onclick="append('[')">[</button>
        <button class="bracket" onclick="append(']')">]</button>

        <!-- Angka dan Operator -->
        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('/')">/</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('*')">×</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="op" onclick="append('-')">-</button>
        <button class="op" onclick="hapusSatu()">⌫</button>

        <!-- Tombol Sama Dengan -->
        <button class="equal" onclick="hitung()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function append(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
    }

    function hapusSatu() {
        display.value = display.value.slice(0, -1);
    }

    function hitung() {
        let rumus = display.value;
        if (!rumus) return;

        try {
            // 1. Ubah kurung kurawal {} dan siku [] menjadi kurung biasa () agar dipahami mesin
            let rumusBersih = rumus
                .replace(/\{/g, '(').replace(/\}/g, ')')
                .replace(/\[/g, '(').replace(/\]/g, ')');

            // 2. Evaluasi rumus menggunakan fungsi fraction dari math.js
            // ini mencegah hasil otomatis berubah jadi desimal berkoma
            let hasilPecahan = math.evaluate(rumusBersih);
            
            // 3. Format hasil agar muncul dalam bentuk pecahan murni (misal: 5/6 atau angka bulat)
            display.value = math.format(hasilPecahan, { fraction: 'ratio' });
        } catch (error) {
            display.value = "Format Error!";
        }
    }
</script>

</body>
</html>
