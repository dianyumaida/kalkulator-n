<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Akuntansi Akurat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden; 
        }

        /* FRAME BINGKAI UTAMA KALKULATOR */
        .calculator {
            width: 380px;
            height: 730px;
            background-image: url('Folder/gambar/bodykal.jpg');
            background-size: 380px 730px; 
            background-position: center;
            background-repeat: no-repeat;
            border: none !important;
            box-shadow: none !important;
            box-sizing: border-box;
            position: relative; 
            margin: 10px auto;
        }

        /* AREA MONITOR LAYAR PUTIHAN */
        .screen-container {
            position: absolute;
            top: 35px;     
            left: 20px;    
            width: 340px;  
            height: 250px; 
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            pointer-events: auto !important;
            z-index: 5;
            background: transparent;
        }

        .calc-row {
            font-size: 32px;
            font-weight: bold;
            color: #000000;
            line-height: 1.3;
            width: 100%;
            text-align: right;
            word-wrap: break-word;
        }

        .calc-row.latest-result {
            font-size: 40px;
            color: #1a237e;
            border-bottom: 2px dashed #000;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        /* CONTAINER LAPISAN SENSOR TOMBOL */
        .buttons-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 730px;
            pointer-events: none; 
            z-index: 10;
        }

        /* Kotak putih samar transparan tetap dipertahankan untuk pengecekan terakhir Anda */
        .buttons-container button {
            background: rgba(255, 255, 255, 0.4) !important; 
            border: 1px solid rgba(0, 0, 0, 0.4) !important;   
            color: #000000 !important;                        
            font-weight: 900 !important;              
            font-size: 16px !important;
            outline: none !important;
            cursor: pointer !important;
            padding: 0 !important;
            margin: 0 !important;
            pointer-events: auto !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* 🌟 BARIS 1: TOMBOL ANGKA (0-9) - DIKUNCI PAS DI POSISI GAMBAR ANDA 🌟 */
        .rom-grid-first {
            position: absolute;
            top: 502px; 
            left: 0;
            width: 380px;
            height: 36px;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            padding: 0 13px 0 11px; 
            box-sizing: border-box;
        }
        .rom-grid-first button {
            width: 28px !important; 
        }

        /* 🌟 BARIS 2: TOMBOL OPERATOR (* : + - =) - DITURUNKAN DARI 572px KE 578px 🌟 */
        .rom-grid-second {
            position: absolute;
            top: 578px; 
            left: 0;
            width: 380px;
            height: 50px;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            padding: 0 6px 0 8px; 
            box-sizing: border-box;
        }
        .rom-grid-second button {
            width: 65px !important; 
            font-size: 22px !important;
        }

        /* 🌟 BARIS 3: FUNGSI NAVIGASI BAWAH - DITURUNKAN DARI 645px KE 653px 🌟 */
        .row-bottom {
            position: absolute;
            top: 653px; 
            left: 0;
            width: 380px;
            height: 48px;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            padding: 0 10px 0 10px;
            box-sizing: border-box;
        }
        .btn-pilih { width: 122px !important; }
        .btn-edit  { width: 106px !important; }
        .btn-clear { width: 110px !important; font-size: 15px !important; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Monitor Layar -->
    <div class="screen-container" id="screen-display"></div>

    <div class="buttons-container">
        <!-- Baris 1: Angka -->
        <div class="rom-grid-first">
            <button onclick="tekan('0')" type="button">0</button>
            <button onclick="tekan('1')" type="button">1</button>
            <button onclick="tekan('2')" type="button">2</button>
            <button onclick="tekan('3')" type="button">3</button>
            <button onclick="tekan('4')" type="button">4</button>
            <button onclick="tekan('5')" type="button">5</button>
            <button onclick="tekan('6')" type="button">6</button>
            <button onclick="tekan('7')" type="button">7</button>
            <button onclick="tekan('8')" type="button">8</button>
            <button onclick="tekan('9')" type="button">9</button>
        </div>

        <!-- Baris 2: Operator -->
        <div class="rom-grid-second">
            <button onclick="tekan('*')" type="button">*</button>
            <button onclick="tekan(':')" type="button">:</button>
            <button onclick="tekan('+')" type="button">+</button>
            <button onclick="tekan('-')" type="button">-</button>
            <button onclick="hitungHasil()" type="button">=</button>
        </div>

        <!-- Baris 3: Navigasi Fungsi -->
        <div class="row-bottom">
            <button onclick="void(0)" class="btn-pilih" type="button">PILIH</button>
            <button id="btn-edit" onclick="aktifkanModeEdit()" class="btn-edit" type="button">EDIT</button>
            <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
        </div>
    </div>
</div>

<script>
const display = document.getElementById("screen-display");
let clickTimer = null;
let isManualEdit = false;

let rumusBarisIni = ""; 
let riwayatHitunganHTML = ""; 

function tekan(karakter) {
    if (isManualEdit) return;
    rumusBarisIni += String(karakter);
    renderLayar();
}

function renderLayar() {
    let htmlAktif = rumusBarisIni ? `<div class="calc-row">${rumusBarisIni}</div>` : "";
    display.innerHTML = riwayatHitunganHTML + htmlAktif;
    display.scrollTop = display.scrollHeight;
}

function hitungHasil() {
    if (rumusBarisIni === "") return;
    try {
        let ekspresi = rumusBarisIni;
        ekspresi = ekspresi.replace(/:/g, "/"); 

        let hasil = eval(ekspresi);
        
        riwayatHitunganHTML += `<div class="calc-row">${rumusBarisIni}</div>`;
        riwayatHitunganHTML += `<div class="calc-row latest-result">= ${hasil}</div>`;
        
        rumusBarisIni = ""; 
        renderLayar();
    } catch(e) {
        rumusBarisIni = "";
        riwayatHitunganHTML += `<div class="calc-row" style="color:red; font-size:24px;">Error</div>`;
        renderLayar();
    }
}

function aktifkanModeEdit() {
    isManualEdit = !isManualEdit;
    display.contentEditable = isManualEdit ? "true" : "false";
    if (isManualEdit) display.focus();
}

function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            if (rumusBarisIni.length > 0) {
                rumusBarisIni = rumusBarisIni.slice(0, -1);
                renderLayar();
            }
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        rumusBarisIni = "";
        riwayatHitunganHTML = "";
        display.innerHTML = "";
    }
}
</script>
</body>
</html>
