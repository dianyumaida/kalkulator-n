<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kostum Presisi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
                        /* 1. Pengaturan Bodi Utama Kalkulator */
        .calculator { 
            width: 100%; 
            max-width: 460px; 
            aspect-ratio: 460 / 520; 
            background: url('Folder/gambar/bodykal.jpg') no-repeat center;
            background-size: 100% 100%;
            padding: 5.5% 4.8%; 
            margin-bottom: 20px; 
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
                /* 1. PERBAIKAN LAYAR: Mengatur posisi angka 0 agar sejajar ke atas/tengah */
        #screen { 
            width: 100%; 
            height: 38%; 
            background: transparent; 
            color: #000; 
            text-align: right; 
            padding: 30px 25px 0 25px; /* Ditambah padding atas (30px) agar teks terdorong ke posisi tengah kotak hitam */
            font-size: 3.5rem; /* Ukuran angka diperbesar sedikit agar lebih proporsional */
            margin-bottom: 8.5%; 
            border: none;
            display: flex;
            align-items: flex-start; /* Diubah dari flex-end ke flex-start agar angka naik ke atas */
            justify-content: flex-end;
            overflow-x: auto;
        }
        
        #screen.editing-active { background: rgba(255, 254, 187, 0.4); }

        /* ... kode .row, .row-top, .row-bottom, dan button dibiarkan saja ... */

        /* 2. PERBAIKAN TEKS TOMBOL BAWAH: Membuat teks HTML menjadi transparan (color: transparent) */
        /* Karena fungsinya hanya mendeteksi klik, teksnya kita sembunyikan agar tidak menumpuk tulisan di gambar */
        .btn-pilih { 
            background: rgba(0, 0, 0, 0.01); 
            height: 9.8vw;
            max-height: 50px;
            color: transparent !important; /* Menyembunyikan tulisan '=' HTML */
        }
        .btn-edit { 
            background: rgba(0, 0, 0, 0.01); 
            height: 9.8vw;
            max-height: 50px;
            color: transparent !important; /* Menyembunyikan tulisan 'EDIT' HTML */
        }
        .btn-clear { 
            background: rgba(0, 0, 0, 0.01); 
            height: 9.8vw;
            max-height: 50px;
            color: transparent !important; /* Menyembunyikan tulisan 'CLEAR' HTML */
        }


        /* --- STYLE MENU DROPDOWN --- */
        .menu-container { width: 100%; max-width: 500px; border: 1px solid #ccc; border-radius: 8px; background: #f0f0f0; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-header { background: #e0e0e0; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .menu-group { border-bottom: 1px solid #eee; }
        .group-header { background: #fff; padding: 12px; display: flex; justify-content: space-between; cursor: pointer; font-weight: 500; }
        .item-row, .item-row-history { display: flex; justify-content: space-between; padding: 12px 20px; background: #fff; border-top: 1px solid #f5f5f5; cursor: pointer; }
    </style>
</head>
<body>

    <!-- KALKULATOR DENGAN KOSTUM GAMBAR -->
    <div class="calculator">
        <div id="screen">0</div>
        
        <!-- BARIS 1: 9 Kotak Kecil (Angka 1-9) -->
                <!-- BARIS 1: Ditambahkan class row-top agar jaraknya bisa diatur tersendiri -->
        <div class="row row-top">
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>

        
        <!-- BARIS 2: 6 Kotak Sedang (0, Titik, dan Operator) -->
        <div class="row">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('.')">.</button>
            <button onclick="tekan('+')">+</button>
            <button onclick="tekan('-')">-</button>
            <button onclick="tekan('*')">x</button>
            <button onclick="tekan('/')">:</button>
        </div>
        
        <!-- BARIS 3: 3 Kotak Besar Bawah (Sesuai Gambar Anda) -->
        <div class="row row-bottom">
            <!-- Tombol Pertama Berfungsi sebagai Sama Dengan (=) sekaligus memicu scroll ke Menu Pilih -->
            <button onclick="hasil()" class="btn-pilih">=</button>
            <button id="btn-edit" onclick="modeEdit()" class="btn-edit">EDIT</button>
            <!-- Klik Sekali untuk DEL (hapus satu), Klik Dua Kali/Tahan untuk CLEAR (bersih semua) -->
            <button onclick="del()" ondblclick="clearAll()" class="btn-clear">CLEAR</button>
        </div>
    </div>

    <!-- MENU DROPDOWN DI BAWAH KALKULATOR -->
    <div class="menu-container">
        <div class="menu-header" onclick="toggle('main-menu-content')"><span>-- Pilih Menu --</span><span>▼</span></div>
        <div id="main-menu-content">
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-simbol')"><span>📁 -- simbol --</span><span>▼</span></div>
                <div id="sec-simbol">
                    <label class="item-row" onclick="tekan('%')"><span>% (Persen)</span><input type="radio" name="m" id="rad-percent"></label>
                    <label class="item-row" onclick="tekan('Σ')"><span>Σ (Sigma)</span><input type="radio" name="m" id="rad-sigma"></label>
                    <label class="item-row" onclick="tekan('^')"><span>^ (Pangkat)</span><input type="radio" name="m" id="rad-pow"></label>
                </div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-algo')"><span>📁 -- algoritma --</span><span>▶</span></div>
                <div id="sec-algo" style="display:none;"><div class="item-row"><span>Segera Datang</span></div></div>
            </div>
            <div class="menu-group">
                <div class="group-header" onclick="toggle('sec-riwayat')"><span>📁 -- riwayat --</span><span>▼</span></div>
                <div id="sec-riwayat">
                    <div class="item-row-history">
                        <span id="h-txt">Belum ada riwayat</span>
                        <button onclick="delH()" style="background:#ff4d4d; color:white; padding:4px 10px; font-size:13px; border:none; border-radius:4px; cursor:pointer;">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        const scr = document.getElementById("screen");
        let isEdit = false;

        function tekan(v) {
            if(isEdit) return;
            scr.innerText = (scr.innerText === "0" && !"+-*/^%Σ".includes(v)) ? v : scr.innerText + v;
        }

        function hasil() {
            if(isEdit || scr.innerText === "0") return;
            try {
                let txt = scr.innerText;
                let riwayatAwal = txt;

                txt = txt.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
                txt = txt.replace(/(\d+)%/g, "($1/100)");
                txt = txt.replace(/(\d+)Σ/g, function(match, angka) {
                    let total = 0;
                    for (let i = 1; i <= parseInt(angka); i++) { total += i; }
                    return total;
                });

                let res = eval(txt);
                document.getElementById('h-txt').innerText = riwayatAwal + " = " + res;
                scr.innerText = res;
            } catch(e) { scr.innerText = "Error"; }
        }

        function del() { if(!isEdit) scr.innerText = scr.innerText.slice(0, -1) || "0"; }
        
        function clearAll() {
            scr.innerText = "0"; isEdit = false; scr.contentEditable = "false";
            document.getElementById("btn-edit").innerText = "EDIT";
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        }

        function modeEdit() {
            isEdit = !isEdit;
            scr.contentEditable = isEdit ? "true" : "false";
            document.getElementById("btn-edit").innerText = isEdit ? "OK" : "EDIT";
            if(isEdit) scr.focus();
        }

        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "none") ? "block" : "none";
        }

        function delH() { document.getElementById('h-txt').innerText = "Belum ada riwayat"; }
    </script>
</body>
</html>
