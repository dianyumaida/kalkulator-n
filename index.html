<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom</title>
    <style>
        /* Desain Utama Kalkulator Retro */
        .calculator {
            width: 340px;
            background: #ffffff;
            border: 5px solid #000000;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 6px 6px 0px #000000;
            font-family: Arial, sans-serif;
            margin: 20px auto;
            box-sizing: border-box;
        }

        /* Area Layar Utama & Tombol Angka */
        .screen-container {
            border: 4px solid #000000;
            padding: 15px 10px 10px 10px;
            margin-bottom: 20px;
            background: #ffffff;
        }
        
        #screen {
            font-size: 65px;
            text-align: right;
            font-weight: normal;
            min-height: 75px;
            line-height: 75px;
            word-wrap: break-word;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        /* Pembatas Garis Tipis di Bawah Angka Layar */
        .screen-divider {
            border-top: 2px solid #000000;
            margin-bottom: 12px;
        }

        /* Baris Tombol Angka (0-9) */
        .numbers-row {
            display: flex;
            justify-content: space-between;
        }
        
        .numbers-row button {
            flex: 1;
            margin: 0 2px;
            background: #eeeeee;
            border: 2px solid #aaaaaa;
            border-radius: 4px;
            font-weight: bold;
            padding: 6px 0;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.1s;
        }
        
        .numbers-row button:active {
            background: #cccccc;
        }

        /* Kontainer Baris Kotak-Kotak Tengah */
        .rom-grid {
            display: flex;
            margin-bottom: 20px;
            border: 4px solid #000000;
            padding: 8px 8px 8px 22px; /* Memberi ruang di kiri untuk simbol operator */
            position: relative;
            background: #ffffff;
        }
        
        /* Indikator Simbol (* : +) di Pojok Kiri */
        .op-indicator {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            font-weight: bold;
            line-height: 12px;
            display: flex;
            flex-direction: column;
            letter-spacing: 1px;
        }

        /* Komponen Slot Kotak Vertikal */
        .grid-item {
            flex: 1;
            height: 50px;
            border: 3px solid #000000;
            margin: 0 3px;
            background: transparent;
            cursor: pointer;
        }

        /* Baris Fungsi Terbawah */
        .row-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 4px solid #000000;
            padding: 10px;
            background: #dddddd;
        }

        /* Pengaturan Tombol Fungsi Utama */
        .btn-pilih {
            width: 100%;
            background: #ffffff;
            border: 3px solid #000000;
            font-weight: bold;
            padding: 10px 0;
            font-size: 15px;
            cursor: pointer;
        }
        
        .btn-ok {
            flex: 1;
            background: #ffcc00; /* Warna Kuning Sesuai Gambar */
            border: 3px solid #000000;
            font-weight: bold;
            padding: 10px 0;
            font-size: 15px;
            cursor: pointer;
            margin: 0 10px;
        }
        
        .btn-clear {
            flex: 1;
            background: #ff2a2a; /* Warna Merah Sesuai Gambar */
            border: 3px solid #000000;
            color: #ffffff;
            font-weight: bold;
            padding: 10px 0;
            font-size: 15px;
            cursor: pointer;
        }

        /* Dropdown Menu yang Berada Tepat di Atas Tombol PILIH */
        .dropdown-menu {
            display: none;
            position: absolute;
            bottom: 120%;
            left: 0;
            width: 100%;
            background: #ffffff;
            border: 3px solid #000000;
            box-shadow: 0px -4px 10px rgba(0,0,0,0.3);
            z-index: 999;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .dropdown-item {
            padding: 8px;
            font-size: 14px;
            border-bottom: 1px dashed #ccc;
            cursor: pointer;
        }
        
        .dropdown-item:last-child {
            border-bottom: none;
        }
        
        .dropdown-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="calculator">
    
    <!-- Bagian Atas: Monitor & Tombol Input Angka -->
    <div class="screen-container">
        <div id="screen">6</div>
        <div class="screen-divider"></div>
        <div class="numbers-row">
            <button onclick="tekan('0')">0</button>
            <button onclick="tekan('1')">1</button>
            <button onclick="tekan('2')">2</button>
            <button onclick="tekan('3')">3</button>
            <button onclick="tekan('4')">4</button>
            <button onclick="tekan('5')">5</button>
            <button onclick="tekan('6')">6</button>
            <button onclick="tekan('7')">7</button>
            <button onclick="tekan('8')">8</button>
            <button onclick="tekan('9')">9</button>
        </div>
    </div>

    <!-- KOTAK TENGAH ATAS: 9 Slot Kotak dengan Tanda Operator -->
    <div class="rom-grid">
        <div class="op-indicator">
            <span>*</span>
            <span>:</span>
            <span>+</span>
        </div>
        <div class="grid-item" onclick="tekan('*')"></div>
        <div class="grid-item" onclick="tekan(':')"></div>
        <div class="grid-item" onclick="tekan('+')"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>

    <!-- KOTAK TENGAH BAWAH: 7 Slot Kotak Kosong -->
    <div class="rom-grid">
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </div>

    <!-- BARIS TERBAWAH: Navigasi Menu & Perintah -->
    <div class="row-bottom" style="position: relative;">
        
        <!-- Dropdown Pembungkus Komponen PILIH -->
        <div style="flex: 1.2; position: relative;">
            <button onclick="klikTombolPilih()" class="btn-pilih" type="button">&#9664; PILIH &#9660;</button>
            
            <!-- Isi Konten Menu Dropdown -->
            <div id="dropdown-menu" class="dropdown-menu">
                <div style="font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 5px;">Pilih Operasi:</div>
                <div class="dropdown-item" onclick="tekan('%')">% (Persen)</div>
                <div class="dropdown-item" onclick="tekan('Σ')">Σ (Sigma)</div>
                <div class="dropdown-item" onclick="tekan('^')">^ (Pangkat)</div>
            </div>
        </div>

        <!-- Tombol OK (Kuning) & Tombol CLEAR (Merah) -->
        <button id="btn-ok" onclick="hitungHasil()" class="btn-ok" type="button">OK</button>
        <button onclick="handleClearClick()" class="btn-clear" type="button">CLEAR</button>
    </div>

</div>

<script>
const scr = document.getElementById("screen");
let clickTimer = null;

// Menginput karakter ke dalam layar
function tekan(karakter) {
    let v = String(karakter);
    if (scr.innerText === "0" && !"+-*/%x:^Σ".includes(v)) {
        scr.innerText = v;
    } else {
        scr.innerText += v;
    }
}

// Mengeksekusi kalkulasi matematika saat tombol "OK" ditekan
function hitungHasil() {
    if (scr.innerText === "0" || scr.innerText === "") return;
    try {
        let txt = scr.innerText;

        // Pemetaan string operator visual menjadi format fungsi JavaScript asli
        txt = txt.replace(/x/g, "*").replace(/:/g, "/");
        txt = txt.replace(/(\d+)\^(\d+)/g, "Math.pow($1,$2)");
        txt = txt.replace(/(\d+)%/g, "($1/100)");

        // Formula khusus fungsi Sigma
        txt = txt.replace(/Σ(\d+)/g, function(match, angka) {
            let total = 0;
            for (let i = 1; i <= parseInt(angka); i++) { total += i; }
            return total;
        });

        let res = eval(txt);
        scr.innerText = res;
    } catch(e) {
        scr.innerText = "Error";
    }
}

// Logika cerdas tombol CLEAR (Klik 1x hapus satu digit terakhir, klik 2x hapus total)
function handleClearClick() {
    if (clickTimer == null) {
        clickTimer = setTimeout(function () {
            clickTimer = null;
            // Aksi Klik Sekali (Delete Single)
            scr.innerText = scr.innerText.length > 1 ? scr.innerText.slice(0, -1) : "0";
        }, 250);
    } else {
        clearTimeout(clickTimer);
        clickTimer = null;
        // Aksi Klik Dua Kali (Clear All)
        scr.innerText = "0";
    }
}

// Membuka dan menutup panel menu pilihan melayang
function klikTombolPilih() {
    const menu = document.getElementById('dropdown-menu');
    menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
}
</script>

</body>
</html>
