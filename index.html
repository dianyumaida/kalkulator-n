<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kustom GitHub</title>
    <style>
        /* Gaya dasar sederhana agar tampilan rapi */
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 50px; background: #f0f0f0; }
        .kalkulator { background: #333; padding: 20px; border-radius: 10px; width: 280px; }
        #display { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 15px; box-sizing: border-box; padding: 5px; }
        .tombol-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        button { padding: 15px 5px; font-size: 18px; cursor: pointer; border-radius: 5px; border: none; }
        .btn-delete { grid-column: span 5; background: #ff4d4d; color: white; }
        .btn-pilih { grid-column: span 5; background: #4CAF50; color: white; margin-top: 10px; font-weight: bold; }
        dialog { border: none; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .radio-item { margin: 8px 0; font-size: 18px; }
        .aksi-modal { margin-top: 15px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="kalkulator">
        <!-- Input Utama / Layar Display -->
        <input type="text" id="display" readonly placeholder="0">

        <!-- Susunan Tombol Angka (Numpad) -->
        <div class="tombol-grid">
            <button onclick="tekanAngka('1')">1</button>
            <button onclick="tekanAngka('2')">2</button>
            <button onclick="tekanAngka('3')">3</button>
            <button onclick="tekanAngka('4')">4</button>
            <button onclick="tekanAngka('5')">5</button>
            <button onclick="tekanAngka('6')">6</button>
            <button onclick="tekanAngka('7')">7</button>
            <button onclick="tekanAngka('8')">8</button>
            <button onclick="tekanAngka('9')">9</button>
            <button onclick="tekanAngka('0')">0</button>
            
            <!-- Tombol Delete -->
            <button class="btn-delete" onclick="hapusSemua()">DELETE</button>
            
            <!-- Tombol PILIH Terpisah di Bagian Bawah -->
            <button class="btn-pilih" id="tombolPilih">PILIH ▾</button>
        </div>
    </div>

    <!-- JENDELA POP-UP (DIALOG) UNTUK RADIO BUTTON SIMBOL -->
    <dialog id="modalSimbol">
        <h3>Pilih Simbol Matematika:</h3>
        <form method="dialog" id="formSimbol">
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="{"> Kurung Kurawal { }</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="["> Kurung Siku [ ]</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="("> Kurung Biasa ( )</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="%"> Persen %</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="~"> Tilde ~</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="√"> Akar √</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="^"> Pangkat ^</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="°"> Derajat °</label></div>
            <div class="radio-item"><label><input type="radio" name="simbol_mat" value="/"> Pecahan /</label></div>
            
            <div class="aksi-modal">
                <button type="button" id="tombolBatal" style="background:#ccc;">Batal</button>
                <button type="submit" style="background:#4CAF50; color:white;">Masukkan</button>
            </div>
        </form>
    </dialog>

    <!-- Memanggil Logika Perhitungan -->
    <script src="script.js"></script>
</body>
</html>
