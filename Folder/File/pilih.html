<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Matematika</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* CONTAINER UTAMA APLIKASI */
        .app-container {
            width: 340px;
            background-color: #ffffff;
            border: 2px solid #cccccc;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            height: 520px;
        }

        /* ==================== TAMPILAN KALKULATOR ==================== */
        .calculator-screen {
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: calc(100% - 40px);
        }

        .calc-header {
            background-color: #e0e0e0;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .display-box {
            background-color: #222;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            text-align: right;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            min-height: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input {
            width: calc(100% - 16px);
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .btn-hitung {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: auto;
        }

        /* ==================== TAMPILAN MENU DROPDOWN (OVERLAY) ==================== */
        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 10;
            display: none; /* Sembunyi secara default */
            overflow-y: auto;
        }

        .menu-header-active {
            background-color: #e0e0e0;
            padding: 12px 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #cccccc;
            cursor: pointer;
        }

        .category-header {
            padding: 12px 20px;
            font-weight: bold;
            color: #555555;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #eeeeee;
        }

        .folder-icon { color: #ffca28; }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
            border-bottom: 1px solid #eeeeee;
            cursor: pointer;
        }

        .menu-item:hover { background-color: #f9f9f9; }

        .radio-circle {
            width: 16px;
            height: 16px;
            border: 2px solid #888888;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- LAYAR UTAMA KALKULATOR -->
        <div class="calculator-screen">
            <!-- Tombol Pemicu untuk Membuka Menu -->
            <div class="calc-header" onclick="bukaMenu()">
                <span id="tombolPilih">-- Pilih --</span>
                <span>▼</span>
            </div>

            <!-- Tampilan Layar Angka -->
            <div class="display-box" id="LayarHasil">0</div>

            <!-- Form Input Angka -->
            <div class="input-group">
                <label id="labelInput">Masukkan Angka:</label>
                <input type="number" id="inputAngka" placeholder="0">
            </div>

            <button class="btn-hitung" onclick="prosesHitung()">HITUNG</button>
        </div>

        <!-- LAYAR MENU PILIHAN (Sesuai Gambar Anda) -->
        <div class="menu-overlay" id="layarMenu">
            <div class="menu-header-active" onclick="tutupMenu()">
                <span>-- Pilih --</span>
                <span>▼</span>
            </div>
            
            <!-- Grup Sudut -->
            <div class="category-header"><span class="folder-icon">📁</span> -- sudut --</div>
            <div class="menu-item" onclick="pilihMenu('sin')"><span>sin</span><span class="radio-circle"></span></div>
            <div class="menu-item" onclick="pilihMenu('cos')"><span>cos</span><span class="radio-circle"></span></div>
            <div class="menu-item" onclick="pilihMenu('tan')"><span>tan</span><span class="radio-circle"></span></div>

            <!-- Grup Logaritma -->
            <div class="category-header"><span class="folder-icon">📁</span> -- logaritma --</div>
            <div class="menu-item" onclick="pilihMenu('In (Natural Log)')"><span>In (Natural Log)</span><span class="radio-circle"></span></div>
            <div class="menu-item" onclick="pilihMenu('log10')"><span>log10</span><span class="radio-circle"></span></div>

            <!-- Grup Matriks -->
            <div class="category-header"><span class="folder-icon">📁</span> -- matriks --</div>
            <div class="menu-item" onclick="pilihMenu('Determinan')"><span>Determinan</span><span class="radio-circle"></span></div>
            <div class="menu-item" onclick="pilihMenu('Invers')"><span>Invers</span><span class="radio-circle"></span></div>
        </div>

    </div>

    <script>
        let fungsiTerpilih = "";

        // Fungsi membuka overlay menu
        function bukaMenu() {
            document.getElementById('layarMenu').style.display = 'block';
        }

        // Fungsi menutup overlay menu
        function tutupMenu() {
            document.getElementById('layarMenu').style.display = 'none';
        }

        // LOGIKA KUNCI: Saat item diklik, set fungsi lalu KEMBALI KE KALKULATOR
        function pilihMenu(namaFungsi) {
            fungsiTerpilih = namaFungsi;
            
            // 1. Ubah teks tombol di kalkulator sesuai fungsi yang dipilih
            document.getElementById('tombolPilih').innerText = namaFungsi;
            
            // 2. Sesuaikan label petunjuk input (opsional agar interaktif)
            if(namaFungsi === 'sin' || namaFungsi === 'cos' || namaFungsi === 'tan') {
                document.getElementById('labelInput').innerText = "Masukkan Derajat Sudut:";
            } else {
                document.getElementById('labelInput').innerText = "Masukkan Angka:";
            }

            // 3. KEMBALI KE KALKULATOR (Sembunyikan menu otomatis)
            tutupMenu();
        }

        // Fungsi eksekusi tombol HITUNG di kalkulator
        function prosesHitung() {
            let nilai = parseFloat(document.getElementById('inputAngka').value);
            let hasil = 0;

            if (isNaN(nilai)) {
                alert("Silakan masukkan angka terlebih dahulu!");
                return;
            }

            if (fungsiTerpilih === "") {
                alert("Silakan pilih fungsi matematika terlebih dahulu!");
                bukaMenu(); // otomatis buka menu jika belum memilih
                return;
            }

            // Proses Rumus Matematika
            switch(fungsiTerpilih) {
                case 'sin':
                    hasil = Math.sin(nilai * Math.PI / 180); // Konversi ke Radian
                    break;
                case 'cos':
                    hasil = Math.cos(nilai * Math.PI / 180);
                    break;
                case 'tan':
                    hasil = Math.tan(nilai * Math.PI / 180);
                    break;
                case 'In (Natural Log)':
                    hasil = Math.log(nilai);
                    break;
                case 'log10':
                    hasil = Math.log10(nilai);
                    break;
                default:
                    hasil = "Fitur " + fungsiTerpilih + " siap dijalankan";
            }

            // Tampilkan hasil di layar kalkulator
            document.getElementById('LayarHasil').innerText = hasil.toFixed(4);
        }
    </script>

</body>
</html>
