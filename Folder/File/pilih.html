<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Matematika</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --border-color: #cccccc;
            --text-color: #333333;
            --header-bg: #e0e0e0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
            margin: 0;
        }

        /* Kontainer Utama Menu */
        .menu-container {
            width: 320px;
            background-color: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* Header Menu Utama */
        .menu-header {
            background-color: var(--header-bg);
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            cursor: pointer;
        }

        /* Panah Segitiga */
        .arrow {
            font-size: 12px;
            transition: transform 0.2s;
        }

        /* Konten List Menu */
        .menu-content {
            display: block; /* Tetap terbuka secara default seperti di gambar */
        }

        /* Kategori Folder (sudut, logaritma, matriks) */
        .category-header {
            background-color: #ffffff;
            padding: 12px 15px;
            font-weight: bold;
            color: #555555;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eeeeee;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Ikon Folder Kuning */
        .folder-icon {
            color: #ffca28;
            font-size: 16px;
        }

        /* Item Pilihan (sin, cos, dll) */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background-color: #ffffff;
            border-bottom: 1px solid #eeeeee;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-color);
        }

        .menu-item:hover {
            background-color: #f9f9f9;
        }

        /* Desain Kustom Radio Button Bulat */
        .radio-circle {
            width: 16px;
            height: 16px;
            border: 2px solid #888888;
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        /* Efek ketika diklik cepat (animasi centang) */
        .menu-item:active .radio-circle {
            border-color: #2196F3;
            background-color: #2196F3;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <!-- Menu Utama / Judul Atas -->
        <div class="menu-header" id="mainHeader">
            <span id="headerText">-- Pilih --</span>
            <span class="arrow">▼</span>
        </div>

        <!-- Isi List Menu -->
        <div class="menu-content" id="menuContent">
            
            <!-- GRUP SUDUT -->
            <div class="category-header">
                <div class="category-title">
                    <span class="folder-icon">📁</span> -- sudut --
                </div>
                <span class="arrow">▼</span>
            </div>
            <div class="menu-item" onclick="pilihAksi('sin')">
                <span>sin</span>
                <span class="radio-circle"></span>
            </div>
            <div class="menu-item" onclick="pilihAksi('cos')">
                <span>cos</span>
                <span class="radio-circle"></span>
            </div>
            <div class="menu-item" onclick="pilihAksi('tan')">
                <span>tan</span>
                <span class="radio-circle"></span>
            </div>

            <!-- GRUP LOGARITMA -->
            <div class="category-header">
                <div class="category-title">
                    <span class="folder-icon">📁</span> -- logaritma --
                </div>
                <span class="arrow">▼</span>
            </div>
            <div class="menu-item" onclick="pilihAksi('In (Natural Log)')">
                <span>In (Natural Log)</span>
                <span class="radio-circle"></span>
            </div>
            <div class="menu-item" onclick="pilihAksi('log10')">
                <span>log10</span>
                <span class="radio-circle"></span>
            </div>

            <!-- GRUP MATRIKS -->
            <div class="category-header">
                <div class="category-title">
                    <span class="folder-icon">📁</span> -- matriks --
                </div>
                <span class="arrow">▼</span>
            </div>
            <div class="menu-item" onclick="pilihAksi('Determinan')">
                <span>Determinan</span>
                <span class="radio-circle"></span>
            </div>
            <div class="menu-item" onclick="pilihAksi('Invers')">
                <span>Invers</span>
                <span class="radio-circle"></span>
            </div>

        </div>
    </div>

    <script>
        // Fungsi utama saat salah satu item menu diklik
        function pilihAksi(namaFitur) {
            // 1. Tampilkan teks item yang dipilih pada header atas (opsional)
            document.getElementById('headerText').innerText = namaFitur;

            // 2. Jalankan logika rumus Anda di sini
            console.log("Menjalankan fungsi untuk: " + namaFitur);
            
            // Contoh efek visual: memunculkan notifikasi atau mengarahkan halaman
            alert("Membuka menu: " + namaFitur);

            // 3. LANGSUNG KEMBALI KE MENU AWAL (Reset Otomatis)
            // Mengembalikan teks paling atas menjadi "-- Pilih --" setelah jeda singkat
            setTimeout(function() {
                document.getElementById('headerText').innerText = "-- Pilih --";
            }, 300); // 300 milidetik memberikan efek visual kedipan selesai diklik
        }
    </script>

</body>
</html>
