<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator </title>
    <!-- Pemanggilan file CSS yang sudah diganti nama menjadi standar -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
     
    <div class="calculator-container">
        <!-- 1. Layar Putih Besar -->
        <div class="display-section">
            <div id="result-display"></div>
            <div id="formula-display"></div>
        </div>

             <!-- 3. Bagian Bawah: Tiga Kolom Sesuai Gambar Anda -->
        <div class="bottom-layout">
            <!-- Kolom Kiri - Panel Hijau -->
            <div class="green-panel">
    <h3>Simbol:</h3>
    <form id="formSimbol">
        <div class="grid-simbol">
            <!-- SISTEM KURUNG TERPISAH SATU-SATU -->
<div class="radio-item"><label><input type="radio" name="sub_simbol" value="integral" checked> ∫ dx </label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol"value="sigma">∑ </label></div>
<div class="radio-item"><label><input type="radio" name="sub_simbol" value="^">(^) </label></div>
<div class="radio-item"><label><input type="radio" name="sub_simbol" value="°">(°)</label></div>
<div class="radio-item"><label><input type="radio" name="sub_simbol" value="%">(%) </label></div>
<div class="radio-item"><label><input type="radio" name="sub_simbol" value=".">(.)</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="{">{ </label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="}">}</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="[">[</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="]">]</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="(">(</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value=")">)</label></div>
            
            <!-- SIMBOL MATEMATIKA UTAMA -->
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="%">%</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="~">~</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="sqrt(">√</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="^">^</label></div>
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="°">°</label></div>
            
            <!-- SISTEM PECAHAN BERLAPIS BERBASIS FUNGSI STRUKTUR -->
            <div class="radio-item"><label><input type="radio" name="sub_simbol" value="frac(,)">/</label></div>
        </div>
    </form>  
        <!-- 2. Baris Operator Horizontal -->
        <div class="operator-row">
            <button class="btn-op" onclick="append('+')">+</button>
            <button class="btn-op" onclick="append('-')">-</button>
            <button class="btn-op" onclick="append('*')">x</button>
            <button class="btn-op" onclick="append('/')">:</button>
            <button class="btn-delete" onclick="clearAll()">AC</button>
            <button class="btn-equal" onclick="calculate()">=</button>
        </div>

            <!-- Kolom Tengah - Angka 6 sampai 0 -->
            <div class="num-column">
                <button class="btn-num" onclick="append('6')">6</button>
                <button class="btn-num" onclick="append('7')">7</button>
                <button class="btn-num" onclick="append('8')">8</button>
                <button class="btn-num" onclick="append('9')">9</button>
                <button class="btn-num" onclick="append('0')">0</button>
            </div>

            <!-- Kolom Kanan - Angka 1 sampai 5 -->
            <div class="num-column">
                <button class="btn-num" onclick="append('1')">1</button>
                <button class="btn-num" onclick="append('2')">2</button>
                <button class="btn-num" onclick="append('3')">3</button>
                <button class="btn-num" onclick="append('4')">4</button>
                <button class="btn-num" onclick="append('5')">5</button>
            </div>

        </div>
    </div>

    <!-- Pemanggilan file JS yang sudah diganti nama menjadi standar -->
    <script src="script.js"></script>
</body>
</html>
